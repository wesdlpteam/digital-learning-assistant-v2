s demonstrating whole-body listening (eyes like arrows, from Larry’s Whole Body Listening poster) and explaining their morning jobs checklist routine (unpacking bag, purple folder, lunch box, hat), connecting to the Essential Agreement they helped create for the classroom and playground and their daily self-reflection about responsible behaviour.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a ‘Roles and Responsibilities’ poster showing the classroom and playground Essential Agreements they created together, with drawings of responsible behaviours explored through role-play activities (sharing resources, playing fairly in the playground) and connections to Kelso’s Choices strategies and Wes’s Paw ROAR.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph their morning jobs checklist in their locker and record voice explanations about each responsibility step, building independence and connecting to the roll sentence reflections about ‘How were you responsible in the classroom and the playground?’ — practised throughout the unit.", "c": "middle"}, {"t": "Beebots", "d": "Students program Beebots to navigate a school map visiting different staff members’ locations (classroom, library, office, playground), explaining each person’s role at every stop — building on the Year 4 buddy discussions about staff roles and the books about starting school (Starting School by Jane Godwin, Possum Goes to School, First Day by Andrew Daddo).", "c": "beginning"}, {"t": "Seesaw", "d": "Students draw or photograph an example of roles people play from their everyday life, then record a voice note explaining how it works — building a class collection of real-world connections before the inquiry begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph examples of responsibilities in the community around the school or home and create a Book Creator page sorting them into categories, with voice recordings explaining their grouping — practising the classification skills they will develop in the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about roles people play.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate roles people play, building a visual portfolio of evidence throughout the unit.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Prep", "th": "Sharing the Planet", "ci": "Human actions change the environment.", "lo": "How people interact with different environments; The effect people have on the environment; Ways in which people can take action and care for the environment", "s": [{"t": "Book Creator", "d": "Students create a ‘Caring for Our Environments’ book documenting the natural environments explored during the unit (desert, marine, bushland, arctic), featuring their living vs non-living drawings from the Prep Playground activity (green circle for living, red for non-living), photos of their desert plant, observations from the Aquarium excursion rockpools, and a page about how human actions (pollution, overfishing, global warming) affect the Great Barrier Reef.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record a presentation sharing three sea creature facts (as practised for the Student Led Conference — identifying 3 sea creatures and telling parents 3 facts each) and explaining one action people can take to care for the marine environment — connecting to the class discussion about how littering ends up in the ocean and makes sea creatures sick.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a before-and-after environment poster showing the effect of human actions on the Great Barrier Reef (healthy coral vs coral bleaching from the videos watched), including their Go Further drawing of one environment’s problem and an action to care for it — building on the Think, Puzzle, Explore provocation about what an environment is.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph their collaborative Prep Tunnel underwater exhibition and the ceramic, painted and drawn marine animals they created in Visual Arts, recording voice explanations about each sea creature’s features and why caring for the ocean environment matters — connecting to picture books Commotion in the Ocean and Ella’s Adventures in the Barrier Reef.", "c": "middle"}, {"t": "Indi Robot", "d": "Students build an ‘Environment Path’ using colour tiles representing different natural environments (blue = marine, yellow = desert, green = bushland), programming Indi to travel through each environment while explaining the living things found there and one human action that could help or harm it — connecting to the environment provocation bottles (sand/water, leaves/sticks).", "c": "beginning"}, {"t": "Seesaw", "d": "Students draw what how people interact with different environments means to them and record a voice note explaining their thinking — creating a 'Before' snapshot that will be compared with their 'After' understanding at the end of the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph or draw something from nature connected to the effect people have on the environment and create a Book Creator page with labels and a voice note explaining why it matters — starting a personal inquiry book.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about how people interact with different environments.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate how people interact with different environments, building a visual portfolio of evidence throughout the unit.", "c": "middle"}]} e → Walkman → Discman → iPhone (Steve Jobs announcement video) throughout the unit.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a Venn diagram poster comparing past and present technology (or past and present dance styles), using the comparison skills they practised regularly throughout the unit and the sorted photos from the timeline display.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph artefacts they brought from home (records, old phones, photos) and record voice explanations about what the artefact tells us about the past, connecting to the BTN 'Old School' clip discussions and parent conversations shared during SLC about what school and technology were like in the past.", "c": "middle"}, {"t": "iMovie", "d": "Students create a short 'Then and Now' video comparing an old technology artefact with its modern equivalent, incorporating the Dance and Drama exploration where they compared dances from different decades and created a timeline of dance that stayed on the classroom wall all term.", "c": "middle"}, {"t": "Google Earth", "d": "Students explore their own home location on Google Earth and take a screenshot, then use Seesaw to record what they notice about the place where they live — connecting to the unit's focus on how technology has changed over time.", "c": "beginning"}, {"t": "Book Creator", "d": "Students start a 'Then and Now' book by drawing or photographing something from their life connected to the purpose and significance of artefacts, adding voice recordings explaining what they think it looked like in the past.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore locations connected to the unit's focus using Google Earth satellite and street views, making initial observations and recording wonderings that will anchor their inquiry into how technology has changed over time.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and nd symbols communicate emotions and identity — connecting the Visual Art, PE and music strands of the unit.", "c": "middle"}, {"t": "Seesaw", "d": "Students use the camera and drawing tools to create a 'Before I Knew' page showing what different ways to communicate emotions looks like to them right now — using pictures, labels and voice recording to capture their starting understanding.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page showing different ways they can express the idea of how art, music and movement express feelings — through drawing, voice, photos and text — exploring which method feels most natural to them.", "c": "beginning"}, {"t": "Seesaw", "d": "Students respond to a class provocation about understanding others' expressions through body language and facial cues by choosing one of three images on Seesaw and recording why it connects to their life — the teacher uses responses to form inquiry groups for the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about different ways to communicate emotions.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 1", "th": "How the World Works", "ci": "Weather affects our lives in different ways.", "lo": "Types of weather conditions; How weather impacts our lives (clothing, activities, food, feelings); Why weather changes (seasons, patterns)", "s": [{"t": "Book Creator", "d": "Students create a 'Weather Watch' information report documenting their chosen season (Summer or Winter) researched using library texts, featuring their daily weather graph data collection, clothing and activity sorting results, and connections to the Indigenous Kulin Nation seasons investigation.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record a weather report presenting data they collected on the daily weather graph (observing temperature and conditions over time), using ions.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph their celebration tradition drawing from the Tune In provocation and record a voice explanation about what their family celebrates and why, building on the homework where they created questions about cultural connections and family sports links.", "c": "beginning"}, {"t": "Seesaw", "d": "Students use the camera and drawing tools to create a 'Before I Knew' page showing what beliefs and values contribute to a culture looks like to them right now — using pictures, labels and voice recording to capture their starting understanding.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page showing different ways they can express the idea of the importance of rituals and traditions — through drawing, voice, photos and text — exploring which method feels most natural to them.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate beliefs and values contribute to a culture, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about beliefs and values contribute to a culture with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 2", "th": "How the World Works", "ci": "People and the planet are reliant on different energy sources.", "lo": "Energy types (electricity, fossil fuels, solar); Energy helps us in daily life; Energy transformation; Responsibility to conserve energy and find sustainable sources", "s": [{"t": "Book Creator", "d": "Students create an 'Energy Sources Investigation' report documenting the energy types explored through the bouncing ball, light switch, candle and paper airplane provocation, the energy sorting task, and their electric circuit building experiments — including their gist statements using the BUT conjunction about fossil fuels vs sustainable energy.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record themselves demonstrating their electric circuit (built in pairs), explaining how the closed circuit transfers energy and what happens when they break the circuit — connecting to the Circuits Seesaw Activity where they explored digital circuits and the scientific vocabulary wall (solar energy, kinetic, potential).", "c": "end"}, {"t": "Canva Presentation", "d": "Students design an 'Energy Debate' poster presenting both sides of the Tug of War provocation ('We need fossil fuels to power our lives'), incorporating their pros and cons post-it note reflections and their final gist statement vote using the BUT conjunction template.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph each step of their circuit building experiment and use drawing tools to label the energy source, wires, switch and bulb, building scientific vocabulary about energy transfer within a closed circuit.", "c": "middle"}, {"t": "Micro:bit", "d": "Students use micro:bit light sensors to collect data comparing solar energy levels at different times of day, connecting to the solar energy writing exemplar ('Explain how solar energy works and why it is important') and the unit's investigation into sustainable energy alternatives.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph or draw something from their environment connected to energy types (electricity, fossil fuels, solar) and record a voice note explaining what they think is happening and why — capturing their scientific thinking before investigations begin.", "c": "beginning"}, {"t": "Book Creator", "d": "Students draw their prediction of what will happen when they explore energy helps us in daily life and record a voice note explaining their reasoning — creating a 'My Prediction' page to compare against results later.", "c": "beginning"}, {"t": "Seesaw", "d": "Students take photos of things around the school connected to energy transformation and add them to a shared class Seesaw activity, then the class sorts and discusses the collection — identifying patterns and questions to investigate.", "c": "beginning"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about energy types (electricity, fossil fuels, solar) with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 2", "th": "How We Organise Ourselves", "ci": "Technology can influence the way ecosystems can survive.", "lo": "An ecosystem has animals, plants and microorganisms; Technology can cause ecosystems to adapt and evolve; Technology can help or hinder ecosystems", "s": [{"t": "Canva Presentation", "d": "Students design a persuasive poster presenting their argument from the 'Should robots replace teachers?' writing task, incorporating evidence about how technology can both help and hinder ecosystems — connecting to The Wild Robot class novel where they explored different character perspectives on technology and nature.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Technology and Ecosystems' research book documenting the Robot Fact File (identifying important information, topic sentences vs detail), the Screens & Satellites investigation (evolution of TV, before and after the internet), and their developing understanding of how technology impacts ecosystems positively and negatively.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record a persuasive speech about technology's role in ecosystems, building on their summative persuasive writing that showcased personal opinions, understanding of ethical dilemmas through pros and cons, and the evolution of technology — referencing the class discussion where students arrived thinking technology is always good but left understanding its complex ethical impacts.", "c": "end"}, {"t": "Scratch", "d": "Students code a simple interactive ecosystem simulation showing how adding or removing technology affects the balance between animals, plants and microorganisms — connecting the robot coding activities to the unit's exploration of how technology influences ecosystem survival.", "c": "middle"}, {"t": "Seesaw", "d": "Students create a comic strip (building on the Evolution of TV comic strip activity) showing Before Technology vs After Technology in an ecosystem, using the T-chart and Because/But/So sentence structures practised during the Screens & Satellites investigation.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw or photograph an example of an ecosystem has animals, plants and microorganisms from their everyday life, then record a voice note explaining how it works — building a class collection of real-world connections before the inquiry begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph examples of technology can cause ecosystems to adapt and evolve around the school or home and create a Book Creator page sorting them into categories, with voice recordings explaining their grouping — practising the classification skills they will develop in the unit.", "c": "beginning"}, {"t": "Seesaw", "d": "Students respond to a class provocation about technology can help or hinder ecosystems by choosing one of three images on Seesaw and recording why it connects to their life — the teacher uses responses to form inquiry groups for the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about an ecosystem has animals, plants and microorganisms with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 2", "th": "Sharing the Planet", "ci": "To sustain life, people and environments depend on one another.", "lo": "Interdependence of people and environments; How people's wants and needs affect the land; Responsibility to use sustainable resources; Connection between fossil fuels and environmental impact", "s": [{"t": "Canva Presentation", "d": "Students design a persuasive 'Sustainable Planet' poster building on the Tug of War fossil fuels debate, incorporating their final gist statement vote and the solar energy and coral reef exemplars that introduced the connection between energy choices and environmental sustainability.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Sustaining Our Planet' report documenting their journey from the HTWW energy unit into understanding how fossil fuel use impacts environments, featuring their informational writing on fossil fuels and evidence about how Indigenous people look after the land differently from urban areas.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record an informational presentation about sustainable vs finite resources, demonstrating their understanding through the vocabulary built across both HTWW and STP units and connecting to the student-initiated inquiry about whether everyday devices could be charged by the sun instead of electricity.", "c": "end"}, {"t": "GarageBand", "d": "Students create a 'Sounds of the Seasons' composition connecting the Star Wars and Star Trek film music rhythm pattern activities to their Chinese language learning about seasons, exploring how music communicates ideas about nature and the planet across cultures.", "c": "middle"}, {"t": "Padlet", "d": "Students post their pros and cons sticky note opinions about fossil fuel use and sustainable alternatives, building a class debate board that tracks how their thinking evolved from the initial Tug of War provocation through to their final informed positions on environmental responsibility.", "c": "beginning"}, {"t": "Seesaw", "d": "Students draw what interdependence of people and environments means to them and record a voice note explaining their thinking — creating a 'Before' snapshot that will be compared with their 'After' understanding at the end of the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph or draw something from nature connected to how people's wants and needs affect the land and create a Book Creator page with labels and a voice note explaining why it matters — starting a personal inquiry book.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate interdependence of people and environments, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about interdependence of people and environments with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 3", "th": "Who We Are", "ci": "Health and wellbeing are impacted by the choices we make", "lo": "How our body systems connect and function; How our choices affect physical, emotional and mental wellbeing; Strategies to measure and maintain the health of the human body", "s": [{"t": "Book Creator", "d": "Students create a ‘Body Systems Information Report’ booklet on their chosen body system (digestive, respiratory, circulatory, skeletal), featuring hand-drawn diagrams, research notes from internet, books and videos, and their SPO-structured writing — building on the information report portfolio piece completed on Seesaw and shared across classes and with Year 4 students who studied the same systems.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a ‘Health and Wellbeing’ infographic connecting their fitness testing results (components of fitness linked to different sports) with healthy lifestyle strategies, incorporating the URStrong friendship fire vocabulary, Grow Your Mind characters (Guard Dog, ning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about strategies to measure and maintain the health of the human body using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of how our body systems connect and function and building on each other's thinking through comments and questions.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 3", "th": "Where We Are in Place and Time", "ci": "Many factors shape the development of cities.", "lo": "The essential features of a city; The function of a city; The development of cities through time", "s": [{"t": "Canva Presentation", "d": "Students design a city comparison presentation featuring their Venn Diagram analysis of Mexico City vs Paris, research from the Mega Cities YouTube videos about Tokyo and New York, and insights from Mr Rory Hyde’s incursion (architect and University of Melbourne lecturer) about urban planning in Shepparton and flood-prone design — explaining how demographic, density and social factors shape city development.", "c": "end"}, {"t": "Delightex (CoSpaces)", "d": "Students build a 3D virtual version of the class city they collaboratively created, coding interactive elements showing where buildings were strategically placed (hospital, school, green spaces) and incorporating natural disaster-resistant features learned from the STP unit — with labels in Chinese for city facilities and transport as explored in the Chinese Travel Project.", "c": "end"}, {"t": "Book Creator", "d": "Students create a ‘Cities of the World’ comic/graphic book using research from their partner-drafted comic pages about different world cities, including the sounds they recorded as QR codes to bring the city alive, and the clay house designs they built in Visual Art showing structural features like brick, weatherboard and colourbond textures.", "c": "end"}, {"t": "Google Earth", "d": "Students explore the cities they researched (Tokyo, New York, Paris, Mexico City, Shepparton) using satellite and street views, comparing urban layouts, transport networks, green spaces and building density — connecting to the post-it note city-building provocation where they discovered what happens when a city has no planning.", "c": "beginning"}, {"t": "GarageBand", "d": "Students create a city soundscape inspired by Mussorgsky’s ‘Pictures at an Exhibition’, selecting instruments to represent different parts of their class city (traffic, markets, parks, construction) and connecting to the music listening activities where they described how composers are inspired by their surroundings to create works representing city scenes.", "c": "middle"}, {"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to the essential features of a city, dropping pins and adding labels describing what they observe — building a visual map of existing knowledge before the class investigation begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about the function of a city in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the essential features of a city, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the essential features of a city and building on each other's thinking through comments and questions.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 3", "th": "How We Express Ourselves", "ci": "Methods of communication have different features which impact their effectiveness", "lo": "The forms of verbal, non-verbal and visual communication; How the correct form enhances the effectiveness of a message; How people interpret messages and bring their own meaning to interactions", "s": [{"t": "iMovie", "d": "Students produce their silent movie (planned, rehearsed and filmed with their group — choosing location, characters and costumes), demonstrating how non-verbal communication conveys meaning without words, then use the class-created success criteria for self and peer assessment of the final product — inspired by the Mr Bean clips (At the Dentist, The Hairdresser) that provoked discussion about body language and facial expressions.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a ‘Forms of Communication’ comparison poster analysing the advantages and disadvantages of different methods (as evaluated in their written responses), incorporating the See, Think, Wonder provocation findings, the Think-Pair-Share activity matching communication methods to purposes (friends, newsreaders, online influencers), and the class tally data of Year 3’s most-used communication forms.", "c": "end"}, {"t": "Adobe Express Video Creator", "d": "Students create a ‘Communication Through Time’ video exploring how modes of communication have developed to meet specific needs, featuring their research into Morse code, Braille and Auslan from Library sessions, the Ancient Egyptian hieroglyphics explored in Visual Art, and music signs and symbols (dynamics, tempo, legato/staccato) that composers use to direct performances.", "c": "end"}, {"t": "Scratch", "d": "Students build a Scratch game where the player is a 'Communication Agent' who receives incoming messages (a friend is upset, a news story needs reporting, a business needs to contact an interstate client, a family member overseas wants to catch up) and must drag each message to the correct communication method (face-to-face, phone call, email, video call, letter, social media). Speed and accuracy earn points, but choosing the wrong method triggers an animated consequence — the friend feels ignored by a text, the business loses the deal because of a casual message — connecting to the Think-Pair-Share scenarios and the unit's focus on how the correct form enhances the effectiveness of a message.", "c": "middle"}, {"t": "GarageBand", "d": "Students compose a short piece using dynamics and articulation (legato/staccato) to communicate different emotions without words, connecting to the music focus on how composers use signs, symbols, tempo and dynamics to shape expression — and the role of the conductor in interpreting and communicating musical ideas.", "c": "middle"}, {"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you the forms of verbal, non-verbal and visual communication?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page experimenting with different ways to express how the correct form enhances the effectiveness of a message — through images, text, drawing and recorded voice — reflecting on which medium communicates their idea most effectively.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about how people interpret messages and bring their own meaning to interactions using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the forms of verbal, non-verbal and visual communication, building a visual portfolio of evidence throughout the unit.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 3", "th": "How the World Works", "ci": "Materials behave and interact in certain ways, which poses challenges and solutions", "lo": "The three states of matter and their properties; How matter changes states depending on particles, temperature and energy; Responsible and ethical use of materials like glass and plastic", "s": [{"t": "Canva Presentation", "d": "Students design a ‘States of Matter’ scientific report poster documenting their ice cube melting experiment (measuring variables and recording observations), the Oobleck lesson exploring unusual material behaviour, and their five-senses observation chart from the Dr Binocs introduction — showing how solids, liquids and gases change states and connecting to real-world challenges like glacier melting.", "c": "end"}, {"t": "Book Creator", "d": "Students create a ‘Materials and Responsibility’ investigation report featuring their chocolate-making flow chart (showing changing states of matter from bean to bar), the BTN Glass and Plastic research about responsible usage, and their engineering design solution for slowing glacier melting — connecting the science of matter to the environmental responsibility of how materials like soft plastics are disposed of.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record a science demonstration explaining how matter changes states, using examples from their experiments (ice cube melting with measured variables, Oobleck behaviour) and the five-senses candy bar observation activity — incorporating the vocabulary of solids, liquids, gases and plasma that students were particularly interested in, and showing photos of examples they found around the classroom.", "c": "end"}, {"t": "Micro:bit", "d": "Students use micro:bit temperature sensors to collect data during the ice cube melting experiment, measuring how adding heat changes matter from solid to liquid, recording readings at intervals and connecting findings to the engineering challenge about what happens when glaciers change from solid to liquid due to global warming.", "c": "middle"}, {"t": "Scratch", "d": "Students code an interactive animation showing how particles behave in each state of matter (tightly packed solids, flowing liquids, spreading gases), with buttons to add or remove heat and watch the state change — connecting to the class discussions about how soft plastic recycling and reusable containers represent responsible material choices students initiated.", "c": "middle"}, {"t": "Mentimeter", "d": "Students respond to 'What do you already know about the three states of matter and their properties?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how how matter changes states depending on particles, temperature and energy works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot quiz testing common assumptions about responsible and ethical use of materials like glass and plastic — wrong answers reveal misconceptions the class will investigate, and the teacher uses results to differentiate inquiry groups.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the three states of matter and their properties, building a visual portfolio of evidence throughout the unit.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 3", "th": "How We Organise Ourselves", "ci": "Ethical decision making supports online choices.", "lo": "How choice of action and reaction affects others online; How informed choices can make a positive difference; Our right to feel safe online and the responsibility to make ethical decisions", "s": [{"t": "Scratch", "d": "Students code an interactive choose-your-own-adventure about online safety where choices lead to different ethical outcomes, building on the Cyber Safety Project lessons and the Timon and Pumbaa Safety Smart video — demonstrating understanding that things posted online are there forever and that informed choices can make a positive difference.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a digital citizenship guide showing the Online Essential Agreement they collaboratively created, with scenarios demonstrating ethical decision-making for different online situations — incorporating perspectives from the homework task where families discussed online usage and the class categorisation of apps/websites into communication, information and recreation.", "c": "end"}, {"t": "iMovie", "d": "Students produce a cyber safety awareness video demonstrating responsible online behaviour, using scenarios from the Cyber Safety Project lessons and real examples of ethical choices — connecting to the traffic light self-assessment where students evaluated how well they follow the Essential Agreement, and the student-initiated action of teaching siblings about being safe online.", "c": "end"}, {"t": "Kahoot", "d": "Students create an online safety quiz testing peers on ethical digital scenarios, incorporating questions about when to alert a teacher (like the student who reported a pop-up at home), how to evaluate trustworthy sources, and the difference between responsible and irresponsible online choices — used as a review tool connecting to the Principled Learner Profile focus.", "c": "middle"}, {"t": "Seesaw", "d": "Students document their iPad Essential Agreement reflections, recording examples of ethical online choices they’ve made at school and home — connecting to the unit’s discussion about how different family members use different platforms and why, and tracking  (earthquakes, volcanoes, tsunamis) and weather events (cyclones, tornadoes, floods, bushfires) — and how communities respond with resilience, drawing on the Japan case study about earthquake preparation.", "c": "end"}, {"t": "Book Creator", "d": "Students create a ‘Natural Disaster Survival Guide’ featuring their earthquake backpack sorting activity, the Japan earthquake preparation research (from Japanology videos and the PowerPoint), flood fact files, and their design comprehension work on building for disaster-prone environments — connecting to the student-initiated action of incorporating disaster-resistant features when designing buildings in the WWAIPAT city unit.", "c": "end"}, {"t": "iMovie", "d": "Students produce a news-style documentary report about their researched natural disaster using green screen to ‘report live’ from the location, incorporating behind-the-news style presentation of tectonic plates, the science of tsunamis, and how bushfire management connects to Indigenous cool burns vs European practices — referencing the BTN episodes and the poem ‘My Country’ by Dorothea Mackellar they learned.", "c": "end"}, {"t": "Micro:bit", "d": "Students use micro:bit accelerometers to create a simple earthquake detection model, programming it to display an alert when shaking is detected above a threshold — connecting to their research about how Japan measures earthquakes and uses early warning systems, and the class discussion about whether natural disasters can be prevented.", "c": "middle"}, {"t": "Seesaw", "d": "Students document their volcano investigation experiment and natural disaster science experiments with step-by-step photos and annotations, recording their self-assessment reflections (‘What have I done well? What am I proud of? What could I improve?’) and sharing peer feedback on their newspaper articles and disaster-resistant building designs.", "c": "middle"}, {"t": "Padlet", "d": "Students post an image, headline or question about the causes independent research into a chosen figure from the book series, structured around the who/what/when/why planner modelled with Mother Teresa in class, with connections drawn between the figure's leadership qualities and the class-generated list of attributes from the Lucky Dip activity, and their own reflections on what makes these qualities important.", "c": "end"}, {"t": "Canva", "d": "Students design a leadership attributes presentation showcasing the qualities identified through the collaborative brainstorm and Lucky Dip popsicle activity, explaining why each attribute is important for effective leadership with real examples from the Cross Campus Leadership Day, the Anthony Albanese provocation discussion, and their own experience fulfilling their portfolio role throughout the year.", "c": "end"}, {"t": "Seesaw", "d": "Students upload their collaborative work from each session including the partner brainstorm definitions of effective leadership, photographs of the attribute strips on the person outline, the ROAR Essential Agreement explanations written for Prep students, and their Little People Big Dreams research planner, building a portfolio of their developing leadership understanding across the unit.", "c": "beginning"}, {"t": "Padlet", "d": "Students create a collaborative reflection board documenting what they learn from each staff portfolio leader's presentation, listing the specific attributes required for each leadership role and connecting these to the class-generated attributes list, then using this resource to inform their personal portfolio applications and peer feedback sessions (two stars and a wish).", "c": "middle"}, {"t": "Padlet", "d": "Students respond to the provocation 'Leaders can help a group to function effectively' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on roles and responsibilities of effective leadership.", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to purpose of leadership — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate roles and responsibilities of effective leadership, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students design and conduct a class survey to gather perspectives on roles and responsibilities of effective leadership, analysing the response data to identify patterns and inform their ongoing inquiry.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 4", "th": "Where We Are in Place and Time", "ci": "Exploration and discovery have led to changes that shape the world we live in", "lo": "The age of exploration and the reasons explorers set out on their journeys; How Australia changed through European arrival; Different perspectives on the consequences of exploration", "s": [{"t": "Book Creator", "d": "Students create an 'Explorer Investigation' digital book presenting their independent research into a chosen explorer, structured around the who/what/when/why framework from the laminated card research task, including maps tracing the explorer's journey, key dates and discoveries, and their extended paragraph written from TWR note-taking, demonstrating their ability to turn research notes into clear, coherent writing.", "c": "end"}, {"t": "Canva", "d": "Students design a data chart presentation organising information gathered about multiple explorers during the Find Out phase, highlighting patterns and connections identified when sharing research with peers during Sort Out, and showing how Australia's landscape, demographics and identity changed significantly through European arrival, incorporating multiple perspectives on whether this was exploration or invasion.", "c": "end"}, {"t": "Google Earth", "d": "Students plot the journeys of the explorers they researched using the laminated cards, tracing routes from Europe to Australia and other destinations during the Age of Exploration (14th–16th century), adding location pins with key facts from their Seesaw research task, and comparing the historical maps they ordered from oldest to newest in the Tune In activity with modern satellite imagery of the same regions.", "c": "end"}, {"t": "Seesaw", "d": "Students complete the structured explorer research task documenting the who/what/when/why information for each explorer investigated using the laminated cards, uploading photographs of their map work tracing explorer movements, and recording peer feedback from the structured feedback moments where partners swapped research to identify key elements.", "c": "middle"}, {"t": "Scratch", "d": "Students create an interactive timeline animation showing the Age of Exploration, programming explorer sprites to move along their routes with pop-up information cards displaying key facts gathered from the Inquisitive video and laminated card research, helping them visualise the sequence of discoveries and the connections between different explorers' journeys.", "c": "middle"}, {"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to the age of exploration and the reasons explorers set out on their journeys, dropping pins and adding labels describing what they observe — building a visual map of existing knowledge before the class investigation begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about how australia changed through european arrival in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Google Earth", "d": "Students take a virtual field trip using Google Earth to explore locations connected to different perspectives on the consequences of exploration, recording observations in a shared document — building geographic context and generating inquiry questions before the unit investigation begins.", "c": "beginning"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the age of exploration and the reasons explorers set out on their journeys and building on each other's thinking through comments and questions.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 4", "th": "How We Express Ourselves", "ci": "The creative process involves understanding and applying artistic elements to communicate ideas and emotions across disciplines", "lo": "How colour, movement and music communicate character and mood; The creative process of making a multi-disciplinary presentation; The effort and commitment required to produce a live performance", "s": [{"t": "iMovie", "d": "Students film and edit their Beijing Opera partnership vignette performance featuring their chosen character (clown, warrior, villain or female character), incorporating their hand-painted character mask, scripted backstory, exaggerated mime movements and body acting, and musical ensemble accompaniment, then adding a narrated reflection explaining how their colour choices express their character's personality traits as studied in Chinese class.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Beijing Opera Creative Portfolio' documenting the entire creative process from the See-Think-Wonder provocation through to final assembly performance, including photographs of their character mask design process, their written script and character backstory (e.g. 'My character is a greedy thief who is always hiding behind trash cans'), rehearsal reflections, and the success criteria co-created in class used for self-assessment.", "c": "end"}, {"t": "Canva", "d": "Students design a comparative presentation exploring the meaning of colours across different cultures studied in Chinese class, connecting their findings to the colour choices made for their Beijing Opera mask, and showing how the same colour can express different character traits and personalities depending on cultural context, drawing on the See-Think-Wonder observations about why Beijing Opera masks are so exaggerated.", "c": "end"}, {"t": "GarageBand", "d": "Students compose and record their musical ensemble piece for the Beijing Opera performance in partnership groups, experimenting with tempo and dynamics to create mood and introduce their character, building on Year 3 skills of using tempo and dynamics to create drama in music, and selecting instruments that match the tradition of Chinese opera as explored during the Find Out phase.", "c": "beginning"}, {"t": "Seesaw", "d": "Students upload their ongoing portfolio pieces to the shared Seesaw portfolio including the See-Think-Wonder response, character mask design with colour justification, script drafts incorporating peer feedback, rehearsal video reflections, and the final recorded performance, using the co-created success criteria to self-assess their story, film and reflection components.", "c": "beginning"}, {"t": "Pico VR", "d": "Students use Pico VR to experience immersive Beijing Opera performance footage as an extension of their See-Think-Wonder provocation, observing the colour meanings in character masks (clown, warrior, villain, female) up close before designing their own masks and rehearsing their vignette performances.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate how colour, movement and music communicate character and mood, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of how colour, movement and music communicate character and mood and building on each other's thinking through comments and questions.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students design and conduct a class survey to gather perspectives on how colour, movement and music communicate character and mood, analysing the response data to identify patterns and inform their ongoing inquiry.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 4", "th": "How the World Works", "ci": "Engineers design and build structures using specific features and materials to make them strong, stable and fit for purpose", "lo": "Different types of bridges and their design features; How materials and engineering principles contribute to structural strength and stability; Testing and refining designs through experimentation", "s": [{"t": "Book Creator", "d": "Students create a 'Bridge Engineering Investigation' digital book documenting their Seesaw research into different bridge types (beam, truss, suspension), including labelled diagrams of design features that contribute to stability, photographs of their partner-built bridge before and after coin testing, their analysis of the Tacoma Bridge Collapse, and reflections on what made some bridges stronger than others during the class testing discussion.", "c": "end"}, {"t": "Canva", "d": "Students design a bridge redesign presentation showing their See Think Wonder observations from the Tune In provocation, their Tacoma Bridge Collapse analysis identifying design flaws, their own bridge's coin-testing performance data, and annotated photographs explaining the engineering features they incorporated and the specific modifications they would make to improve load-bearing capacity based on what they observed during whole-class bridge testing.", "c": "end"}, {"t": "Tinkercad", "d": "Students create a 3D digital model of their bridge design, applying knowledge of beam, truss and suspension bridge features learned during the Seesaw research task, demonstrating how appropriate design features and materials ensure structural stability, and comparing their refined digital design with the physical bridge they constructed with their partner during the Building Bridge Challenge.", "c": "end"}, {"t": "Seesaw", "d": "Students document their bridge-building process by uploading photographs at each stage of the Building Bridge Challenge, recording their design decisions and communication with their partner, reflecting on how they applied research findings about bridge stability when selecting features, and sharing their coin-testing results with the class through the collaborative discussion about what makes some bridges stronger.", "c": "middle"}, {"t": "Micro:bit", "d": "Students program a Micro:bit sensor to measure and digitally display the load placed on their bridge during testing, replacing the manual coin-counting method with digital data collection that records each addition, and comparing results across different bridge designs to identify which engineering features (beam, truss, suspension) contributed most to stability and load-bearing capacity.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to navigate across their bridge constructions during the Building Bridge Challenge, testing whether beam, truss, and suspension designs can support the rolling weight just as they tested with coins, adding a coding dimension to their partner engineering investigations.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build a motorised Lego Spike drawbridge or lifting mechanism as an extension of the Building Bridge Challenge, programming the motor to raise and lower while testing structural integrity, connecting to their Seesaw research on beam, truss, and suspension bridge types and the Tacoma Bridge Collapse analysis.", "c": "middle"}, {"t": "Mentimeter", "d": "Students respond to 'What do you already know about different types of bridges and their design features?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how how materials and engineering principles contribute to structural strength and stability works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot quiz testing common assumptions about testing and refining designs through experimentation — wrong answers reveal misconceptions the class will investigate, and the teacher uses results to differentiate inquiry groups.", "c": "beginning"}]}, {"ca": "St Kilda", "yl": "Year 4", "th": "How We Organise Ourselves", "ci": "Not-for-profit organisations exist to respond to a variety of needs within our community", "lo": "The function and purpose of not-for-profit organisations; How not-for-profit organisations respond to community needs; Our responsibility to take action and make a difference", "s": [{"t": "Book Creator", "d": "Students create a 'Not-For-Profit Organisation Profile' digital book documenting their partner research into two NFP organisations, including the data chart information (name, function/purpose, who they help, local/national/global reach), photographs of their research whiteboards from the 4P partner and group collaboration stages, and reflections on the big issues each organisation addresses such as those supported by the Cancer Council, Beyond Blue, OzHarvest and ARDOCH.", "c": "end"}, {"t": "Canva", "d": "Students design promotional flyers and posters for their chosen community action (OzHarvest 50-cent meal donations, St Kilda Mums collection, Lions Club book drive, ARDOCH tinned food drive, or artwork sales with Prep students), incorporating the persuasive action slogans developed in class, formatted to contribute to the flyer quilt of actions displayed and distributed across the Junior School.", "c": "end"}, {"t": "iMovie", "d": "Students create a short documentary showcasing their group's community action journey from identifying the big issue through to organising their contribution drive, including interviews with group members explaining why they chose their particular action, footage of their Junior School classroom visits promoting the different actions, and their Great Space display where contributions were collected, celebrating that the cohort raised over $1,500 plus 200 cans and 250 books.", "c": "end"}, {"t": "Seesaw", "d": "Students document their NFP research process by recording their initial 'What do I think I know? What would I like to find out?' responses about wants and needs, then uploading photographs of their partner whiteboard research and group data charts showing the function, purpose and reach of each organisation investigated, using the Seesaw research task links provided to access NFP websites.", "c": "beginning"}, {"t": "Microsoft Forms", "d": "Students create a peer and self-assessment survey for their collaborative group work during the action planning phase, rating teamwork skills after each session and formulating individual and group goals for the next session as referenced in the planner's ongoing assessment, supporting growth in collaboration and self-management skills throughout the fundraising and collection drive experience.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with the function and purpose of not-for-profit organisations — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of how not-for-profit organisations respond to community needs as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the function and purpose of not-for-profit organisations, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the function and purpose of not-for-profit organisations and building on each other's thinking through comments and questions.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 4", "th": "Sharing the Planet", "ci": "First Nations people have a deep connection to Country, language and culture", "lo": "The diversity of language and culture across First Nations communities in Australia; The significance of connection to Country as custodial responsibility; Listening to and learning from Indigenous perspectives", "s": [{"t": "iMovie", "d": "Students create a documentary about their understanding of First Nations connection to Country, incorporating footage and reflections from the Melbourne Museum First Nations exhibition excursion, their soundscape performances representing pages from 'Australia from Dawn to Dusk' by Brentos, and narration explaining the concept of Country as custodial responsibility rather than ownership, as defined during the Tune In phase.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Connection to Country' digital book featuring their acrylic canvas painting alongside their written artist's statement explaining the personal and First Nations symbols used in their artwork (inspired by Khatija Possum's techniques), photographs of their painting process, and their four-paragraph information report exploring life before colonisation, how colonisers arrived, the conflict that resulted, and the aftermath.", "c": "end"}, {"t": "Canva", "d": "Students design a comparative presentation using their Venn diagram research comparing two indigenous countries (such as the Arrernte people), incorporating information gathered from the Seesaw research tasks about similarities and differences in language, culture, art, landscape, food and animals, and connecting to the concept that different First Nations countries across Australia are as diverse as countries across Europe.", "c": "end"}, {"t": "GarageBand", "d": "Students collaborate in groups to create their soundscape representing a page from 'Australia from Dawn to Dusk', experimenting with digital instruments and recorded sounds to evoke a specific time of day, Australian animals, scenery and location, building on the musical decision-making practised during Sort Out where groups chose how to represent the landscape and atmosphere of their assigned page.", "c": "middle"}, {"t": "Seesaw", "d": "Students document their ongoing inquiry by uploading notes from the desert people video (recording similarities and differences with their own lives), photographs and reflections from the Melbourne Museum excursion booklet, responses after the visit from the Wesley Indigenous Program, and their painting plan with detailed artwork storyline, tracking their developing understanding of diversity across First Nations communities.", "c": "middle"}, {"t": "DJI Drone (teacher-operated)", "d": "DLC captures aerial footage of the school grounds and local environment before and after the Melbourne Museum excursion, providing a bird's-eye perspective of Country that students compare with the Khatija Possum canvas painting style and the 'Australia from Dawn to Dusk' soundscape imagery studied during the unit.", "c": "middle"}, {"t": "Padlet", "d": "Students post an image, headline or question about the diversity of language and culture across first nations communities in australia on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to the significance of connection to country as custodial responsibility — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about listening to and learning from indigenous perspectives using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}]}, {"ca": "St Kilda", "yl": "Year 5", "th": "Who We Are", "ci": "Values, beliefs and actions contribute to a diverse society", "lo": "How our values and beliefs shape our identity and interactions; Our responsibility to manage emotions and be safe online and in person; The importance of resilience, respect and positive relationships in a diverse community", "s": [{"t": "Canva", "d": "Students design a 'CyberSafety Golden Rule' infographic presenting the personal online safety rule they created during the Cyber Safety Project, incorporating strategies learned across the 16 CyberSafety lessons about responsible technology use, being an upstander, recognising online scams, and protecting personal information, with visual examples of how to apply their rule in real scenarios.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Values, Beliefs and Actions' portfolio book documenting their learning journey across the three wellbeing programs (URStrong, CyberSafety and Grow Your Mind), including their Essential Agreement commitments, their 't-shirt about me' identity activity, strategies for resolving friendship fires, the GYM animals in your brain concepts, and personal reflections on how their values and beliefs have developed through the year.", "c": "end"}, {"t": "iMovie", "d": "Students produce a wellbeing strategies video demonstrating key concepts from the Grow Your Mind program (the animals in your brain) and URStrong friendship fire resolution techniques, role-playing scenarios that show the difference between social misunderstandings and purposeful hurtful behaviour, and explaining what resilience looks like in their own lives using examples from camp, the Future Thinkers' Forum and everyday school interactions.", "c": "end"}, {"t": "Seesaw", "d": "Students complete the structured portfolio tasks throughout the unit including the CyberSafety 'Create your own golden rule' response, the GYM 'Sharing problems' reflection on trusted adults, the unit evaluation, and ongoing goal-setting reflections, building a documented record of their developing understanding of responsible online behaviour and positive relationship strategies.", "c": "middle"}, {"t": "Kahoot", "d": "Students create interactive quizzes for their peers based on key concepts from the 16 CyberSafety lessons and 11 URStrong sessions, testing classmates' knowledge of online safety strategies, friendship fire resolution techniques, upstander behaviours, and the difference between values, beliefs and actions, reinforcing learning through peer-teaching during the Find Out phase.", "c": "middle"}, {"t": "Padlet", "d": "Students respond to the provocation 'Values, beliefs and actions contribute to a diverse society' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on how our values and beliefs shape our identity and interactions.", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to our responsibility to manage emotions and be safe online and in person — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about the importance of resilience, respect and positive relationships in a diverse community using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of how our values and beliefs shape our identity and interactions and building on each other's thinking through comments and questions.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 5", "th": "Where We Are in Place and Time", "ci": "Colonisation has had a lasting impact on different countries and their people", "lo": "The reasons, methods and impact of colonisation; How colonisation transformed society and culture; The responsibility of colonisers and the perspectives of those colonised", "s": [{"t": "Canva", "d": "Students design their colonisation research PowerPoint presentation for the oral assessment, structured around the SAT questions that allow them to show personal perspectives alongside research skills, incorporating information gathered from the ClickView videos on colonising Australia and Terra Nullius, their library research sessions, and connections to the class novel 'Convict Boy', with peer assessment feedback integrated into the final version.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Perspectives on Colonisation' digital book documenting their developing understanding from the Tune In provocation with 'The Rabbits' by Shaun Tan (including their sunglasses perspective drawings showing motivations and experiences of different groups) through to their research into British colonisation, the mini SAT on Britain completed as a class, and their Go Further connections to modern conflicts where colonisation and invasion are still occurring.", "c": "end"}, {"t": "iMovie", "d": "Students produce a documentary presenting their research into the colonisation of a chosen country, incorporating the note-taking and summarising skills developed during the Australian History video template activity, multiple perspectives on whether European arrival constituted exploration or invasion (building on Year 4 WWAIPAT learning), and reflections connecting to Tom Appleby's memories from the class novel 'Convict Boy'.", "c": "end"}, {"t": "Seesaw", "d": "Students upload their SAT research task demonstrating understanding of the reasons, methods and impact of colonisation, including their personal perspective responses, their notes from the ClickView Terra Nullius and Colonising Australia videos, and peer assessment feedback received during their oral presentations to the class where classmates evaluated both content quality and presentation skills.", "c": "middle"}, {"t": "Google Earth", "d": "Students trace the routes and territories of colonial powers across the globe, comparing the British Empire's reach documented in their class mini SAT with other colonial territories, adding location pins with key dates and impacts at each colonised region, and connecting their Year 4 WWAIPAT knowledge about the Age of Exploration to the broader pattern of colonisation studied in this unit.", "c": "middle"}, {"t": "Pico VR", "d": "Students use Pico VR to explore historical sites and environments connected to British colonisation, virtually visiting locations referenced during the ClickView Terra Nullius viewing and the Convict Boy class novel, building contextual understanding before completing their British colonisation mini SAT and oral presentations with peer assessment.", "c": "middle"}, {"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to the reasons, methods and impact of colonisation, dropping pins and adding labels describing what they observe — building a visual map of existing knowledge before the class investigation begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about how colonisation transformed society and culture in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Google Earth", "d": "Students take a virtual field trip using Google Earth to explore locations connected to the responsibility of colonisers and the perspectives of those colonised, recording observations in a shared document — building geographic context and generating inquiry questions before the unit investigation begins.", "c": "beginning"}]}, {"ca": "St Kilda", "yl": "Year 5", "th": "How We Express Ourselves", "ci": "Social norms and stereotypes can influence the way people express themselves", "lo": "How stereotypes and social norms form and persist in society; The impact of discrimination, prejudice and assumptions on individuals and communities; How people overcome stereotypes to express themselves and inspire change", "s": [{"t": "Canva", "d": "Students design their Famous People Infographic using the PowerPoint template structure, presenting research into a person who overcame a stereotype, prejudice, discrimination or social norm and paved the way for others, including key facts about what they faced, how they expressed themselves despite barriers, and their lasting impact on society, ready for sharing in mixed small groups during the peer feedback sessions.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Breaking Stereotypes' digital book documenting their inquiry journey from the Gallery Walk See-Think-Wonder provocation through to their final reflections, including their prior knowledge responses about different forms of expression, their analysis of stereotypes in society from the worksheet activities, the Graffiti Article discussion, and their own perspective on questions raised such as 'What does freedom mean?' and 'Are all stereotypes bad?'.", "c": "end"}, {"t": "Adobe Express Video Creator", "d": "Students create a short awareness video inspired by the student-initiated posters and slogans displayed in the classroom, presenting scenarios from the Stereotypes Scenarios activity and demonstrating how discrimination, prejudice and assumptions can be forms of disrespect, drawing on what they learned from the guest manga illustrator speaker about how art can convey powerful messages that challenge social norms.", "c": "end"}, {"t": "Seesaw", "d": "Students complete the structured rights activist research task, choosing a significant human or animal rights activist, documenting how that person's actions positively influenced society and connecting their story to the concept that people use expression to overcome stereotypes, then sharing their presentation with grouped peers for formal peer feedback using the Seesaw platform.", "c": "middle"}, {"t": "Padlet", "d": "Students build a collaborative class gallery of examples of stereotypes identified in everyday life and the classroom (connecting to the student-initiated action of spotting stereotypes around them), adding images, articles and reflections that extend the Gallery Walk provocation throughout the unit, and discussing how cultural trends and history have led to specific stereotypes forming.", "c": "beginning"}, {"t": "GarageBand", "d": "Students compose original soundtracks or jingles in GarageBand to accompany their awareness posters and slogans for the student action campaign against stereotypes, selecting instruments and moods that reinforce their message, inspired by the media techniques analysed during the Graffiti Article discussion and Famous People Infographics research.", "c": "middle"}, {"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you how stereotypes and social norms form and persist in society?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page experimenting with different ways to express the impact of discrimination, prejudice and assumptions on individuals and communities — through images, text, drawing and recorded voice — reflecting on which medium communicates their idea most effectively.", "c": "beginning"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of how stereotypes and social norms form and persist in society and building on each other's thinking through comments and questions.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 5", "th": "How the World Works", "ci": "Inventions and initiatives are a response to the changing needs of society", "lo": "How inventions have changed over time to meet the demands of society; The UN Sustainable Development Goals and the global problems they address; Using the design thinking process to create innovations that respond to real-world needs", "s": [{"t": "Canva", "d": "Students use Canva (including the AI image feature demonstrated by the DLP in the dedicated session) to create a digital prototype visualisation of their group's SDG-connected invention for the Future Thinkers' Forum, incorporating their design thinking journey from Empathise through to Test, with the image added to the back cover of their FTF booklet alongside the chosen SDG goal on the front for guest feedback on the night.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Changed Over Time' digital book documenting how their chosen modern invention (from categories including household, transport, communication, navigation, health, manufacturing, energy, recording or entertainment) has evolved across decades, showing the three significant changes that met changing societal demands, and connecting to the 'Everything is a Remix' concept that new inventions are a copy, transformation or combination of existing ideas.", "c": "end"}, {"t": "iMovie", "d": "Students produce a Shark Tank-style invention pitch video presenting their group's SDG-connected invention to a panel, explaining which Sustainable Development Goal it addresses, how they followed the d:school design process (Empathise, Define, Ideate, Prototype, Test), what need in society it responds to, and how it works, incorporating feedback received from peers and families at the Future Thinkers' Forum stalls.", "c": "end"}, {"t": "Seesaw", "d": "Students document their science investigations by uploading observations and findings from the Light Boxes and Steam lab sessions with Stefan, recording their SDG ordering and grouping decisions with justifications for their priority rankings, and completing the final unit reflection task evaluating what they learned about the design process and how inventions respond to the changing needs of society.", "c": "beginning"}, {"t": "Microsoft Excel", "d": "Students create a data tracking spreadsheet to organise their SDG research from the T-Chart investigation (recording key facts and figures from the infographic posters for their three chosen goals), then use this structured data to identify which global problems their group feels most passionate about addressing, directly informing the Microsoft Forms preference survey used to form FTF invention groups.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build motorised invention prototypes using Lego Spike during the Light Boxes and STEAM lab sessions with Stefan, applying the d:school design process (empathise, define, ideate, prototype, test) to create working models that address an SDG challenge identified during the SDG ordering, grouping, and T-chart activities.", "c": "end"}, {"t": "CoDrone EDU", "d": "Students explore drone technology as a modern invention during the Changed Over Time decades research, programming CoDrone EDU flight paths to demonstrate how innovations build on each other as explored in 'Everything is a Remix', and investigating how drones connect to specific SDGs such as sustainable agriculture or disaster response.", "c": "middle"}, {"t": "Micro:bit", "d": "Students program micro:bit sensors to collect environmental data (temperature, light, sound) as part of their invention prototypes during the STEAM lab sessions with Stefan, connecting sensor technology to SDG solutions and presenting their data at the Future Thinkers' Forum alongside their design process booklets.", "c": "middle"}, {"t": "Mentimeter", "d": "Students respond to 'What do you already know about how inventions have changed over time to meet the demands of society?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how the un sustainable development goals and the global problems they address works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}]}, {"ca": "St Kilda", "yl": "Year 5", "th": "How We Organise Ourselves", "ci": "Goods and services are exchanged within a marketplace", "lo": "The production of goods from raw materials through manufacturing to consumer; The exchange of currency for goods and services in a functioning economy; Ethics and responsible decision-making in the marketplace", "s": [{"t": "Microsoft Excel", "d": "Students manage their suburb simulation personal budget using the pre-coded spreadsheet with formulas, tracking their startup bonus, role salary payments, fines, rent, utilities and business income/expenses, performing scheduled and surprise reconciliations of receipts against their spreadsheet entries, and analysing profit and loss to make informed decisions about pricing, supply and demand in their student-run businesses.", "c": "end"}, {"t": "Canva", "d": "Students design professional business proposal presentations for their student-created businesses within the suburb simulation, including their business name and logo, the goods or services offered, pricing strategy informed by supply and demand principles learned through Sam's Soccer Ball Factory activity, and their ethical business practices, ready for presentation at city meetings where peers evaluate and provide feedback.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Marketplace Economics' digital book documenting their learning journey from the Define/Connect/Extend vocabulary activity through to the suburb simulation, including their production chain diagrams showing primary, secondary and final stages plus distribution, cause and effect analysis from the BTN clips on cost of living and inflation, and personal reflections on how ethics influenced their business decisions and customer relationships.", "c": "end"}, {"t": "Seesaw", "d": "Students complete the unit evaluation reflection task documenting what they learned about how supply and demand drive an economy, how ethics affect business success (referencing specific examples from their suburb trading experiences such as adjusting prices based on customer demand), and how managing a real budget with spreadsheets helped them understand the connection between consumer behaviour and the marketplace.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students design customer satisfaction surveys for their student-run businesses within the suburb simulation, gathering peer feedback on product quality, pricing fairness and ethical practices, then analysing the response data during city and suburb meetings to make evidence-based decisions about improving their goods and services and adjusting their business strategies for
