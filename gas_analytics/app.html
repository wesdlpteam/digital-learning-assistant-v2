<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wesley Digital Learning Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#111111;--sf:#1A1A1A;--tx:#F2F2F2;--mt:#999;--bd:#2A2A2A;--ac:#CDEB45;--ac2:#7ED957;--hl:#222}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.hd{background:var(--bg);position:sticky;top:0;z-index:100;caret-color:transparent}
.hi{max-width:700px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:10px;user-select:none}
.logo{height:34px;width:auto;border-radius:4px;mix-blend-mode:lighten}
.bk{background:var(--hl);border:none;color:#fff;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s}
.bk:hover{background:#333}
.hd h1{color:#FFF;font-size:15px;font-weight:700;letter-spacing:-.3px}
.hd-sub{color:#999;font-size:11px;font-weight:500;margin-top:1px}

.wp{max-width:700px;margin:0 auto;padding:0 20px 80px}
.fd{animation:fu .3s ease both}@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
#app{min-height:100vh}
.tab-fade .fd{animation:tf .15s ease both}@keyframes tf{from{opacity:.6}to{opacity:1}}

.hero{margin:24px 0 36px}
.hero-title{font-size:clamp(36px,9vw,56px);font-weight:700;line-height:1.08;letter-spacing:-2px;color:#FFF}
.hero-accent{color:var(--ac)}
.hero-sub{font-size:15px;color:var(--mt);margin-top:16px;line-height:1.6;max-width:400px}

.tag{display:inline-block;font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px;background:var(--hl);color:#FFF;letter-spacing:.2px}
.tag-t{display:inline-block;font-size:10px;font-weight:700;padding:4px 12px;border-radius:99px;background:rgba(0,0,0,.15);letter-spacing:.3px}
.tag-tool{display:inline-block;font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px;letter-spacing:.2px}
.tag-meta{display:inline-block;font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px;background:var(--hl);color:#BBB}

.cc{border-radius:20px;padding:28px;margin-bottom:12px;cursor:pointer;transition:transform .15s;position:relative;overflow:hidden}
.cc:hover{transform:scale(1.01)}
.cc-wm{position:absolute;right:-20px;bottom:-20px;font-size:110px;font-weight:800;opacity:.1;line-height:1;letter-spacing:-6px;pointer-events:none}
.cc-inner{position:relative;z-index:1}
.cc-name{font-size:26px;font-weight:700;letter-spacing:-.5px}
.cc-sub{font-size:14px;margin-top:4px;font-weight:500}

.sec-title{font-size:clamp(28px,7vw,36px);font-weight:700;margin-top:14px;letter-spacing:-1px;color:#FFF;line-height:1.15}

.yg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.yc{background:var(--sf);border-radius:16px;padding:22px 18px;cursor:pointer;transition:all .15s;border:2px solid var(--bd);position:relative;overflow:hidden}
.yc:hover{border-color:var(--ac);background:rgba(205,235,69,.05);transform:translateY(-3px)}
.yc-dot{width:14px;height:14px;border-radius:4px;margin-bottom:14px}
.yc h3{font-size:20px;font-weight:700;letter-spacing:-.3px}.yc .cn{font-size:12px;color:var(--mt);margin-top:4px}

.uc{border-radius:16px;padding:20px 22px;margin-bottom:10px;cursor:pointer;transition:transform .15s;position:relative;overflow:hidden}
.uc:hover{transform:scale(1.01)}
.uc-emoji{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:48px;opacity:.3;pointer-events:none}
.uc-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;opacity:.5;margin-bottom:4px}
.uc-name{font-size:20px;font-weight:700;letter-spacing:-.3px;max-width:80%;line-height:1.2;color:inherit}

.dh{border-radius:20px;padding:28px 26px;margin:16px 0 20px;position:relative;overflow:hidden}
.dh-wm{position:absolute;right:-10px;bottom:-10px;font-size:100px;opacity:.15;line-height:1;pointer-events:none}
.dh-title{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1.15}
.dh-ci{font-size:15px;opacity:.8;margin-top:10px;line-height:1.6;font-style:italic}

.loi-box{background:var(--sf);border-radius:16px;padding:20px 22px;margin-bottom:20px;border:2px solid var(--bd)}
.loi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mt);margin-bottom:12px}
.loi-item{padding:10px 0;border-bottom:1px solid var(--bd);font-size:14px;line-height:1.55;color:#EEE}
.loi-item:last-child{border-bottom:none}
.loi-num{font-weight:700;margin-right:8px}

.tb{display:flex;gap:6px;margin-bottom:18px;background:var(--sf);border-radius:14px;padding:5px}
.tt{flex:1;padding:12px 8px;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--mt);transition:all .2s;letter-spacing:-.2px}
.tt.on{background:var(--ac);color:#111}
.tt-count{font-weight:600;opacity:.7;font-size:11px}

.sg{background:var(--sf);border:2px solid var(--bd);border-radius:16px;overflow:hidden;margin-bottom:14px;transition:border-color .15s}
.sg:hover{border-color:var(--ac)}
.sg-pending{background:transparent;border:2px dashed #333;border-radius:16px;padding:28px 24px;margin-bottom:14px;text-align:center}
.sg-pending-icon{font-size:40px;margin-bottom:12px}
.sg-pending-title{font-size:16px;font-weight:700;color:#F5A623;margin-bottom:8px}
.sg-pending-msg{font-size:14px;line-height:1.6;color:#888;max-width:400px;margin:0 auto}
.sg-pending-cta{display:inline-block;margin-top:16px;font-size:13px;font-weight:600;color:#CDEB45;background:#CDEB4515;padding:8px 18px;border-radius:99px;border:1px solid #CDEB4530;text-decoration:none;cursor:pointer;transition:all .15s}
.sg-pending-cta:hover{background:#CDEB4530;color:#FFF}
.sg-head{padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bd)}
.sg-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sg-meta{flex:1}
.sg-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mt)}
.sg-tool{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-top:2px}
.sg-body{padding:16px 20px 20px}
.sg-desc{font-size:14px;line-height:1.7;color:#F2F2F2}
.sg-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
.sg-section{margin-top:16px}
.sg-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mt);margin-bottom:6px}
.sg-label svg{width:15px;height:15px;flex-shrink:0}
.vb{background:rgba(205,235,69,.08);border-left:3px solid var(--ac);padding:11px 15px;border-radius:0 10px 10px 0;font-size:13px;color:#CDEB45;line-height:1.55;font-style:italic}

.cur-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.cur-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;border:2px solid var(--bd);background:var(--sf);color:var(--tx);transition:all .2s;user-select:none}
.cur-pill:hover{border-color:var(--ac);background:rgba(205,235,69,.05)}
.cur-pill.open{border-color:var(--ac);background:rgba(205,235,69,.08)}
.cur-pill svg{width:12px;height:12px;transition:transform .2s;flex-shrink:0}
.cur-pill.open svg{transform:rotate(180deg)}
.cur-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cur-detail{overflow:hidden;max-height:0;transition:max-height .2s ease-out,padding .2s ease-out;padding:0 14px;background:rgba(205,235,69,.06);border-left:3px solid var(--ac);border-radius:0 8px 8px 0;font-size:12.5px;color:#CDEB45;line-height:1.5;margin-top:0}
.cur-detail.open{max-height:300px;padding:10px 14px;margin-top:6px;transition:max-height .3s ease-in,padding .3s ease-in}
.cur-detail b{font-weight:700}
.cur-detail li{color:#DDD}

.bb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:var(--ac);color:#111;border:none;border-radius:16px;padding:18px 24px;font-family:inherit;font-size:17px;font-weight:700;text-decoration:none;cursor:pointer;width:100%;margin-top:24px;letter-spacing:-.3px;transition:transform .15s}
.bb:hover{transform:scale(1.01)}
.bb-sub{font-size:12px;font-weight:500;opacity:.6}

@media(max-width:480px){.hero-title{font-size:36px}.cc-name{font-size:22px}.cc-wm{font-size:80px}}

.atl-section{margin-top:16px}
.atl-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.atl-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;border:2px solid var(--bd);background:var(--sf);color:var(--tx);transition:all .2s;user-select:none}
.atl-pill:hover{border-color:#F5A623;background:rgba(245,166,35,.05)}
.atl-pill.open{border-color:#F5A623;background:rgba(245,166,35,.08)}
.atl-pill svg{width:12px;height:12px;transition:transform .2s;flex-shrink:0}
.atl-pill.open svg{transform:rotate(180deg)}
.atl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.atl-detail{overflow:hidden;max-height:0;transition:max-height .2s ease-out,padding .2s ease-out;padding:0 14px;background:rgba(245,166,35,.06);border-left:3px solid #F5A623;border-radius:0 8px 8px 0;font-size:12.5px;color:#F5A623;line-height:1.5;margin-top:0}
.atl-detail.open{max-height:300px;padding:10px 14px;margin-top:6px;transition:max-height .3s ease-in,padding .3s ease-in}
.atl-detail b{font-weight:700}
.atl-detail li{color:#DDD;margin-bottom:4px}

.sg-tool a:hover{text-decoration-color:#FFF}

.sg-fb{display:flex;align-items:center;margin-top:16px;padding-top:14px;border-top:1px solid var(--bd)}
.sg-fb-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:6px 14px;border-radius:99px;cursor:pointer;text-decoration:none;border:1.5px solid var(--bd);color:#888;transition:all .15s;background:none;font-family:inherit}
.sg-fb-btn:hover{border-color:#CDEB45;color:#CDEB45;background:rgba(205,235,69,.06)}
.fb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.fb-overlay.open{opacity:1;pointer-events:all}
.fb-modal{background:#1A1A1A;border:2px solid #333;border-radius:20px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.fb-title{font-size:18px;font-weight:700;color:#FFF;margin-bottom:4px}
.fb-sub{font-size:12px;color:#888;margin-bottom:20px}
.fb-context{font-size:13px;color:#CDEB45;background:#CDEB4510;border:1px solid #CDEB4530;border-radius:10px;padding:10px 14px;margin-bottom:16px;line-height:1.5}
.fb-label{font-size:12px;font-weight:600;color:#AAA;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fb-textarea{width:100%;min-height:100px;background:#111;border:2px solid #333;border-radius:12px;color:#FFF;font-family:inherit;font-size:14px;padding:12px;resize:vertical;outline:none;transition:border-color .15s;box-sizing:border-box}
.fb-textarea:focus{border-color:#CDEB45}
.fb-textarea::placeholder{color:#555}
.fb-actions{display:flex;gap:10px;margin-top:16px}
.fb-submit{flex:1;padding:12px;border:none;border-radius:12px;background:#CDEB45;color:#111;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}
.fb-submit:hover{background:#D8F050;transform:scale(1.01)}
.fb-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.fb-cancel{padding:12px 20px;border:2px solid #333;border-radius:12px;background:none;color:#888;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.fb-cancel:hover{border-color:#555;color:#CCC}
.fb-success{text-align:center;padding:20px 0}
.fb-success-icon{font-size:48px;margin-bottom:12px}
.fb-success-msg{font-size:16px;font-weight:600;color:#CDEB45}
.fb-success-sub{font-size:13px;color:#888;margin-top:6px}

.sg-collapse{cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;padding:8px 0}
.sg-collapse:hover .sg-label{opacity:1}
.sg-collapse .sg-label{opacity:.7;transition:opacity .15s;margin:0}
.sg-collapse svg{width:14px;height:14px;color:#888;transition:transform .2s;flex-shrink:0}
.sg-collapse.open svg{transform:rotate(180deg)}
.sg-collapsible{overflow:hidden;max-height:0;transition:max-height .25s ease-out;padding:0}
.sg-collapsible.open{max-height:600px;padding:8px 0 0;transition:max-height .35s ease-in}

.sg-react{display:inline-flex;gap:6px;margin-left:auto}
.sg-react-btn{background:none;border:1.5px solid var(--bd);border-radius:99px;padding:4px 10px;cursor:pointer;font-size:14px;transition:all .15s;opacity:.5}
.sg-react-btn:hover{opacity:1;border-color:#555}
.sg-react-btn.voted{opacity:1;border-color:#CDEB45;background:rgba(205,235,69,.1)}
</style></head><body><div id="app"></div>
<script>
const D=[{"ca": "Glen Waverley", "yl": "Prep", "th": "Who We Are", "ci": "Schools are organised to help students learn and work together", "lo": "The organisation of the Junior School; Routines that allow developing independence; How to make the classroom and playground healthy and safe", "s": [{"t": "Book Creator", "d": "Students create a 'My Wesley School' digital book documenting the school routines and places they learned about during the campus map exploration, with photos of key locations and voice recordings explaining how each area helps students learn.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a 'How Our School Works' poster showing the routines that help them develop independence (unpacking bags, lining up, library borrowing), connecting to their four drawings of things they know about Wesley.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record a guided walk-through of the school explaining different areas and their purposes, building on the campus map activity and labelling how each space helps students learn and stay safe.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph and label examples of daily routines that help them learn independently, building a visual sequence of their school day from arrival to home time.", "c": "middle"}, {"t": "Cubetto", "d": "Students program Cubetto to navigate a floor map of the campus, visiting the library, classroom and playground in the correct daily routine sequence, explaining each stop's purpose.", "c": "middle"}, {"t": "Indi Robot", "d": "Students use colour-coded cards to program Indi Robot to follow the sequence of their daily school routines (pack bag → line up → enter classroom → morning circle), connecting the step-by-step coding to the independence skills and routines practised throughout the unit.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw themselves and record a voice note answering the question: 'What does the organisation of the junior school mean to you?' — creating a personal snapshot that the class can revisit at the end of the unit to see how thinking has changed.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create an 'All About Me' page featuring drawings and voice recordings about routines that allow developing independence, starting a personal book they will add to throughout the unit as their understanding of schools are organised to help students learn and work together grows.", "c": "beginning"}, {"t": "Seesaw", "d": "Students respond to a class provocation about how to make the classroom and playground healthy and safe by choosing one of three images on Seesaw and recording why it connects to their life — the teacher uses responses to form inquiry groups for the unit.", "c": "beginning"}]}, {"ca": "Glen Waverley", "yl": "Prep", "th": "Where We Are in Place and Time", "ci": "Family histories shape who we are and what we value", "lo": "What makes a family; The people in your family; Your family history; What is important to your family", "s": [{"t": "Book Creator", "d": "Students create a 'My Family History' digital book featuring their family tree (built with autumn leaf rubbings), family photos brought from home, and voice recordings explaining where their family comes from — mapped on the classroom world map with family photos.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a family timeline showing key people and traditions, incorporating the 'I see, I think, I wonder' thinking routine responses from the provocation where teachers placed childhood family photos on the board.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record an oral presentation sharing the special family item they brought from home (homework task), explaining its significance and what it tells us about what their family values.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph and narrate their family tree artwork (created with leaf rubbings and family member cut-outs), explaining who is in their family and the connections between generations.", "c": "middle"}, {"t": "Book Creator", "d": "Collaborative class book where each student contributes a page about something their family does together, inspired by 'Our Table' by Peter H. Reynolds and the homework activity where families photographed something they do together.", "c": "middle"}, {"t": "Google Earth", "d": "Students explore their own home location on Google Earth and take a screenshot, then use Seesaw to record what they notice about the place where they live — connecting to the unit's focus on what makes a family.", "c": "beginning"}, {"t": "Book Creator", "d": "Students start a 'Then and Now' book by drawing or photographing something from their life connected to the people in your family, adding voice recordings explaining what they think it looked like in the past.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore locations connected to the unit's focus using Google Earth satellite and street views, making initial observations and recording wonderings that will anchor their inquiry into what makes a family.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate what makes a family, building a visual portfolio of evidence throughout the unit.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Prep", "th": "How We Express Ourselves", "ci": "Emotions influence our wellbeing.", "lo": "How our feelings and emotions affect us; How feelings and emotions are interpreted; How our emotions and behaviour affect relationships", "s": [{"t": "Book Creator", "d": "Students create a personal 'Emotions Dictionary' connecting each emotion to the Colour Monster zones and Inside Out characters, with drawings showing how they recognise each feeling in themselves and photos of their Seesaw emotion-matching task.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record themselves demonstrating an emotion and explaining a management strategy, building on the daily feelings check-in display and the Zones of Regulation framework explored through Colour Monster Goes to School.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a 'Managing My Emotions' poster showing strategies from the unit — connecting colours to zones, featuring the mindfulness techniques explored through 'The Lemonade Hurricane' and the friendship strategies from 'Henry and Amy'.", "c": "end"}, {"t": "Seesaw", "d": "Weekly emotion check-in where students select a Colour Monster zone, photograph themselves showing that emotion, and voice-record why they feel that way and what strategy they could use.", "c": "middle"}, {"t": "GarageBand", "d": "Students create short soundscapes representing different emotions (calm, excited, sad, angry), connecting to music lessons where they explored how composers portray feelings through changes in tempo and dynamics.", "c": "middle"}, {"t": "Seesaw", "d": "Students use the camera and drawing tools to create a 'Before I Knew' page showing what how our feelings and emotions affect us looks like to them right now — using pictures, labels and voice recording to capture their starting understanding.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page showing different ways they can express the idea of how feelings and emotions are interpreted — through drawing, voice, photos and text — exploring which method feels most natural to them.", "c": "beginning"}, {"t": "Seesaw", "d": "Students respond to a class provocation about how our emotions and behaviour affect relationships by choosing one of three images on Seesaw and recording why it connects to their life — the teacher uses responses to form inquiry groups for the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about how our feelings and emotions affect us.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Prep", "th": "How the World Works", "ci": "The properties of materials influence how objects move and their use.", "lo": "Properties of materials; How objects move; How we use materials", "s": [{"t": "Seesaw", "d": "Students video-record their 'Design a Floater' investigation explaining which materials they chose, why they predicted those materials would float, and what they observed — documenting their design thinking process with photos and labels.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Materials Scientist' report documenting the mystery bag provocation observations, the Materials Gallery sorting activity, and their slide-and-roll ramp tests with labelled photos comparing how objects move on different surfaces.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a materials comparison poster showing what they learned from sorting objects by properties (hard, soft, rough, smooth, transparent) during the Materials Gallery, connecting observations to the Hands On incursion consolidation activities.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph each step of their ramp experiments (slide and roll tests) and use drawing tools to label which materials moved fastest and why, building vocabulary about material properties.", "c": "middle"}, {"t": "Beebots", "d": "Students program Beebots to move across different material surfaces (carpet, tile, cardboard) placed along the path, predicting and observing how the material properties affect movement — connecting to the slide-and-roll investigation findings.", "c": "beginning"}, {"t": "Indi Robot", "d": "Students place colour cards along a path representing different material properties (hard, soft, rough, smooth), programming Indi Robot to follow the trail and stop at each station where they describe the material, connecting colour-coded sorting to the material classification activities from the mystery bag provocation.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph or draw something from their environment connected to properties of materials and record a voice note explaining what they think is happening and why — capturing their scientific thinking before investigations begin.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about properties of materials.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate properties of materials, building a visual portfolio of evidence throughout the unit.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Prep", "th": "How We Organise Ourselves", "ci": "The products people use go through a process of change.", "lo": "Where food comes from; How food can be changed for different purposes; An appreciation of food", "s": [{"t": "Book Creator", "d": "Students create a 'From Farm to Fork' digital book documenting the journey of food products explored during the Chesterfield Farm excursion, with photos of farm animals, food sources, and the process of change from raw ingredient to finished product.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record themselves explaining a food process using sequencing language (first, then, next, finally), connecting to the procedural writing and recipe activities practised during the unit and the Visual Art farm animal artwork.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a food process flowchart poster showing how a food item changes from farm to plate, incorporating connections drawn between different food images from the Seesaw provocation task where children justified their choices with voice recordings.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph each step of classroom cooking experiences and label the process, e café lunch and marketplace examples.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw or photograph an example of the systems in our lives from their everyday life, then record a voice note explaining how it works — building a class collection of real-world connections before the inquiry begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph examples of the purpose of various systems around the school or home and create a Book Creator page sorting them into categories, with voice recordings explaining their grouping — practising the classification skills they will develop in the unit.", "c": "beginning"}, {"t": "Seesaw", "d": "Students respond to a class provocation about how systems are made of many interdependent parts by choosing one of three images on Seesaw and recording why it connects to their life — the teacher uses responses to form inquiry groups for the unit.", "c": "beginning"}]}, {"ca": "Glen Waverley", "yl": "Year 2", "th": "Sharing the Planet", "ci": "Water is a limited resource that is essential to life.", "lo": "Unequal access to water; Communities affected by water access; Transferral of water from source to use; Responsibility as global citizens", "s": [{"t": "Book Creator", "d": "Students create a 'Water Matters' report documenting the water cycle, unequal access issues, and the water-saving actions they took, incorporating their home learning task where they created water-saving posters and the class discussion about machines that move water from rivers to homes.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a persuasive water conservation poster for the Junior School community, building on the posters they created during the unit and connecting to data representation skills about water usage patterns.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record a persuasive speech about water conservation responsibility as global citizens, referencing specific examples from their non-fiction reading heir use; Material solutions for a sustainable future; How research solves problems in the natural world", "s": [{"t": "Tinkercad", "d": "Students design a 3D prototype of a sustainable product that solves an environmental problem for an animal, considering which materials will be good for both the environment and the animal — connecting to the unit's sustainability focus on choosing responsible materials for prototypes.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a product sustainability report showing how their material choices impact the environment, comparing natural vs synthetic materials and proposing alternatives that support a sustainable future.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Sustainable Design Challenge' report documenting their research into material properties, their design process for creating an animal-friendly prototype, and their environmental impact analysis.", "c": "end"}, {"t": "Micro:bit", "d": "Students use micro:bits to collect environmental data (temperature, light levels) to inform their sustainable product design decisions, connecting sensor data to understanding how the natural world is affected by material choices.", "c": "middle"}, {"t": "Scratch", "d": "Students code an interactive simulation showing how different material and design choices affect the natural world over time, demonstrating the connection between product design and environmental impact.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to navigate an obstacle course representing environmental challenges, testing whether their sustainable product design creates a clear path or adds barriers, connecting the coding challenge to their investigation of how design and material choices impact the natural world.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build a Lego Spike prototype of their sustainable product incorporating sensors and motors, testing the design against environmental criteria and comparing the engineering approach with their Tinkercad 3D digital prototype, connecting physical and digital design thinking.", "c": "end"}, {"t": "Mentimeter", "d": "Students respond to 'What do you already know about how material properties determine their use?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how material solutions for a sustainable future works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot quiz testing common assumptions about how research solves problems in the natural world — wrong answers reveal misconceptions the class will investigate, and the teacher uses results to differentiate inquiry groups.", "c": "beginning"}]}, {"ca": "Glen Waverley", "yl": "Year 4", "th": "How We Organise Ourselves", "ci": "Communities create rules, laws and services to help people live together fairly and safely.", "lo": "Effective and influential leadership; Strengths that help leaders guide others; How leadership impacts communities", "s": [{"t": "Canva Presentation", "d": "Students design a leadership profile presentation featuring the leader they researched, incorporating the ranking activity comparison (initial vs final understanding), the Kid President video analysis of leadership strengths and weaknesses, and insights from the Imogen Kane UN Youth Ambassador guest speaker on Teams.", "c": "end"}, {"t": "iMovie", "d": "Students create a 'Leadership in Action' video showcasing their leadership speech (a favourite activity mentioned by students), incorporating footage from the Cross Campus Leadership Day team-building activities and their Seesaw self-reflection rubric responses.", "c": "end"}, {"t": "Adobe Express Podcasting", "d": "Students produce a podcast interviewing peers about leadership qualities, connecting to the Visual Art exploration of art leaders Yayoi Kusama and Jean-Michel Basquiat and discussing how leadership exists in many fields.", "c": "end"}, {"t": "Seesaw", "d": "Students complete the leadership ranking activity comparison as a digital portfolio task, documenting how their understanding of effective leadership changed from the provocation through to the Cross Campus Leadership Day experiences.", "c": "beginning"}, {"t": "Padlet", "d": "Students collaborate on a leadership qualities wall, sharing examples of effective leaders from the election discussion, guest speaker insights from UN Youth Ambassador Imogen Kane, and their own leadership experiences during team-building activities.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with effective and influential leadership — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of strengths that help leaders guide others as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate effective and influential leadership, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students design and conduct a class survey to gather perspectives on effective and influential leadership, analysing the response data to identify patterns and inform their ongoing inquiry.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 4", "th": "Sharing the Planet", "ci": "Country, language and community are significant to the lives of First Nations people.", "lo": "Diversity of First Nations people; Importance of community, family and traditions; Importance of Country to First Nations people", "s": [{"t": "Canva Presentation", "d": "Students design a respectful presentation exploring the significance of Country to First Nations people, incorporating learning from the Indigenous elder at camp who led a nature walk, played the didgeridoo and shared stories, and connecting to their continued study of native Australian animals.", "c": "end"}, {"t": "Book Creator", "d": "Students create a research book documenting the diversity of First Nations peoples and their connection to Country, integrating the pre-test visualisation activity where they drew their understanding of Aboriginal and Torres Strait Islander communities and researched the effects of First Fleet contact.", "c": "end"}, {"t": "iMovie", "d": "Students produce a reflective documentary connecting their camp experience with the Indigenous elder to their research about how Country, language and community are significant — incorporating the persuasive speeches they wrote as their taking-action assessment.", "c": "end"}, {"t": "Google Earth", "d": "Students explore First Nations language group maps and significant Country locations, connecting virtual exploration to their camp experience and annotating locations with cultural information about community, family and traditions.", "c": "beginning"}, {"t": "Padlet", "d": "Students curate and share approved resources and reflections about First Nations culture, building on the different discussion groupings used during the unit to explore diversity perspectives.", "c": "middle"}, {"t": "DJI Drone (teacher-operated)", "d": "DLC captures aerial footage of the camp location and local Glen Waverley environment, providing students with a bird's-eye view of Country that they compare with First Nations perspectives on the significance of land, connecting the aerial imagery to their Google Earth explorations of language group maps and significant locations.", "c": "middle"}, {"t": "Insta360 Cam", "d": "DLC captures 360° footage during the camp experience with the Indigenous elder, creating immersive reference material that students revisit in class to deepen their reflections in the iMovie documentary about how Country, language and community connect, preserving the camp experience for ongoing learning.", "c": "middle"}, {"t": "Padlet", "d": "Students post an image, headline or question about diversity of first nations people on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to importance of community, family and traditions — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}]}, {"ca": "Glen Waverley", "yl": "Year 5", "th": "Who We Are", "ci": "Managing change requires acceptance, knowledge and strategies.", "lo": "Establishing, managing and maintaining relationships; Managing behaviours in digital situations; Managing changes associated with puberty", "s": [{"t": "Canva Presentation", "d": "Students design a comprehensive wellbeing guide covering relationship management, cyber safety strategies and puberty changes, incorporating insights from the Brett Borberly guest presentation about managing life changes.", "c": "end"}, {"t": "Adobe Express Podcasting", "d": "Students produce a podcast series discussing strategies for managing different life changes, drawing on the relationship-building and digital citizenship skills explored through class discussions and guest speaker sessions.", "c": "end"}, {"t": "iMovie", "d": "Students create a cyber safety awareness video demonstrating responsible digital behaviour and strategies for managing online situations, connecting to the wellbeing focus on managing behaviours in digital contexts.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive cyber safety scenario where users make choices and see consequences of digital behaviours, exploring how acceptance and knowledge lead to better strategies.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students design and conduct a class survey about change management strategies, analysing responses to identify common approaches and connecting findings to the presentation from Brett Borberly.", "c": "middle"}, {"t": "GarageBand", "d": "Students compose a calming audio toolkit in GarageBand with personalised soundscapes and guided breathing exercises, connecting music creation to the wellbeing and change management strategies explored during the relationship, cyber safety and resilience sessions throughout the unit.", "c": "middle"}, {"t": "Mentimeter", "d": "Students use Mentimeter live polling to gather anonymous class data on change management strategies that work best, creating real-time visualisations of peer perspectives on managing transitions, feeding the data into their wellbeing guide and podcast discussions.", "c": "middle"}, {"t": "Padlet", "d": "Students respond to the provocation 'Managing change requires acceptance, knowledge and strategies.' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on establishing, managing and maintaining relationships.", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to managing behaviours in digital situations — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about managing changes associated with puberty using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}]}, {"ca": "Glen Waverley", "yl": "Year 5", "th": "Where We Are in Place and Time", "ci": "The discovery of resources has impacted the growth and development of nations.", "lo": "Significance of resource discovery in development of societies; Impact of migration on cultural, social and economic growth; Exploration and settlement effects on Indigenous and colonial populations", "s": [{"t": "Canva Presentation", "d": "Students design a research presentation analysing how the Gold Rush impacted Australia's development, incorporating cause-and-effect analysis from their Seesaw portfolio formative assessment and research from ClickView Gold Rush videos.", "c": "end"}, {"t": "iMovie", "d": "Students produce a documentary exploring the impact of migration on Australian society, weaving together the effects of British colonisation on First Nations Australians, convict experiences, and the development that followed resource discovery.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Migration and Discovery' book documenting how exploration, settlement and resource discovery shaped Australian communities, using primary and secondary source evidence from their independent video research and note-taking activities.", "c": "end"}, {"t": "Google Earth", "d": "Students trace migration and settlement routes across Australia, annotating key locations including gold rush sites and colonial settlements with historical context about how resource discovery drove population movement and national development.", "c": "middle"}, {"t": "Microsoft Excel", "d": "Students create data tables and charts comparing migration patterns over time, analysing trends from the Gold Rush era to modern migration and connecting population data to resource discovery and economic growth.", "c": "middle"}, {"t": "Green Screen + iMovie", "d": "Students film first-person Gold Rush accounts using green screen with historical goldfields backgrounds, performing as characters from different migration waves to bring primary source stories to life, integrating the footage into their iMovie documentary about how resource discovery impacted Australia's growth.", "c": "end"}, {"t": "Insta360 Cam", "d": "DLC captures 360° footage at Sovereign Hill or other Gold Rush heritage sites during excursions, creating immersive reference material that students analyse to understand the living and working conditions of the era, connecting the experience to their migration data analysis in Microsoft Excel.", "c": "middle"}, {"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to significance of resource discovery in development of societies, dropping pins and adding labels describing what they observe — building a visual map of existing knowledge before the class investigation begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about impact of migration on cultural, social and economic growth in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Google Earth", "d": "Students take a virtual field trip using Google Earth to explore locations connected to exploration and settlement effects on indigenous and colonial populations, recording observations in a shared document — building geographic context and generating inquiry questions before the unit investigation begins.", "c": "beginning"}]}, {"ca": "Glen Waverley", "yl": "Year 5", "th": "How We Express Ourselves", "ci": "People design for purpose.", "lo": "How design thinking creates in various ways; Design thinking meets community needs; Effective ways to engage an audience", "s": [{"t": "Canva Presentation", "d": "Students present their design thinking project showing how they identified a community need and designed a purposeful solution, incorporating the prototyping and evaluation skills developed through stakeholder research and the social messages Visual Art focus.", "c": "end"}, {"t": "Tinkercad", "d": "Students design a 3D prototype of their product using the full design thinking process (empathise, define, ideate, prototype, test) to meet a specific community need, iterating based on peer feedback.", "c": "end"}, {"t": "Adobe Express Video Creator", "d": "Students create a pitch video for their design explaining how it engages an audience and meets a community need, applying the persuasive presentation and sequencing skills from the literacy integration.", "c": "end"}, {"t": "Scratch", "d": "Students code a prototype or interactive model demonstrating their design thinking solution, showing how the digital creation process helps them meet community needs in new ways.", "c": "middle"}, {"t": "Micro:bit", "d": "Students integrate micro:bits into their design project as sensors or interactive elements, collecting data to inform design decisions and connecting technology to the ethical and practical considerations in their design process.", "c": "middle"}, {"t": "CoDrone EDU", "d": "Students explore drone technology as a design-for-purpose case study, programming CoDrone EDU to perform tasks that meet a specific community need (surveillance for safety, delivery for accessibility), connecting the drone's engineered purpose to their design thinking investigation of how products are designed to serve audiences.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build a Lego Spike functional prototype of their design thinking product, programming motors and sensors to demonstrate how the design meets its intended community purpose, comparing the physical prototype with their Tinkercad 3D model and Scratch interactive version.", "c": "end"}, {"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you how design thinking creates in various ways?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "GarageBand", "d": "Students experiment with sounds and beats in GarageBand to create a 30-second 'mood piece' that expresses their first impression of design thinking meets community needs — exploring how expression works beyond words before the unit dives deeper.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about effective ways to engage an audience using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}]}, {"ca": "Glen Waverley", "yl": "Year 5", "th": "How the World Works", "ci": "The interactions between living things, materials, and light enable us to make decisions about the world", "lo": "How structural features and adaptations help living things survive; How weathering and erosion cause change to Earth's surface; How light is used in science and technology", "s": [{"t": "⏳ Planner Needed", "d": "Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.", "c": "end"}]}, {"ca": "Glen Waverley", "yl": "Year 5", "th": "How We Organise Ourselves", "ci": "Economic systems are an integral part of human society.", "lo": "Wealth is more than money; Responsibilities when managing income; Income is earned and managed in many ways", "s": [{"t": "Canva Presentation", "d": "Students design an economic literacy guide explaining different forms of wealth and responsible income management, incorporating their experience managing money in Banqer where they applied for jobs, side hustles and made financial decisions.", "c": "end"}, {"t": "Microsoft Excel", "d": "Students create a personal budget spreadsheet with formulas tracking income, expenses and savings goals, connecting to the Banqer simulation data and their understanding that wealth is more than money.", "c": "end"}, {"t": "Adobe Express Podcasting", "d": "Students produce a podcast episode discussing how economic systems work and responsible financial decision-making, drawing on their Banqer experience and class presentations about managing income.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive budget simulation where users make financial decisions and see consequences on their savings, modelling the economic choices they practised through the Banqer platform.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students design and conduct a survey about how classmates understand wealth beyond money, analysing data to present findings about economic literacy and connecting results to the structured assessment rubric.", "c": "middle"}, {"t": "Mentimeter", "d": "Students use Mentimeter live polling to explore class attitudes about wealth, spending priorities, and financial decision-making, generating real-time data visualisations that inform their podcast discussions about how economic systems affect daily life and responsible financial choices.", "c": "beginning"}, {"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with wealth is more than money — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of responsibilities when managing income as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate wealth is more than money, building a visual portfolio of evidence throughout the unit.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 5", "th": "Sharing the Planet", "ci": "Communities interact with the environment in different ways.", "lo": "The need for conservation; Community values inform management of the natural environment; Ways environmental stewardship can drive change", "s": [{"t": "Canva Presentation", "d": "Students design a conservation action plan proposing how their community can improve environmental stewardship, incorporating evidence from their gallery walk presentations about responsible resource use and sustainability choices.", "c": "end"}, {"t": "iMovie", "d": "Students produce a persuasive environmental documentary connecting their research about sustainable resource patterns to the Alex Wilkie Nature Reserve excursion observations and the Monash Council visit about local environmental management.", "c": "end"}, {"t": "Micro:bit", "d": "Students program micro:bits to collect environmental data (temperature, light, moisture) around the school and at the Alex Wilkie Nature Reserve, using findings to support their conservation action proposals with evidence.", "c": "end"}, {"t": "Google Earth", "d": "Students analyse satellite imagery to compare the Alex Wilkie Nature Reserve with surrounding urban development, investigating how community values shape environmental management decisions locally and globally.", "c": "middle"}, {"t": "Microsoft Excel", "d": "Students compile environmental data collected via micro:bits into graphs and charts, identifying trends in local environmental conditions and using the data to strengthen their conservation stewardship arguments.", "c": "middle"}, {"t": "DJI Drone (teacher-operated)", "d": "DLC captures aerial footage of the Alex Wilkie Nature Reserve and surrounding urban development, providing students with satellite-perspective imagery that they compare with Google Earth views and analyse alongside their micro:bit environmental data to understand how community interactions shape the local environment.", "c": "middle"}, {"t": "Insta360 Cam", "d": "DLC captures 360° footage at the Alex Wilkie Nature Reserve, creating an immersive record that students explore back in class to identify environmental features, compare biodiversity zones, and gather visual evidence for their conservation action plan presentations and iMovie environmental documentaries.", "c": "middle"}, {"t": "CoDrone EDU", "d": "Students investigate how drone technology is used in real-world environmental monitoring (wildlife tracking, bushfire mapping, coastal erosion surveys), programming CoDrone EDU flight paths to simulate conservation monitoring missions, connecting the technology to their research on sustainable resource practices.", "c": "middle"}, {"t": "Padlet", "d": "Students post an image, headline or question about the need for conservation on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to community values inform management of the natural environment — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about ways environmental stewardship can drive change using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Prep", "th": "Who We Are", "ci": "Relationships impact our wellbeing.", "lo": "Developing relationships; How those around us impact our behaviours and interactions; Keeping ourselves healthy and safe", "s": [{"t": "Book Creator", "d": "Students create a 'My Relationships' book featuring self-portraits (including identity details like hair colour, eye colour, and a happy emotion) alongside pages showing how different friendships at school make them feel, using drawings and voice recordings to explain strategies for positive interactions learned from read-alouds like 'How Do Dinosaurs Play With Their Friends?'.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record a reflection explaining what makes a good friend (e.g. kindness, sharing, personal space, taking turns) using specific examples from cooperative PE activities where they practised recognising how movement and actions make others feel.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a 'Wellbeing Poster' showing strategies for developing healthy relationships, including ideas from Essential Agreement creation activities and class discussions about how emotions, behaviours and actions help keep us safe.", "c": "end"}, {"t": "Seesaw", "d": "Weekly relationship reflection where students draw and narrate about a friendship moment from class, connecting to the Learner Profile focus on caring and open-mindedness explored through PE cooperation activities.", "c": "middle"}, {"t": "Beebots", "d": "Students program Beebots to navigate a 'Friendship Path' mat with stations representing positive relationship actions (sharing, taking turns, using kind words) discussed during read-aloud sessions and PE lessons.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw themselves and record a voice note answering the question: 'What does developing relationships mean to you?' — creating a personal snapshot that the class can revisit at the end of the unit to see how thinking has changed.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create an 'All About Me' page featuring drawings and voice recordings about how those around us impact our behaviours and interactions, starting a personal book they will add to throughout the unit as their understanding of relationships impact our wellbeing grows.", "c": "beginning"}, {"t": "Seesaw", "d": "Students respond to a class provocation about keeping ourselves healthy and safe by choosing one of three images on Seesaw and recording why it connects to their life — the teacher uses responses to form inquiry groups for the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about developing relationships.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Prep", "th": "How We Express Ourselves", "ci": "Stories are shared in different ways.", "lo": "Imagining stories together; Ways stories are shared; Connecting with stories", "s": [{"t": "Book Creator", "d": "Students create an original digital story using materials explored during the unit (drawings, playdough creations, Lego builds, and felt board scenes photographed in class), adding voice recordings to retell their story in sequence, connecting to the provocation mystery box costumes activity.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record themselves retelling a story using props from the mystery box provocation (costumes, puppets), demonstrating different ways stories can be shared as explored through weekly literacy read-alouds and dramatic play.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a 'Ways We Share Stories' poster showing the different storytelling methods they experienced during the unit, including drama with costumes, playdough and Lego creations, felt board stories, and the Indigenous Australian storytelling from the Cranbourne Botanical Gardens excursion.", "c": "end"}, {"t": "Seesaw", "d": "During weekly literacy lessons, students photograph their partner/group story creations (Lego, playdough, felt board) and add a voice recording explaining the beginning, middle and end of their story.", ng my world; Drawing conclusions", "s": [{"t": "Book Creator", "d": "Students create a 'My Science Investigation' report documenting the scientific method steps from their Nature Detective Walk (Week 4), including photos of how they grouped living things by features using magnifying glass observations and drawings of their predictions versus conclusions.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record themselves conducting the ice cube melting experiment (using tools like hair dryers, cups of warm water, and paper towels), explaining their prediction, observations about how materials and heat affect change, and their conclusion.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a scientific method poster showing each step they followed across the unit's experiments — from the ramp experiments exploring how objects move, to observing biological sciences on the Nature Detective Walk (grouping living things by colour, shape, number of legs, type of leaves).", "c": "end"}, {"t": "Seesaw", "d": "Students photograph each step of the scientific process during hands-on investigations (predicting, testing, observing) and use drawing tools to label the sequence, connecting to their 'Chart of a Scientist' class display.", "c": "beginning"}, {"t": "Beebots", "d": "Students program Beebots to follow a sequenced path representing the scientific method steps (Question → Predict → Test → Observe → Conclude), mirroring the process practised during nature walk and ramp experiments.", "c": "beginning"}, {"t": "Sphero", "d": "Students roll Spheros across different ramp surfaces during their scientific investigations, observing how the ball's speed and direction change when they alter materials and angles, connecting the predict-test-observe steps of the scientific method explored throughout the unit.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the scientific process, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about the scientific process.", "c": "middle"}, {"t": "Seesaw", "d": "Students use drawing, photo and voice tools to document each stage of their investigation, capturing observations and new vocabulary as they explore the scientific process.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 1", "th": "Who We Are", "ci": "The actions we take influence our safety and wellbeing.", "lo": "Safe environments; How our actions affect ourselves and others; Keeping our body and mind healthy", "s": [{"t": "Book Creator", "d": "Students create a 'My Human Body Book' documenting what they learned about body parts and systems through the unit's informative writing activities, including photos from the Intensive Swimming Program and PE lessons showing safe movement choices.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record a 'Safety and Wellbeing' presentation explaining how their actions at school (explored through PE lessons focused on physical development and safe movement) help keep themselves and others safe, with specific examples from class discussions.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design an infographic showing the connection between their daily actions and wellbeing, incorporating concepts of form and change explored through Vivaldi's 'The Four Seasons' listening activities and artwork representing emotions with colours.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph examples of safe and healthy actions during PE and class activities, using drawing tools to annotate how each action supports their body and mind, building vocabulary about body parts and health.", "c": "middle"}, {"t": "Scratch Jr", "d": "Students code a simple animation showing a character making safe choices in different environments (classroom, playground, swimming pool), connecting to the safety scenarios explored through the Intensive Swimming Program.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw themselves and record a voice note answering the question: 'What does safe environments mean to you?' — creating a personal snapshot that the class can revisit at the end of the unit to see how thinking has changed.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create an 'All About Me' page featuring drawings and voice recordings about how our actions affect ourselves and others, starting a personal book they will add to throughout the unit as their understanding of the actions we take influence our safety and wellbeing grows.", "c": "beginning"}, {"t": "Seesaw", "d": "Students respond to a class provocation about keeping our body and mind healthy by choosing one of three images on Seesaw and recording why it connects to their life — the teacher uses responses to form inquiry groups for the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about safe environments.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 1", "th": "Where We Are in Place and Time", "ci": "Homes reflect our culture and environment.", "lo": "Different types of homes; Characteristics of a home; The importance of sustainable living spaces", "s": [{"t": "Book Creator", "d": "Students create a 'Homes Around the World' research book featuring the different home types explored during the unit (aboriginal gunya huts, Viking turf homes, houseboats, igloos), including facts they researched on Epic and photos of their mini home building project.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record a presentation about the mini home they built, explaining the design choices based on culture and environment, connecting to the writing task 'What do you love about your home?' and the balanced learning across past and present homes from around the world.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a comparison poster showing how homes from different cultures (explored through shared read-alouds and Drama lessons about 'our homes and our place') reflect their environment, using images and labels from their Epic research.", "c": "end"}, {"t": "Seesaw", "d": "Students use the drawing and photo tools to document their mini home building process step-by-step, recording voice explanations about why they chose certain materials and designs based on the culture and environment they studied.", "c": "middle"}, {"t": "Google Earth", "d": "Students explore different locations around the world where the homes they studied are found (Arctic for igloos, outback Australia for gunya huts), connecting geography to the home characteristics and sustainable living discussed in class.", "c": "middle"}, {"t": "Google Earth", "d": "Students explore their own home location on Google Earth and take a screenshot, then use Seesaw to record what they notice about the place where they live — connecting to the unit's focus on different types of homes.", "c": "beginning"}, {"t": "Book Creator", "d": "Students start a 'Then and Now' book by drawing or photographing something from their life connected to characteristics of a home, adding voice recordings explaining what they think it looked like in the past.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore locations connected to the unit's focus using Google Earth satellite and street views, making initial observations and recording wonderings that will anchor their inquiry into different types of homes.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about different types of homes.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 1", "th": "How We Express Ourselves", "ci": "Emotions can be expressed in different ways.", "lo": "Recognising our own and others' emotions; Responding to and interpreting our emotions; Different ways we express emotions", "s": [{"t": "Book Creator", "d": "Students create an 'Emotions Art Gallery' book featuring photographs of their colour-themed emotion artworks (posters, collages, and masks), with voice recordings explaining which colours and facial features they chose to represent each emotion and why.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record themselves presenting their emotion mask, explaining the colour choices and facial features used to show the emotion, then demonstrating how that emotion can be expressed through body language — connecting to the group collage activity where they photographed themselves showing emotions.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design an 'Expressing Emotions' poster showing the different ways they explored emotions through the unit: colour-based artworks, music soundscapes created in class, The Colour Monster read-aloud connections, and drama activities.", "c": "end"}, {"t": "GarageBand", "d": "Students create a short soundscape to accompany an emotion (happy, sad, angry, calm), connecting to the music lessons where they explored expressing emotions through sound and created soundscapes to accompany different feelings.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw and record a weekly 'emotion check-in' showing how they feel using the colour associations explored through The Colour Monster activities and their own colour-emotion artwork.", "c": "middle"}, {"t": "Seesaw", "d": "Students use the camera and drawing tools to create a 'Before I Knew' page showing what recognising our own and others' emotions looks like to them right now — using pictures, labels and voice recording to capture their starting understanding.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page showing different ways they can express the idea of responding to and interpreting our emotions — through drawing, voice, photos and text — exploring which method feels most natural to them.", "c": "beginning"}, {"t": "Seesaw", "d": "Students respond to a class provocation about different ways we express emotions by choosing one of three images on Seesaw and recording why it connects to their life — the teacher uses responses to form inquiry groups for the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about recognising our own and others' emotions.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 1", "th": "How the World Works", "ci": "Patterns help us to interpret the world around us.", "lo": "Patterns and cycles in our lives; Different patterns around us; How patterns can be created, interpreted and extended", "s": [{"t": "Book Creator", "d": "Students create a 'Patterns and Cycles' research book documenting their life cycle investigation (chosen from home learning), including photos of their butterfly lifecycle model from Design Technologies and observations recorded on Seesaw about seasonal and natural patterns.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record a presentation about the life cycle they independently researched using Epic, explaining the pattern/cycle stages and demonstrating their understanding through the model they built in Design Technologies.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a patterns poster showing the different types of patterns discovered during the unit — lifecycle patterns, seasonal patterns (water cycle, butterfly chrysalis provocation), building patterns (bricks), and Chinese language patterns in number ordering.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph patterns they discover around the school (building bricks, nature patterns, classroom arrangements) and record observations about how patterns repeat and extend, building their observational research skills.", "c": "middle"}, {"t": "Beebots", "d": "Students program Beebots to follow repeating pattern sequences on a class-made grid, then extend the pattern — connecting to the mathematical concept of creating, interpreting and extending patterns explored across the unit.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to travel in repeating pattern sequences (circle, square, zigzag) on a classroom grid, connecting coding loops to the natural cycles and patterns observed in life cycles and seasonal changes investigated throughout the unit.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph or draw something from their environment connected to patterns and cycles in our lives and record a voice note explaining what they think is happening and why — capturing their scientific thinking before investigations begin.", "c": "beginning"}, {"t": "Book Creator", "d": "Students draw their prediction of what will happen when they explore different patterns around us and record a voice note explaining their reasoning — creating a 'My Prediction' page to compare against results later.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore locations connected to the unit's focus using Google Earth satellite and street views, making initial observations and recording wonderings that will anchor their inquiry into patterns and cycles in our lives.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 1", "th": "How We Organise Ourselves", "ci": "Services are established to help the needs of people in the community.", "lo": "Local services; Why we need local services in our community; How services meet personal and community needs", "s": [{"t": "Book Creator", "d": "Students create a 'Community Services' book profiling the local service they researched, including their appreciation letter to a community worker and photos/drawings showing how that service meets community needs — connected to the assembly presentation about Learner Profile attributes.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record their assembly presentation segment connecting community services to Learner Profile attributes (Caring, Communicator), explaining why their chosen service worker deserves appreciation and how the service helps the community.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design an infographic showing different local services explored during the unit, mapping how each one meets specific community needs, and featuring their written observations and conclusions from community investigations.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph local services during community walks and use drawing tools to annotate how each one helps people, building towards their appreciation letter-writing activity for local community workers.", "c": "middle"}, {"t": "Scratch Jr", "d": "Students code a simple animation showing a day in the life of a community service worker (fire, police, hospital, library), demonstrating how the service meets community needs explored through class discussions.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw or photograph an example of local services from their everyday life, then record a voice note explaining how it works — building a class collection of real-world connections before the inquiry begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph examples of why we need local services in our community around the school or home and create a Book Creator page sorting them into categories, with voice recordings explaining their grouping — practising the classification skills they will develop in the unit.", "c": "beginning"}, {"t": "Seesaw", "d": "Students respond to a class provocation about how services meet personal and community needs by choosing one of three images on Seesaw and recording why it connects to their life — the teacher uses responses to form inquiry groups for the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about local services.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 2", "th": "Who We Are", "ci": "Our relationships with others impact our lives.", "lo": "Importance of relationships; Developing and maintaining healthy relationships; The impact of relationships on wellbeing", "s": [{"t": "Book Creator", "d": "Students create a 'Healthy Relationships' book documenting strategies for developing and maintaining positive relationships, incorporating their PE reflections on teamwork, identity and movement skills, and exploring how actions in group activities impact others' wellbeing.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record a reflection about how relationships explored during PE health activities (cooperation, communication, empathy) impact their lives, connecting open-mindedness and balanced approaches to identity and wellbeing.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a relationship impact poster showing how different relationships (family, friends, classmates) affect wellbeing, using examples from cooperative PE activities and class discussions captured on their Padlet wonderwall.", "c": "end"}, {"t": "Padlet", "d": "Students post weekly reflections about relationship moments at school, with photos and descriptions showing how their actions (voice, choice and ownership) impacted others — building a class wonderwall of positive relationship strategies.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph or draw examples of positive teamwork during PE and classroom activities, recording how cooperation and communication skills strengthen relationships.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw themselves and record a voice note answering the question: 'What does importance of relationships mean to you?' — creating a personal snapshot that the class can revisit at the end of the unit to see how thinking has changed.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create an 'All About Me' page featuring drawings and voice recordings about developing and maintaining healthy relationships, starting a personal book they will add to throughout the unit as their understanding of our relationships with others impact our lives grows.", "c": "beginning"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about importance of relationships with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate importance of relationships, building a visual portfolio of evidence throughout the unit.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 2", "th": "Where We Are in Place and Time", "ci": "Landmarks and places of significance tell stories about our history.", "lo": "The significance of places to different people and cultures; The connection between landmarks and identity; How landmarks and symbols represent our history", "s": [{"t": "Book Creator", "d": "Students create a 'Landmarks of Elsternwick' research book documenting significant places discovered during the walking excursion (MLC, Wesley, Cato Park, Prest Room artefacts), including photos, drawings, and notes about what each landmark tells us about the community's history.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record a presentation about a landmark they investigated during the campus walking tour, explaining its significance to different people and cultures, and how symbols represent landmarks and physical features (explored through map-reading activities with Possum Magic).", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a 'Symbols and Landmarks' poster showing how places around Australia and Elsternwick are represented on maps, connecting the Year 2 Purple Acknowledgement of Country to understanding significance of place for different cultures.", "c": "end"}, {"t": "Google Earth", "d": "Students explore landmarks around Elsternwick and across Australia (connecting to Possum Magic capital cities mapping activity), comparing how different cultures value different places and discussing what stories these landmarks tell.", "c": "middle"}, {"t": "Seesaw", "d": "Students use photo prompts from the prior knowledge assessment to document landmarks during the Elsternwick walking excursion, annotating each photo with notes about the landmark's history and significance to the community.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore their own home location on Google Earth and take a screenshot, then use Seesaw to record what they notice about the place where they live — connecting to the unit's focus on the significance of places to different people and cultures.", "c": "beginning"}, {"t": "Book Creator", "d": "Students start a 'Then and Now' book by drawing or photographing something from their life connected to the connection between landmarks and identity, adding voice recordings explaining what they think it looked like in the past.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the significance of places to different people and cultures, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about the significance of places to different people and cultures with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}]}, {"ca":
