the next trading session.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with the production of goods from raw materials through manufacturing to consumer — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of the exchange of currency for goods and services in a functioning economy as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot testing their assumptions about ethics and responsible decision-making in the marketplace — the results reveal what the class already knows and where the biggest knowledge gaps are, helping the teacher shape the inquiry direction.", "c": "beginning"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the production of goods from raw materials through manufacturing to consumer and building on each other's thinking through comments and questions.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 5", "th": "Sharing the Planet", "ci": "Communities interact with the environment in different ways", "lo": "How community values shape the management of the natural environment; The need for conservation and environmental stewardship; Ways in which First Nations land management practices can drive positive environmental change", "s": [{"t": "Book Creator", "d": "Students create a 'Conservation and Stewardship' digital book documenting their inquiry from the Gallery Walk and vocabulary exploration of different environments through to their Chum Creek camp and ECOSS visit experiences, including their Habitats of the World research, their 'I used to think, now I think' reflections on conservation, and photographs and observations from the WesMob native garden visit where they identified the species planted by Wesmob students in 2024.", "c": "end"}, {"t": "Canva", "d": "Students design an environmental stewardship action poster (connecting to the student-initiated poster creation) presenting a strong message about how we can look after the environment, incorporating what they learned about Indigenous land management practices from the two dedicated PPT lessons, the difference between management, conservation and stewardship vocabulary, and specific actions they could take at Wesley such as the garden bed designs students began creating for the Year 5 Rose Garden areas.", "c": "end"}, {"t": "Adobe Express Website", "d": "Students create a digital campaign page inspired by the Melbourne Urban Forest initiative, featuring the emails they wrote to trees around Wesley College during the Go Further phase, information about how city stewardship programs support environmental change, photographs from their ECOSS visit documenting the veggie garden, bee farm, worm farms and chickens, and their proposals for continued native planting around the school with the Environment Prefects.", "c": "end"}, {"t": "Seesaw", "d": "Students complete the camp portfolio task documenting their Chum Creek and ECOSS learning experiences, uploading photographs and written reflections that connect to the three Lines of Inquiry about how community values shape environmental management, the need for conservation, and ways stewardship can drive change, including their responses to the prompt about identifying further actions needed after the camp experience.", "c": "middle"}, {"t": "Google Earth", "d": "Students explore and compare the world biomes mapped during the Find Out phase with satellite imagery, locating the specific environments studied in their Habitats of the World worksheets, then zooming into local areas including Wesley College campus, Chum Creek and the ECOSS site to examine how different communities interact with their environments at local, national and global scales, connecting to Indigenous perspectives on land management.", "c": "middle"}, {"t": "DJI Drone (teacher-operated)", "d": "DLC captures aerial footage of the WesMob native garden and the Chum Creek camp surroundings, providing a bird's-eye perspective of the habitats and conservation landscapes students study during the Indigenous Land Management lessons and the ECOSS visit, giving context for their stewardship vocabulary work.", "c": "middle"}, {"t": "Pico VR", "d": "Students use Pico VR to explore immersive habitat environments connecting to the Habitats of the World research, virtually visiting ecosystems that contrast with the local environments observed at Chum Creek camp and the ECOSS visit, deepening their understanding of conservation and stewardship concepts before writing their Melbourne Urban Forest tree emails.", "c": "middle"}, {"t": "Padlet", "d": "Students post an image, headline or question about how community values shape the management of the natural environment on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to the need for conservation and environmental stewardship — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about ways in which first nations land management practices can drive positive environmental change using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}]}, {"ca": "St Kilda", "yl": "Year 6", "th": "Who We Are", "ci": "Understanding ourselves, our relationships and our wellbeing empowers us to thrive.", "lo": "The recognisable features of safe and healthy interactions (Form) • The connections between emotions, behaviour, learning, interactions and goals (Connection) • The tools and skills to stay safe online and in person (Safety) • The active role we play in achieving and maintaining our wellbeing (Wellbeing) • The strategies to achieve and maintain positive relationships (Relationships)", "s": [{"t": "Canva Presentation", "d": "Students design a 'Wellbeing Toolkit' presentation showcasing strategies learned across the year including the ROAR approach values from their fingerprint poster commitment, Grow Your Mind resilience podcast reflections ('You Can't Grow It Alone'), URStrong friendship strategies, CyberSafety skills, and executive functioning goals set in Term 1 and revisited in Term 2, with personal examples of applying these strategies during Camp Milana and the Canberra Tour.", "c": "end"}, {"t": "iMovie", "d": "Students produce a Year 6 wellbeing documentary combining reflections from Camp Milana and the Canberra Tour with classroom learning, illustrating how the ROAR approach, Grow Your Mind weekly offerings (Wellbeing Wednesday, Tell Yourself Tuesday affirmations), URStrong inclusion and belonging activities, and CyberSafety lessons connect emotions, behaviour, learning and interactions across their final primary school year.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Who I Am at Wesley' portfolio book featuring their IB Learner Profile portrait drawing (half self-portrait, half strengths and hobbies), ROAR poster reflections, executive functioning skills checklist analysis showing growth from Term 1 to Term 2, and scenario responses demonstrating application of URStrong and Grow Your Mind strategies in real-life situations.", "c": "end"}, {"t": "Seesaw", "d": "Students maintain ongoing reflections throughout the year documenting their ROAR fingerprint commitment, Essential Agreement contributions, Grow Your Mind weekly activities including the 'Inclusion and Belonging' task, Curiosity prompts, and the resilience journal from the 'You Can't Grow It Alone' podcast, plus executive functioning skills checklist progress and Awards Evening self and peer reflections.", "c": "middle"}, {"t": "Mentimeter", "d": "Students use live polling during URStrong and CyberSafety sessions to share anonymous responses about friendship scenarios, online safety strategies, and wellbeing check-ins, building class data on which strategies from the Grow Your Mind and CyberSafety programs students find most effective for managing emotions and staying safe.", "c": "middle"}, {"t": "Padlet", "d": "Students respond to the provocation 'Understanding ourselves, our relationships and our wellbeing empowers us to thrive.' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on the recognisable features of safe and healthy interactions (form) • the connections between emotions, behaviour, learning, interactions and goals (connection) • the tools and skills to stay safe online and in person (safety) • the active role we play in achieving and maintaining our wellbeing (wellbeing) • the strategies to achieve and maintain positive relationships (relationships).", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to the recognisable features of safe and healthy interactions (form) • the connections between emotions, behaviour, learning, interactions and goals (connection) • the tools and skills to stay safe online and in person (safety) • the active role we play in achieving and maintaining our wellbeing (wellbeing) • the strategies to achieve and maintain positive relationships (relationships) — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about the recognisable features of safe and healthy interactions (form) • the connections between emotions, behaviour, learning, interactions and goals (connection) • the tools and skills to stay safe online and in person (safety) • the active role we play in achieving and maintaining our wellbeing (wellbeing) • the strategies to achieve and maintain positive relationships (relationships) using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the recognisable features of safe and healthy interactions (form) • the connections between emotions, behaviour, learning, interactions and goals (connection) • the tools and skills to stay safe online and in person (safety) • the active role we play in achieving and maintaining our wellbeing (wellbeing) • the strategies to achieve and maintain positive relationships (relationships) and building on each other's thinking through comments and questions.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 6", "th": "Where We Are in Place and Time", "ci": "Human migration is a response to challenges, risks and opportunities.", "lo": "The causes for and consequences of migration (Causation) • The changes in societies as a result of migration (Change) • The impact of migration on the individual, both positive and negative (Impact) • Migration results in a more diverse society (Diversity)", "s": [{"t": "Book Creator", "d": "Students create a 'This is Your Life' migration biography based on their interview with a migrant or refugee, incorporating push and pull factors identified during the Seesaw task, maps tracing the migration journey plotted during the Boy Overboard geography research, key vocabulary from the Hamid's Story storyboard, and connections to class texts including The Littlest Refugee by Ahn Do and Rachel's Story.", "c": "end"}, {"t": "iMovie", "d": "Students produce their Micro Lab migration story presentation as a video, combining their interview recording with visual elements including migration route maps, the push and pull factors graphic organiser, and connections drawn to Cuc Lam's Story, the Australian Immigration History infographic, and historical events such as the Gold Rush, World Wars, and government initiatives like the Ten Pound Pom and Snowy River schemes.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design their 'This is Your Life' migration presentation for the Micro Lab format, incorporating interview responses sorted into concept headings (Causation, Change, Impact, Diversity), the Define-Connect-Extend thinking routine from the tuning-in phase, and comparative analysis of similarities and differences identified when watching the Fariba and Fatima refugee video.", "c": "end"}, {"t": "Seesaw", "d": "Students document their ongoing learning through the push and pull factors task, KWL chart about refugees and migrants, notes from guest speakers Kathryn Hand and Alicia Meine sharing their personal migration stories, and reflections on the BTN Refugees and Migrants special, building toward their final Micro Lab presentation and conceptual post-assessment.", "c": "beginning"}, {"t": "Google Earth", "d": "Students trace migration routes on interactive maps during the Boy Overboard geography research task, plotting the seven continents and journeys of Hamid, Ahn Do, Cuc Lam, and their own interviewee, annotating each route with push and pull factors and key historical migration events studied through the Australian Immigration History timeline.", "c": "middle"}, {"t": "Pico VR", "d": "Students use Pico VR to virtually visit countries and regions connected to the migration stories studied during the unit — the settings of Hamid's Story, Ahn Do's journey from Vietnam, and the homelands of their interview subjects — building empathy and geographic understanding before completing their This is Your Life Micro Lab presentations.", "c": "middle"}, {"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to the causes for and consequences of migration (causation) • the changes in societies as a result of migration (change) • the impact of migration on the individual, both positive and negative (impact) • migration results in a more diverse society (diversity), dropping pins and adding labels describing what they observe — building a visual map of existing knowledge before the class investigation begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about the causes for and consequences of migration (causation) • the changes in societies as a result of migration (change) • the impact of migration on the individual, both positive and negative (impact) • migration results in a more diverse society (diversity) in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the causes for and consequences of migration (causation) • the changes in societies as a result of migration (change) • the impact of migration on the individual, both positive and negative (impact) • migration results in a more diverse society (diversity), building a visual portfolio of evidence throughout the unit.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 6", "th": "How We Express Ourselves", "ci": "Understanding global issues and using effective communication empowers us to raise awareness and inspire action.", "lo": "Global issues are caused by interconnected factors that require collective solutions (Causation) • Presentations in the media can reflect the perspective of the author rather than the truth (Perspective) • We must make responsible choices when responding to and creating media (Responsibility) • Messages can be expressed through a range of mediums and elements can be adjusted to enhance effectiveness (Communication) • Design choices contribute to the effectiveness of a message (Influence)", "s": [{"t": "Green Screen + iMovie", "d": "Students produce their PYP Exhibition media campaign film using green screen technology, combining scripted live performances with researched content about their chosen global issue, incorporating iMovie transitions and music transfers learned during production, and presenting alongside their keynote display on Exhibition sharing day.", "c": "end"}, {"t": "Canva", "d": "Students design their Exhibition campaign materials including a group logo informed by Visual Arts lessons on colour, line, and emphasis in effective logo design, persuasive posters featuring their campaign name and slogan, and a presentation summarising their Root Cause Analysis findings, Compass Sustainability Model connections, and Lotus diagram research organised by their student-created lines of inquiry.", "c": "end"}, {"t": "Adobe Express Podcasting", "d": "Students produce an Exhibition podcast episode investigating their chosen global issue, structured using the MISO research method, incorporating bibliography sources curated with Katherine from the library, and drawing on insights from guest speaker Ben Lilley's media campaign expertise and the DLP-led upskilling sessions on podcast audio editing.", "c": "end"}, {"t": "Seesaw", "d": "Students maintain their Exhibition journal throughout the inquiry cycle, uploading Root Cause Analysis work, vision statements, central idea and lines of inquiry drafts, Compass Sustainability brainstorms, sorting-out slides colour-coded by line of inquiry (yellow, blue, green), bibliography entries, and fortnightly self and peer reflections assessed against their group Essential Agreement.", "c": "beginning"}, {"t": "Delightex (CoSpaces)", "d": "Students build interactive 3D Exhibition displays in CoSpaces during the DLP upskilling sessions, creating virtual environments that present their global issue research and action plans using Canva AI vibe coding to generate interactive quizzes, games, or matching exercises that engage the Exhibition audience alongside their live performance component.", "c": "middle"}, {"t": "GarageBand", "d": "Students compose original backing tracks and sound effects in GarageBand for their Exhibition live performance scripts, selecting instruments and layering audio to match the tone of their campaign message, then transferring the music to their iMovie Green Screen films as practised during the production phase.", "c": "middle"}, {"t": "Insta360 Cam", "d": "DLC captures 360° footage of the PYP Exhibition displays and live performances using the Insta360 camera, creating an immersive virtual gallery that preserves each group's keynote presentation, logo, campaign materials, and Green Screen film for families and the school community to revisit after Exhibition day.", "c": "middle"}, {"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you global issues are caused by interconnected factors that require collective solutions (causation) • presentations in the media can reflect the perspective of the author rather than the truth (perspective) • we must make responsible choices when responding to and creating media (responsibility) • messages can be expressed through a range of mediums and elements can be adjusted to enhance effectiveness (communication) • design choices contribute to the effectiveness of a message (influence)?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page experimenting with different ways to express global issues are caused by interconnected factors that require collective solutions (causation) • presentations in the media can reflect the perspective of the author rather than the truth (perspective) • we must make responsible choices when responding to and creating media (responsibility) • messages can be expressed through a range of mediums and elements can be adjusted to enhance effectiveness (communication) • design choices contribute to the effectiveness of a message (influence) — through images, text, drawing and recorded voice — reflecting on which medium communicates their idea most effectively.", "c": "beginning"}]}, {"ca": "St Kilda", "yl": "Year 6", "th": "How the World Works", "ci": "The relationships between the Earth, Moon and Sun create predictable patterns that shape life on our planet and are understood through both scientific and cultural perspectives.", "lo": "The movement of the Earth, Moon and Sun causes predictable patterns such as day/night, moon phases, tides and seasons (Causation) • Different cultures, including Indigenous knowledge systems, interpret the night sky in unique and meaningful ways (Perspective) • The Earth, Moon and Sun have specific structures, positions and relationships that can be represented through models and simulations (Form)", "s": [{"t": "Adobe Express Podcasting", "d": "Students produce a space science podcast selecting a topic from the free-choice board to research and investigate, modelling their episode on podcast features identified during the listening phase, covering concepts such as Earth's rotation causing day and night, the tilted axis creating seasons, Moon phases from their two-week Moon Diary, or Indigenous astronomy stories explored through the First Inventors resources.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive space simulation in Scratch modelling how Earth's rotation causes day and night, how the tilted axis creates seasons across hemispheres, or how the Moon's orbit produces the sequence of phases tracked in their Moon Diary, building on the hands-on globe and flashlight experiments and Oreo cookie modelling completed during class lessons.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Space Science Investigation' book documenting their See-Think-Wonder responses to the Earth from Space time-lapse provocation, annotated day/night diagrams from the globe simulation, Moon Diary observations with correctly sequenced phase names, cause-effect tide diagrams linking Moon phases to spring and neap tides, and Indigenous seasons comparisons from the Behind the News episode.", "c": "end"}, {"t": "Seesaw", "d": "Students record their See-Think-Wonder responses to the Earth from Space time-lapse provocation video, upload mind maps connecting key vocabulary (orbit, rotation, phase, tide), share annotated diagrams from the day/night rotation and moon phase modelling lessons, and reflect on cultural perspectives explored through the First Inventors Indigenous astronomy stories.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore how Earth's axial tilt affects seasons in different hemispheres, compare Indigenous seasonal calendars with European climate descriptions studied during the BTN Indigenous Seasons lesson, and investigate tidal patterns at coastal locations connected to the BBC Bitesize tides animation, building geographic context for their space science inquiry.", "c": "middle"}, {"t": "Pico VR", "d": "Students use Pico VR to explore immersive solar system environments, experiencing Earth's rotation, Moon phases tracked in their Moon Diary, and the scale of the Sun-Earth-Moon system up close, extending the hands-on globe and flashlight simulation into a 360° experience and connecting to the cultural astronomy perspectives from the First Inventors resources.", "c": "end"}, {"t": "Lego Spike", "d": "Students build a motorised Lego Spike orrery demonstrating how Earth's rotation causes day and night and how the Moon orbits Earth to produce the phases they recorded in their Moon Diary, programming the motor speeds to show relative orbital periods and presenting their working model during the Lesson 8 gallery walk showcase.", "c": "beginning"}, {"t": "Micro:bit", "d": "Students program micro:bit light sensors to collect data on light intensity changes during the globe and flashlight day/night simulation, graphing the results to demonstrate how Earth's rotation creates predictable patterns of light, and comparing their sensor data with the sunrise/sunset tracking activity.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the movement of the earth, moon and sun causes predictable patterns such as day/night, moon phases, tides and seasons (causation) • different cultures, including indigenous knowledge systems, interpret the night sky in unique and meaningful ways (perspective) • the earth, moon and sun have specific structures, positions and relationships that can be represented through models and simulations (form), building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the movement of the earth, moon and sun causes predictable patterns such as day/night, moon phases, tides and seasons (causation) • different cultures, including indigenous knowledge systems, interpret the night sky in unique and meaningful ways (perspective) • the earth, moon and sun have specific structures, positions and relationships that can be represented through models and simulations (form) and building on each other's thinking through comments and questions.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 6", "th": "How We Organise Ourselves", "ci": "The way a country is governed impacts the lives of citizens.", "lo": "The key institutions and functions of Australia's democratic system of government (Function) • How government decisions impact citizens at federal, state and local levels (Causation) • The rights and responsibilities of Australian citizens and their obligations as global citizens (Equality/Citizenship)", "s": [{"t": "Canva Presentation", "d": "Students design a 'Bill to Parliament' presentation outlining their proposed law inspired by issues they are passionate about, following the parliamentary process studied through the BTN 'Passing a Bill' video, including research evidence gathered using the Bill to Parliament PowerPoint planning template, and arguments structured from the pros and cons analysis practised during the Under-16 Social Media Ban debate.", "c": "end"}, {"t": "iMovie", "d": "Students produce a Canberra Tour documentary combining footage and reflections from visits to Parliament House, the High Court, Australian War Memorial, Museum of Australian Democracy, National Capital Exhibition, and the Embassy Tour, narrating how each institution connects to the three levels of government, the 4 Roles of Parliament, and the lines of inquiry explored throughout the unit.", "c": "end"}, {"t": "Adobe Express Podcasting", "d": "Students produce a civics podcast episode debating a governance topic such as the Under-16 Social Media Ban, structured around the pros and cons brainstormed in table groups, incorporating vocabulary from the PEO 'What is Parliament?' video and the 4 Roles of Government lesson, and citizenship rights and responsibilities explored through the ClickView Australian Citizenship video and 'We Are Australian 2025' reading comprehension.", "c": "end"}, {"t": "Seesaw", "d": "Students complete ongoing reflection tasks including the Canberra Tour Seesaw reflection connecting trip experiences to the lines of inquiry, 'I used to think… and now I know…' responses after the Social Media Ban discussion, notes from the 3 Levels of Government BTN lesson, and the Local Government PowerPoint researching their own council's LGA, logo, services, and personal family connections.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students design and conduct a class referendum on a current issue using the Australian Electoral Commission resources explored during the unit, collecting and analysing peer votes to understand how democratic processes function, connecting to the Quick Think brainstorm about who makes the rules and the Federation map activity tracing how Australia's capital was chosen.", "c": "beginning"}, {"t": "CoDrone EDU", "d": "Students investigate Australian drone regulations as a real-world civics case study, researching which level of government (federal CASA rules vs local council restrictions vs state laws) controls airspace, then programming CoDrone EDU flight paths within permitted boundaries, connecting to their exploration of how the three levels of government divide responsibilities and their Bill to Parliament planning.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with the key institutions and functions of australia's democratic system of government (function) • how government decisions impact citizens at federal, state and local levels (causation) • the rights and responsibilities of australian citizens and their obligations as global citizens (equality/citizenship) — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of the key institutions and functions of australia's democratic system of government (function) • how government decisions impact citizens at federal, state and local levels (causation) • the rights and responsibilities of australian citizens and their obligations as global citizens (equality/citizenship) as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the key institutions and functions of australia's democratic system of government (function) • how government decisions impact citizens at federal, state and local levels (causation) • the rights and responsibilities of australian citizens and their obligations as global citizens (equality/citizenship) and building on each other's thinking through comments and questions.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Year 6", "th": "Sharing the Planet", "ci": "Peoples' actions affect the balance of nature.", "lo": "What the environment is comprised of and how ecosystems function (Form) • Our responsibility to care for and protect the natural world (Responsibility) • The interdependence between humans, animals and the environment (Interdependence) • The consequences of human actions on the balance of nature (Consequences)", "s": [{"t": "Canva Presentation", "d": "Students design their STEM Design Project presentation for the gallery walk, showcasing their conservation technology prototype for a threatened Australian species, including research from the Melbourne Zoo excursion Tracker Tech observations, benefits and limitations analysis of existing technologies, and the Empathise-Define-Ideate-Prototype-Test design thinking process documented throughout the Zoo Design Challenge.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Conservation Technology Field Guide' documenting their learning journey from the Plains Wanderer research exploring Dr Karen Rowe's monitoring challenges through the Melbourne Zoo Tracker Tech excursion to their final STEM prototype, incorporating the Borun and Tuk Dreamtime storyboard from Gunaikurnai country, Camp Mallana flora and fauna observations from the Keeping Place visit, and the Orange-bellied Parrot narrative paragraph.", "c": "end"}, {"t": "iMovie", "d": "Students produce a STEM Design Project documentary filming their prototype presentation and gallery walk, combining footage of their conservation technology model with narration explaining how the design addresses threats to their chosen species, referencing tracking and monitoring technologies observed at Melbourne Zoo and environmental observations from Camp Mallana and the Bairnsdale Keeping Place excursion.", "c": "end"}, {"t": "Seesaw", "d": "Students complete portfolio tasks throughout the unit including the Design Thinking reflection on their STEM prototype process using the design checklist, the Camp Mallana reflection using DeBono thinking hats to process environmental observations, and the Orange-bellied Parrot narrative writing task, building an ongoing portfolio record connecting the zoo excursion, camp, and STEM project inquiry journey.", "c": "middle"}, {"t": "Google Earth", "d": "Students use satellite imagery to trace the Borun and Tuk Dreamtime story locations across Gunaikurnai country using the Stories and Songlines resources, identify habitats of their chosen threatened species researched for the Zoo STEM Design Challenge, and map the Camp Mallana region near Bairnsdale to connect their field observations of local flora and fauna to broader environmental patterns across Victoria.", "c": "middle"}, {"t": "DJI Drone (teacher-operated)", "d": "DLC captures aerial footage of the Melbourne Zoo grounds and local conservation areas, providing a bird's-eye perspective of animal habitats and enclosures that students analyse alongside the Tracker Tech observations from their zoo excursion, adding spatial context to their STEM Design Project research on tracking and monitoring threatened species.", "c": "middle"}, {"t": "Insta360 Cam", "d": "DLC captures 360° footage inside Melbourne Zoo enclosures and at Camp Mallana using the Insta360 camera, creating immersive reference material that students incorporate into their STEM Design Project presentations during the gallery walk, showing the real habitats their conservation technology prototypes are designed to protect.", "c": "beginning"}, {"t": "Lego Spike", "d": "Students build a Lego Spike prototype of their conservation tracking or monitoring device for the STEM Design Thinking Challenge, programming sensors and motors to simulate how their technology would detect and track their chosen threatened species, presenting the working model alongside their research PowerPoint during the gallery walk with 6A, 6B, and 6C.", "c": "end"}, {"t": "Micro:bit", "d": "Students program micro:bit environmental sensors to collect temperature, light, and moisture data at Camp Mallana, comparing readings across different habitats observed during the Bairnsdale Keeping Place excursion to understand the environmental conditions their chosen threatened species requires, feeding real data into their STEM Design Project research.", "c": "middle"}, {"t": "Padlet", "d": "Students post an image, headline or question about what the environment is comprised of and how ecosystems function (form) • our responsibility to care for and protect the natural world (responsibility) • the interdependence between humans, animals and the environment (interdependence) • the consequences of human actions on the balance of nature (consequences) on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to what the environment is comprised of and how ecosystems function (form) • our responsibility to care for and protect the natural world (responsibility) • the interdependence between humans, animals and the environment (interdependence) • the consequences of human actions on the balance of nature (consequences) — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Prep", "th": "Sharing the Planet", "ci": "Living things share our world and have an important role in nature", "lo": "The different living things around us; The roles living things play in nature; How humans and other living things share space", "s": [{"t": "⏳ Planner Needed", "d": "Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 3", "th": "Where We Are in Place and Time", "ci": "Exploration leads to new discoveries that can shape and change society.", "lo": "The factors that motivate exploration (Causation); How people reflect on discoveries from the past to inform change (Change); How exploration brings about change and new understandings for people, places and society (Change)", "s": [{"t": "Canva Presentation", "d": "Students design an explorer biography poster profiling the famous explorer they researched using Britannica Kids, World Book Kids and Kiddle, presenting their motivation to explore (push and pull factors), key discoveries, and lasting impact on society.", "c": "end"}, {"t": "Book Creator", "d": "Students create a historical diary from the perspective of an explorer during the First Fleet, incorporating knowledge from the Drama Toolbox incursion role-play experience and BTN video research about conditions in Britain in the late 1780s, writing four diary entries using the planning template.", "c": "end"}, {"t": "Adobe Express (Video)", "d": "Students produce a 'Mars Colony Pitch' video presenting their group's UN Mars colonisation project, explaining how they incorporated at least 3 UN Sustainable Development Goals into their colony design, researched Mars conditions using Epic and Kiddle, and connected exploration of the past to designing for the future.", "c": "end"}, {"t": "Seesaw", "d": "Students document push and pull factors from the First Fleet BTN video provocation and their explorer research, photographing their work and recording reflections about what motivates people to explore — building vocabulary with the First Fleet glossary wall.", "c": "beginning"}, {"t": "Padlet", "d": "Students build a collaborative Reconciliation Week exploration board, sharing reflections from the Welcome to Country video, Reconciliation Australia resources, and their reconciliation footprint artwork exploring the theme of how exploration and discovery have impacted First Nations peoples.", "c": "middle"}, {"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to the factors that motivate exploration (causation), dropping pins and adding labels describing what they observe — building a visual map of existing knowledge before the class investigation begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about how people reflect on discoveries from the past to inform change (change) in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the factors that motivate exploration (causation), building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about the factors that motivate exploration (causation) with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 4", "th": "Where We Are in Place and Time", "ci": "Human migration is a response to challenges and opportunities", "lo": "The reasons people migrate; Migration throughout history; Effects of migration on communities, cultures and individuals", "s": [{"t": "⏳ Planner Needed", "d": "Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.", "c": "end"}]}, {"ca": "Glen Waverley", "yl": "Year 6", "th": "How We Express Ourselves", "ci": "The media engages its audience and invites a response", "lo": "How media targets audiences; Techniques used to engage and persuade; Critical evaluation of media messages", "s": [{"t": "⏳ Planner Needed", "d": "Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 6", "th": "How We Organise Ourselves", "ci": "Student-led exhibition (PYPEX) – Students develop and present their own units of inquiry.", "lo": "Student-led transdisciplinary themes; Approaches to learning; Research and presentation skills", "s": [{"t": "Adobe Express (Website)", "d": "Students build a professional exhibition website for their PYPEX unit of inquiry, featuring their research findings, transdisciplinary connections displayed using the unit outline template, and a Venn diagram comparing their research topic in Australia and China (or their home country).", "c": "end"}, {"t": "Canva Presentation", "d": "Students design their PYPEX unit of inquiry display materials (both poster and digital presentations), incorporating the Learner Profile attributes they identified, Approaches to Learning connections, and media campaign materials — creating 30+ items of media per group as required.", "c": "end"}, {"t": "iMovie", "d": "Students produce a documentary showcasing their PYPEX inquiry journey from the Launch Day provocation through to their final presentation, demonstrating research and referencing skills, file management, and their ability to present findings to an audience of parents and community members.", "c": "end"}, {"t": "Adobe Express (Podcast)", "d": "Students create a podcast series documenting their PYPEX research process, including interviews, reflections on their Essential Agreement creation, and discussion of their shared issue — building ICT media representation and critical evaluation skills.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students create feedback surveys for their PYPEX exhibition audience, collecting data on the effectiveness of their presentation and media campaign, then analysing results using Excel to reflect on their inquiry process.", "c": "middle"}, {"t": "Green Screen + iMovie", "d": "Students use green screen technology to film segments of their PYPEX documentary, placing themselves within contexts relevant to their unit of inquiry topic, combining the footage with their research presentations and interview recordings in the final exhibition showcase.", "c": "middle"}, {"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D exhibition space in CoSpaces for their PYPEX unit of inquiry, creating a virtual gallery that visitors can explore featuring research findings, data visualisations, and multimedia elements, complementing their physical exhibition display and website.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with student-led transdisciplinary themes — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of approaches to learning as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot testing their assumptions about research and presentation skills — the results reveal what the class already knows and where the biggest knowledge gaps are, helping the teacher shape the inquiry direction.", "c": "beginning"}]}, {"ca": "Glen Waverley", "yl": "Year 6", "th": "How the World Works", "ci": "Scientists undertake experimentation to confirm, contest and create new theories.", "lo": "The scientific method; How experiments lead to new understandings; The relationship between planets and the Sun; Energy transfer and transformation in circuits", "s": [{"t": "Adobe Express (Video)", "d": "Students produce a science documentary explaining their squishy circuits investigation (testing which materials are conductors or insulators), electrical circuit experiments, and the connection between experimentation and building new understanding about energy transfer and transformation.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Scientific Investigation' journal documenting their experiments with reversible changes (dissolving, changes of state) and irreversible changes (cooking, rusting), including their sundial construction where they measured shadow movement and angle at different times to understand Earth-Sun relationships.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a science poster connecting their hands-on investigations — playdough scale planet models, squishy circuit conductivity tests, and reversible/irreversible change experiments — to the scientific method and how experimentation confirms or contests theories.", "c": "end"}, {"t": "Micro:bit", "d": "Students use micro:bits to collect data during their electrical circuit investigations, measuring and recording how energy transfers through different circuit components and connecting sensor data to the scientific method of repeatable investigation.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build and code a motorised Lego Spike model demonstrating energy transformation (electrical to kinetic), connecting to the Visual Art fibre art circuit project and the unit's focus on how the transfer and transformation of energy works in electrical circuits.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros with LED colour changes to demonstrate energy transformation concepts explored during their squishy circuits investigations, coding sequences where battery energy converts to light and motion, connecting the observable outputs to their scientific theories about reversible and irreversible changes.", "c": "middle"}, {"t": "CoDrone EDU", "d": "Students investigate how drones rely on scientific principles (aerodynamics, electrical energy, gyroscopic sensors) to fly, programming CoDrone EDU to perform controlled manoeuvres while explaining the science behind each movement, connecting drone technology to their experimentation unit about confirming and contesting scientific theories.", "c": "middle"}, {"t": "Delightex (CoSpaces)", "d": "Students build an interactive 3D solar system in CoSpaces using data from their playdough scale planet models, creating a virtual space that visitors can explore with accurate planet sizes and distances, extending their science poster and investigation journal into an immersive digital experience.", "c": "end"}, {"t": "Mentimeter", "d": "Students respond to 'What do you already know about the scientific method?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how how experiments lead to new understandings works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot quiz testing common assumptions about the relationship between planets and the sun — wrong answers reveal misconceptions the class will investigate, and the teacher uses results to differentiate inquiry groups.", "c": "beginning"}]}, {"ca": "Glen Waverley", "yl": "Year 3", "th": "How We Organise Ourselves", "ci": "Needs can be met with digital systems.", "lo": "What are digital systems; Ideas and information can be organised and shared in safe online environments; Being a responsible digital citizen", "s": [{"t": "Book Creator", "d": "Students create a 'Digital Citizenship' graphic novel exploring responsible online behaviour scenarios, extending their Book Creator skills while demonstrating understanding of digital wellbeing explored through library sessions about balancing screen time.", "c": "end"}, {"t": "Scratch", "d": "Students build a Scratch simulation of a school library system where the player takes on the role of librarian — scanning books in using a barcode reader (clicking sprites), sorting them into the correct genre sections (dragging to shelves), and helping student characters find the right book by searching a catalogue. The game tracks how many books are correctly shelved and returned, with a timer adding pressure, demonstrating how digital systems use input, processing and output to meet real-world needs and what happens when parts of the system break down.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design an infographic explaining what digital systems are and how they help meet community needs, incorporating their understanding of ICT media representation and informed choices.", "c": "end"}, {"t": "Seesaw", "d": "Students document their exploration of digital systems by photographing and annotating how different school technologies work together (iPads, apps, networks), reflecting on responsible digital citizenship.", "c": "middle"}, {"t": "Kahoot", "d": "Students collaboratively create quiz questions about digital safety, digital footprints, and responsible online behaviour, testing classmates' understanding of being a responsible digital citizen.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with what are digital systems — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of ideas and information can be organised and shared in safe online environments as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot testing their assumptions about being a responsible digital citizen — the results reveal what the class already knows and where the biggest knowledge gaps are, helping the teacher shape the inquiry direction.", "c": "beginning"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of what are digital systems and building on each other's thinking through comments and questions.", "c": "middle"}]}, {"ca": "Glen Waverley", "yl": "Year 6", "th": "Where We Are in Place and Time", "ci": "Human needs drive the development of nations.", "lo": "How human needs drive national development; Role of migration in nation building; Impacts of development on Indigenous and colonial populations", "s": [{"t": "Canva Presentation", "d": "Students design a multi-perspective research presentation examining how migration shaped Australia's development, featuring their notable Australian biography research and connecting push-pull factors of migration to the documentary evidence that worked well from previous years.", "c": "end"}, {"t": "iMovie", "d": "Students produce a documentary about Australia's nation-building journey, incorporating perspectives from First Nations people before European migration, the Melbourne Museum excursion observations, and the Seesaw summative assessment showcasing three key concepts from the unit.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Nation Building' research book documenting how human needs drove development, including chapters on Indigenous perspectives, migration stories, colonisation impacts, and the Westminster system of government — using the key vocabulary (migration, citizenship, colonisation, refugee, push-pull factors).", "c": "end"}, {"t": "Google Earth", "d": "Students trace migration routes to Australia, annotating key locations with push-pull factors, connecting to their research on how the arrival of European migrants affected First Nations Australians' Countries and ways of living.", "c": "middle"}, {"t": "Seesaw", "d": "Students document their three key takeaway concepts from the unit in the summative assessment task, recording reflections that connect multiple perspectives between First Nations people and white migrants to the development of modern Australia.", "c": "middle"}, {"t": "Green Screen + iMovie", "d": "Students film first-person historical accounts using green screen, performing as figures from different eras to demonstrate how human needs drove the development of nations, combining the footage with their research into an engaging documentary that brings history to life.", "c": "end"}, {"t": "GarageBand", "d": "Students compose era-appropriate soundtracks in GarageBand for their historical documentaries, selecting instruments and styles that reflect different time periods and cultures studied during the unit, connecting music production to their research on how civilisations developed in response to human needs.", "c": "middle"}, {"t": "DJI Drone (teacher-operated)", "d": "DLC captures aerial footage of local historical sites and infrastructure around Glen Waverley, providing students with a perspective on how human needs have shaped the development of their own community over time, connecting local examples to the broader global patterns explored in the unit.", "c": "middle"}, {"t": "Mentimeter", "d": "Students use Mentimeter live polling to rank which human needs (shelter, food, safety, trade, governance) most drove the development of the nations they researched, generating class data visualisations that inform their presentations and deepen discussion about causation and perspective.", "c": "middle"}, {"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to how human needs drive national development, dropping pins and adding labels describing what they observe — building a visual map of existing knowledge before the class investigation begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about role of migration in nation building in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Google Earth", "d": "Students take a virtual field trip using Google Earth to explore locations connected to impacts of development on indigenous and colonial populations, recording observations in a shared document — building geographic context and generating inquiry questions before the unit investigation begins.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Prep", "th": "Where We Are in Place and Time", "ci": "Discovering our past helps us know more about ourselves today.", "lo": "Our personal stories and histories; Reflecting on and recording our past; Our ancestry and families", "s": [{"t": "⏳ Planner Needed", "d": "Planner content not yet uploaded — specific su
