 "Elsternwick", "yl": "Year 2", "th": "How We Express Ourselves", "ci": "Artistic appreciation and expressions inspire our imagination and creativity.", "lo": "Forms of expression; Expressing thoughts and ideas; Understanding and appreciating art", "s": [{"t": "Book Creator", "d": "Students create an 'Art Exploration' portfolio documenting the different forms of expression explored during the unit — including their 'How am I creative?' self-reflection drawings, Lego building without a plan, dance and drama pieces, and their pet portrait combining various art styles and skills.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record a gallery walk presentation of their pet portrait artwork, explaining which art styles they combined, how they experimented with new ideas and techniques (connecting to the unit focus on embracing experimentation without fear of failure), and what inspired their creative choices.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design an 'Artist Statement' poster explaining their creative journey through the unit, showing how different forms of expression (visual art, music, drama, Lego) inspired their imagination and how they used recycled materials responsibly as creators.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph their creative process during art activities (Lego building, collage making, drawing) and record reflections about how expression makes them feel, connecting to the Learner Profile focus on being a risk-taker who 'embraces experimentation'.", "c": "middle"}, {"t": "Book Creator", "d": "Collaborative class 'Creativity Book' where each student contributes a page about a different form of creative expression they experienced, including photos and descriptions of their artwork.", "c": "middle"}, {"t": "GarageBand", "d": "Students create short soundscapes in GarageBand to accompany their art gallery exhibition, composing music that reflects the mood and style of the artistic expressions explored throughout the unit including their pet portrait artwork and creative process documentation.", "c": "middle"}, {"t": "Seesaw", "d": "Students use the camera and drawing tools to create a 'Before I Knew' page showing what forms of expression looks like to them right now — using pictures, labels and voice recording to capture their starting understanding.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page showing different ways they can express the idea of expressing thoughts and ideas — through drawing, voice, photos and text — exploring which method feels most natural to them.", "c": "beginning"}, {"t": "Seesaw", "d": "Students respond to a class provocation about understanding and appreciating art by choosing one of three images on Seesaw and recording why it connects to their life — the teacher uses responses to form inquiry groups for the unit.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 2", "th": "How the World Works", "ci": "Forces and motion are all around us.", "lo": "Forces around us; Scientific laws of motion; Innovations in technology", "s": [{"t": "Book Creator", "d": "Students create a 'Forces and Motion Investigation' report documenting their experiments with push, pull, friction, magnets, and gravity, including labelled diagrams (practised during the unit), photographs of their ramp experiments, and scientific vocabulary from the class word wall built together.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record themselves conducting a forces experiment at the Maker Space (testing ramps, magnets, or simple machines), using the scientific vocabulary from the class vocab wall to explain their prediction, method, and conclusion — 'sounding like scientists'.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design an 'Innovations in Technology' poster connecting simple machines and forces to modern inventions, drawing on the Twisted Science excursion provocation and their hands-on experiences with materials, energy, and motion in the Maker Space.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph each step of their force experiments (ramp angle changes, magnet tests, friction investigations) and use drawing tools to create labelled diagrams, practising the scientific documentation skills emphasised in the unit.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build and test simple machines (ramps, levers, pulleys) using Lego, measuring how different forces affect motion and connecting their findings to the scientific laws explored through hands-on investigations.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to roll at different speeds across various surfaces, measuring how far each travels to investigate friction, then compare results with their ramp experiments testing push, pull, and gravity forces documented in their investigation reports.", "c": "middle"}, {"t": "Micro:bit", "d": "Students use micro:bit accelerometers to measure the force of a push during their ramp experiments, displaying readings on the LED screen and recording data to compare how different forces and materials affect motion across their investigation activities.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph or draw something from their environment connected to forces around us and record a voice note explaining what they think is happening and why — capturing their scientific thinking before investigations begin.", "c": "beginning"}, {"t": "Book Creator", "d": "Students draw their prediction of what will happen when they explore scientific laws of motion and record a voice note explaining their reasoning — creating a 'My Prediction' page to compare against results later.", "c": "beginning"}, {"t": "Seesaw", "d": "Students take photos of things around the school connected to innovations in technology and add them to a shared class Seesaw activity, then the class sorts and discusses the collection — identifying patterns and questions to investigate.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 2", "th": "How We Organise Ourselves", "ci": "Marketplaces reflect the needs and wants of communities.", "lo": "Needs and wants; The changing needs of communities; The design process", "s": [{"t": "Canva Presentation", "d": "Students design a product pitch presentation for the item they created using the design thinking process (empathise, define, ideate, prototype, test), explaining how their product meets a specific community need identified through the Sacred Heart Mission Glen Huntly Road excursion.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Design Thinking Journal' documenting each stage of the design process — from the Wants vs Needs provocation sorting game through to their final prototype, including photos of their Maker Space creations and reflections on how community needs change over time.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record a persuasive advertisement for their marketplace product, demonstrating the difference between needs and wants learned from the sorting game provocation and explaining how their design addresses a real community need observed during the local walk.", "c": "end"}, {"t": "Scratch Jr", "d": "Students code a simple animation advertising their marketplace product, showing the need-want distinction and demonstrating how their design thinking solution helps the community — connected to the Sacred Heart Mission excursion learning.", "c": "middle"}, {"t": "Padlet", "d": "Students post their product designs at each stage of the design thinking process and peer-review each other's solutions, providing feedback on how well each product meets community needs.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw or photograph an example of needs and wants from their everyday life, then record a voice note explaining how it works — building a class collection of real-world connections before the inquiry begins.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph examples of the changing needs of communities around the school or home and create a Book Creator page sorting them into categories, with voice recordings explaining their grouping — practising the classification skills they will develop in the unit.", "c": "beginning"}, {"t": "Seesaw", "d": "Students respond to a class provocation about the design process by choosing one of three images on Seesaw and recording why it connects to their life — the teacher uses responses to form inquiry groups for the unit.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate needs and wants, building a visual portfolio of evidence throughout the unit.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 2", "th": "Sharing the Planet", "ci": "Taking care of our Earth starts with the choices we make.", "lo": "Earth's resources; How our actions affect the environment; Ways we can care for our planet", "s": [{"t": "Canva Presentation", "d": "Students design a persuasive 'Earth Care' poster showing how everyday choices impact the environment, incorporating the persuasive speech skills (stating opinions clearly, logically and respectfully) practised during the unit's communication focus.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record a persuasive speech about an environmental action they can take, using the presentation skills developed through the unit's focus on 'preparing a persuasive speech' and connecting to Athletics unit transdisciplinary thinking about responsible resource use.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Planet Care Action Plan' book showing Earth's resources, how human actions affect the environment, and specific actions for their school community — photographing examples of responsible resource use around school.", "c": "end"}, {"t": "Padlet", "d": "Students post examples of environmental choices they observe at school and home, building a class wonderwall showing before/after impacts of responsible decisions on the environment.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph examples of resource use around school and draw/annotate how each choice helps or harms the environment, building understanding of the connection between daily actions and planetary wellbeing.", "c": "middle"}, {"t": "Micro:bit", "d": "Students use micro:bit sensors to monitor environmental conditions around the school (light levels, temperature), collecting data to support their persuasive arguments about everyday choices that impact the Earth, adding evidence to their 'Earth Care' posters and action plans.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw what earth's resources means to them and record a voice note explaining their thinking — creating a 'Before' snapshot that will be compared with their 'After' understanding at the end of the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students photograph or draw something from nature connected to how our actions affect the environment and create a Book Creator page with labels and a voice note explaining why it matters — starting a personal inquiry book.", "c": "beginning"}, {"t": "Book Creator", "d": "Students add to their ongoing inquiry book, documenting new learning about earth's resources with labelled diagrams, photographs and written reflections showing how their thinking is developing.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 3", "th": "How We Express Ourselves", "ci": "Celebrations and traditions shape the culture of a community.", "lo": "The ways personal and cultural events are celebrated; Our appreciation of the diversity of cultures; How celebrations shape community identity", "s": [{"t": "Canva Presentation", "d": "Students design a 'Cultural Celebrations' research poster featuring a personal or cultural celebration they investigated, incorporating their family stories shared during the unit and exploring how celebrations shape community identity — connected to the provocation unpacking 'I Am Australian' by Gurrumal exploring First Nations perspectives.", "c": "end"}, {"t": "Book Creator", "d": "Students create a cultural research book documenting different celebrations and traditions explored during the unit, including representations of what the colours and symbols of the Australian flag represent, and personal family stories about how cultural events are celebrated.", "c": "end"}, {"t": "iMovie", "d": "Students produce a short documentary about a celebration or tradition important to their family or culture, including interviews with family members and connections to the music provocation exploring Gurrumal's 'I Am Australian' and what it means to belong to a diverse Australian community.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph and annotate cultural celebration artefacts, food, or decorations brought to class, recording voice explanations about what each item represents and how the celebration shapes their family's cultural identity.", "c": "middle"}, {"t": "Padlet", "d": "Students create a collaborative 'Celebrations Around the World' board where each student posts about a different cultural event, asking questions and making connections between traditions across cultures.", "c": "middle"}, {"t": "GarageBand", "d": "Students compose or arrange music in GarageBand representing the cultural celebrations and traditions they researched, selecting instruments and rhythms that reflect the heritage of the community being studied and embedding the audio into their iMovie documentary or Book Creator research project.", "c": "middle"}, {"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you the ways personal and cultural events are celebrated?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page experimenting with different ways to express our appreciation of the diversity of cultures — through images, text, drawing and recorded voice — reflecting on which medium communicates their idea most effectively.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about how celebrations shape community identity using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 3", "th": "How the World Works", "ci": "Humans use their understanding of scientific principles to take action.", "lo": "The work of scientists; The process of learning; How science brings about new understandings and changes", "s": [{"t": "Canva Presentation", "d": "Students design a scientist research poster profiling the scientist they chose to investigate, explaining their discoveries, the impact on society, and what Learner Profile attributes (drawn from the 'What is a scientist?' mind map task) make an effective scientist — connecting to how science brings about change due to need.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Scientific Principles in Action' book documenting different experiments conducted during the unit, including their labelled diagrams, predictions vs results, and reflections on how scientific understanding leads to real-world change through guided reading about scientists and their discoveries.", "c": "end"}, {"t": "Adobe Express (Video)", "d": "Students produce a short documentary about their chosen scientist's impact on the world, incorporating research from guided and shared reading experiences, class videos of scientists, and discussions about how discoveries change society.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph and annotate each stage of their scientific investigations, using the 'What is a scientist?' mind map vocabulary to explain observations and building their science communication skills through labelled diagrams.", "c": "middle"}, {"t": "Scratch", "d": "Students build a Scratch science lab simulator where the player is a scientist who must complete an experiment — selecting the right equipment, dragging variables into place (e.g. choosing a heat source, setting a timer, picking a container), then running the experiment and observing animated state changes (ice melting, water boiling, steam rising). Wrong choices trigger a 'Try Again' with feedback explaining why the method matters, reinforcing the scientific process of prediction, testing and observation explored throughout the unit.", "c": "beginning"}, {"t": "Micro:bit", "d": "Students use micro:bit sensors to collect data during their scientific investigations, programming the LED display to show temperature readings or light levels as evidence of scientific principles in action, connecting hands-on data collection to their scientist research profiles.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build a Lego Spike mechanism demonstrating a scientific principle their chosen scientist discovered, programming the motor and sensors to create a working model that shows cause and effect, presenting the prototype alongside their research poster and documentary.", "c": "end"}, {"t": "Mentimeter", "d": "Students respond to 'What do you already know about the work of scientists?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how the process of learning works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the work of scientists and building on each other's thinking through comments and questions.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 3", "th": "How We Organise Ourselves", "ci": "The rights and responsibilities of citizens are determined by the rules and laws of a community.", "lo": "The differences between rules and laws; People responsible for enforcing rules and laws; Rights and responsibilities of citizens; The consequences when rules, laws and rights are not met", "s": [{"t": "Canva Presentation", "d": "Students design an infographic comparing rules and laws (rules are guidelines at home, school and community; laws are made by government and must be met), incorporating perspectives from the card game activity where partners created their own rules and experienced what happens when rules aren't followed.", "c": "end"}, {"t": "Adobe Express (Video)", "d": "Students create a short public service announcement explaining citizens' rights and responsibilities, using scenarios from class discussions about consequences when rules and laws are not met, and connecting to the concept that all citizens need to abide by rules for the safety and wellbeing of the community.", "c": "end"}, {"t": "Scratch", "d": "Students design and code a Scratch game where the player takes on the role of a community law enforcement officer responding to different scenarios — a shopkeeper reports stolen goods, a neighbour complains about loud noise, a cyclist rides without a helmet. For each scenario, the player must choose the correct response (warning, fine, referral to court) based on whether the situation involves a broken rule or a broken law, earning points for correct decisions and receiving feedback explaining the consequences when rules and laws are not met.", "c": "end"}, {"t": "Kahoot", "d": "Students collaboratively create quiz questions about rules vs laws, rights vs responsibilities, and the role of different people in enforcing them — used as a review tool connecting to the Principled Learner Profile focus on accepting consequences of actions.", "c": "middle"}, {"t": "Seesaw", "d": "Students document their exploration of rules and laws through the card game provocation, recording reflections about what happened when groups created different rules and what they learned about fairness, perspective, and responsibility.", "c": "beginning"}, {"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with the differences between rules and laws — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of people responsible for enforcing rules and laws as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the differences between rules and laws, building a visual portfolio of evidence throughout the unit.", "c": "middle"}, {"t": "Padlet", "d": "Students share research findings and evidence on a collaborative board, making connections between different aspects of the differences between rules and laws and building on each other's thinking through comments and questions.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 3", "th": "Sharing the Planet", "ci": "Adaptation and sustainability ensure the survival of living things in changing environments.", "lo": "Adaptations and structural features of living things; Roles of living things in an ecosystem; Actions that benefit or harm ecosystems", "s": [{"t": "Book Creator", "d": "Students create an animal adaptation research book documenting the species they investigated, explaining physical and behavioural adaptations, the animal's role in its ecosystem, and connecting to observations from the Melbourne Aquarium excursion about how living things are adapted to their environments.", "c": "end"}, {"t": "iMovie/Green Screen", "d": "Students film themselves 'reporting live' from an ecosystem (using green screen), presenting their research on how adaptations ensure survival, incorporating findings from the Melbourne Aquarium excursion and class discussions about the positive and negative impact humans have on habitats.", "c": "end"}, {"t": "Adobe Express (Podcast)", "d": "Students produce a 'Planet Protectors' podcast episode discussing actions that benefit or harm ecosystems, featuring their research on animal adaptations and sustainability, and proposing actions their school community could take to protect local ecosystems.", "c": "end"}, {"t": "Seesaw", "d": "Students document observations from the Melbourne Aquarium excursion, photographing animals and annotating their physical adaptations, recording how each feature helps the animal survive in its specific ecosystem.", "c": "middle"}, {"t": "Google Earth", "d": "Students explore the habitats of animals they researched, comparing different ecosystems around the world and investigating how environmental changes threaten species survival, connecting to the unit's focus on sustainability and conservation responsibility.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to navigate obstacle courses representing different ecosystems, simulating how animals must adapt their movement to survive in changing environments, connecting coding challenges to the adaptation research documented in their animal investigation books.", "c": "middle"}, {"t": "Padlet", "d": "Students post an image, headline or question about adaptations and structural features of living things on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to roles of living things in an ecosystem — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about actions that benefit or harm ecosystems using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 4", "th": "Who We Are", "ci": "Leaders shape communities.", "lo": "Roles and responsibilities of effective leadership; The purpose of leadership in communities; Qualities of influential leaders", "s": [{"t": "Canva Presentation", "d": "Students design a leadership profile poster featuring the leader they researched in library sessions, including a painted portrait (created during Visual Art responding to the LI 'Strengths and qualities of a leader'), key leadership qualities, and how that leader shaped their community.", "c": "end"}, {"t": "Adobe Express (Video)", "d": "Students create a short documentary about their chosen leader's impact, incorporating research from guided reading (including Maro Molina questions), their painted portrait, and analysis of the common roles and responsibilities all leaders share.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Leadership Qualities' book comparing different leaders studied during the unit, explaining how form (recognisable roles), causation (effects leaders have), and participation (personal responsibility) connect to effective leadership in school, local and global communities.", "c": "end"}, {"t": "Padlet", "d": "Students post their leader research findings including key facts, leadership qualities, and impact evidence, creating a collaborative class gallery that shows the diversity of leadership explored through library research sessions and Seesaw documentation.", "c": "middle"}, {"t": "Seesaw", "d": "Students record weekly reflections on leadership moments observed in class, school, or current events, connecting to the Learner Profile focus on being principled and the PE exploration of how systems function through team-based sports.", "c": "middle"}, {"t": "Mentimeter", "d": "Students use Mentimeter live polling to rank leadership qualities, vote on the most impactful leaders studied during library research sessions, and gather class data on what makes an effective leader, building evidence for their leadership profile posters and documentaries.", "c": "middle"}, {"t": "Padlet", "d": "Students respond to the provocation 'Leaders shape communities.' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on roles and responsibilities of effective leadership.", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to the purpose of leadership in communities — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about qualities of influential leaders using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 4", "th": "How We Express Ourselves", "ci": "Technology transforms how we create and share ideas.", "lo": "How technology expands creative possibilities; The evolution of communication tools; The impact of technology on expression", "s": [{"t": "Adobe Express (Website)", "d": "Students create a digital portfolio website showcasing how technology has transformed creative expression, featuring their KWL chart journey, family interview findings about how technology/communication has changed, and examples of their own technology-enhanced creations from the unit.", "c": "end"}, {"t": "iMovie", "d": "Students produce a 'Then and Now' documentary comparing historical communication tools with modern technology, incorporating family interview responses about technological change and their personal 'top wonder' about technology's future impact on creative expression.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a timeline infographic showing the evolution of communication tools and their impact on how we create and share ideas, drawing on research, class discussions, and their care chart reflections about responsible technology use.", "c": "end"}, {"t": "Microsoft Forms", "d": "Students create a survey about how people in their school community use technology to create and share ideas, collecting and analysing data to present findings about the impact of technology on expression.", "c": "middle"}, {"t": "Padlet", "d": "Students document their technology exploration journey by posting examples of creative work made with different tools, reflecting on how each technology expanded their creative possibilities and sharing their journal entries about what they care about when using technology.", "c": "middle"}, {"t": "Green Screen + iMovie", "d": "Students use green screen to film themselves presenting from inside a historical setting, demonstrating the contrast between old and new communication tools explored in their 'Then and Now' documentary, showing firsthand how technology has transformed creative expression.", "c": "end"}, {"t": "Lego Spike", "d": "Students build and code a Lego Spike automated message delivery system, demonstrating how technology has transformed communication from manual to automated processes, connecting their engineering prototype to the evolution of communication tools mapped in their timeline infographic.", "c": "middle"}, {"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you how technology expands creative possibilities?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "GarageBand", "d": "Students experiment with sounds and beats in GarageBand to create a 30-second 'mood piece' that expresses their first impression of the evolution of communication tools — exploring how expression works beyond words before the unit dives deeper.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about the impact of technology on expression using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 4", "th": "How the World Works", "ci": "Changes to the Earth impact environment and communities.", "lo": "The causes of geological change over time; How extreme environments cause natural disasters; The impact of natural events on communities", "s": [{"t": "Canva Presentation", "d": "Students design a natural disaster research poster explaining the causes and impacts of their chosen natural event (bushfires, earthquakes, volcanoes — explored through BrainPop resources and class discussions), including how communities prepare for and respond to extreme environmental changes.", "c": "end"}, {"t": "Adobe Express (Video)", "d": "Students create an explanation video about geological changes and natural disasters, using the explanation text type practised during English (Seesaw Explanation Text activities) and incorporating research from digital and print text comparisons about environmental impacts on communities.", "c": "end"}, {"t": "Tinkercad", "d": "Students design a 3D model of an emergency shelter or community response structure for their chosen natural disaster, applying understanding of how extreme environments impact communities and connecting to the causes of geological change explored through mentor texts.", "c": "end"}, {"t": "Seesaw", "d": "Students document their natural disaster research using the Explanation Text structure, photographing and annotating diagrams showing cause-and-effect relationships between geological changes and community impacts, building on the prior knowledge assessment.", "c": "beginning"}, {"t": "Google Earth", "d": "Students explore locations around the world affected by natural disasters (bushfire zones, earthquake fault lines, volcanic regions), investigating how geological changes over time have shaped these environments and communities.", "c": "middle"}, {"t": "Micro:bit", "d": "Students program micro:bit accelerometers to simulate seismograph readings during their natural disaster research, shaking the sensor at different intensities to model earthquake measurements, connecting the data to their explanation texts about geological changes and community impacts.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build a Lego Spike earthquake-resistant structure incorporating sensors and motors, testing whether their design withstands shaking to connect engineering solutions to their Tinkercad emergency shelter prototype and natural disaster research.", "c": "middle"}, {"t": "Mentimeter", "d": "Students respond to 'What do you already know about the causes of geological change over time?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how how extreme environments cause natural disasters works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 4", "th": "How We Organise Ourselves", "ci": "Systems connect us.", "lo": "Human systems; The interconnections that exist within and across systems; The influence of systems on communities", "s": [{"t": "Canva Presentation", "d": "Students design a systems analysis infographic showing interconnections within a chosen system (e.g. classroom routine, human body, library borrowing system — examples explored during the initial provocation), mapping how parts connect and influence each other using the class 'SYSTEM' graffiti wall brainstorm as a starting point.", "c": "end"}, {"t": "Adobe Express (Video)", "d": "Students produce a short documentary exploring how a human system functions, connecting to PE investigations of team-based sports (basketball, netball, European handball) where they experienced how systems work through roles, rules, and interconnections.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive simulation demonstrating how a system works, showing what happens when one part changes or breaks down — connecting to the concept that the influence of systems on communities depends on interconnections.", "c": "end"}, {"t": "Padlet", "d": "Students collaboratively build a systems thinking board mapping the different systems they investigated during the unit, posting observations, diagrams, and reflections about how systems connect people and communities.", "c": "middle"}, {"t": "Seesaw", "d": "Students document system examples they discover in daily life (school timetable, lunch ordering, sports teams), using drawing tools to annotate how each system's parts are interconnected and influence the community.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build a Lego Spike automated sorting or delivery system demonstrating how interconnected components work together, programming sensors and motors to show what happens when one part of the system fails, connecting to their investigation of how human systems function and PE body systems research.", "c": "end"}, {"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with human systems — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of the interconnections that exist within and across systems as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot testing their assumptions about the influence of systems on communities — the results reveal what the class already knows and where the biggest knowledge gaps are, helping the teacher shape the inquiry direction.", "c": "beginning"}, {"t": "Microsoft Forms", "d": "Students design and conduct a class survey to gather perspectives on human systems, analysing the response data to identify patterns and inform their ongoing inquiry.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 4", "th": "Sharing the Planet", "ci": "Country, language and community are significant to the lives of First Nations people.", "lo": "The diversity of First Nations people; The importance of community, family and kinship; The importance of Country to First Nations people", "s": [{"t": "Book Creator", "d": "Students create a 'Connection to Country' research book documenting their investigation into First Nations diversity, community and kinship, including their clay totem design (representing themselves, inspired by studying totems' meaning and purpose) and reflections from Padlet about what they learned about different First Nations groups.", "c": "end"}, {"t": "Adobe Express (Podcast)", "d": "Students produce a respectful audio documentary exploring the importance of Country, language and community to First Nations people, incorporating stories shared through class provocations, research from Padlet reflections, and connections between First Nations perspectives and the concept of sharing the planet.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a research poster about a specific First Nations community group, showing the diversity of people, importance of kinship and family, and connection to Country — drawing on the investigation activities and Padlet facts printed for the inquiry space display.", "c": "end"}, {"t": "Padlet", "d": "Students share research findings about different First Nations groups, posting one fact per lesson to build a collaborative knowledge base (printed and used for the inquiry space), showing empathy, compassion and respect for different Indigenous perspectives.", "c": "middle"}, {"t": "Seesaw", "d": "Students photograph and reflect on their clay totem creation process, explaining the symbols they chose to represent themselves and connecting to the study of how totems hold meaning and purpose in First Nations cultures.", "c": "middle"}, {"t": "DJI Drone (teacher-operated)", "d": "DLC captures aerial footage of the local Elsternwick area and surrounding green spaces, providing a bird's-eye perspective of the land that students compare with First Nations understandings of Country, language groups, and connections to place explored throughout the unit.", "c": "middle"}, {"t": "GarageBand", "d": "Students compose a respectful soundscape in GarageBand inspired by the sounds of Country explored during the unit, layering natural environmental audio to accompany their 'Connection to Country' Book Creator research book and audio documentary about the significance of land, language and community.", "c": "middle"}, {"t": "Padlet", "d": "Students post an image, headline or question about the diversity of first nations people on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to the importance of community, family and kinship — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about the importance of country to first nations people using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 5", "th": "Who We Are", "ci": "People's choices are influenced by their beliefs and values and can impact others.", "lo": "How values and beliefs impact choices; How people's choices and actions impact others; Responsible decision-making", "s": [{"t": "Adobe Express (Video)", "d": "Students produce a short documentary exploring how values and beliefs influence decision-making, featuring personal reflections from PE lessons where they experienced how responsible choices in team activities affected others, and connecting to music lessons about how personal actions impact group performance.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design an analytical poster mapping the connection between beliefs, values, choices, and impacts on others — incorporating real examples from PE cooperative activities and classroom music IMP instrumental groups where personal practice and behaviour affected the collective.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Perspectives on Choice' book examining different scenarios where values and beliefs led to different decisions, analysing impacts using the concepts of perspective, causation and responsibility explored through class discussions and health education about how thoughts affect exercise and wellbeing choices.", "c": "end"}, {"t": "Padlet", "d": "Students post weekly reflections about choices they observed or made that were influenced by values/beliefs, building a class discussion board exploring different perspectives on how actions impact the school community.", "c": "middle"}, {"t": "Seesaw", "d": "Students record reflections connecting PE experiences (where responsible decision-making affected team outcomes) to the broader concept of how beliefs and values shape our choices and their consequences for others.", "c": "middle"}, {"t": "Mentimeter", "d": "Students use Mentimeter word clouds and live polling to gather anonymous class responses about values dilemmas and belief scenarios, building real-time data on how perspectives differ across the group and using the visualisations as evidence in their analytical posters mapping beliefs to choices and impacts.", "c": "middle"}, {"t": "Padlet", "d": "Students respond to the provocation 'People's choices are influenced by their beliefs and values and can impact others.' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on how values and beliefs impact choices.", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to how people's choices and actions impact others — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about responsible decision-making using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 5", "th": "Where We Are in Place and Time", "ci": "Colonisation has shaped society.", "lo": "The impact of colonisation; Colonisation stories; The effects of colonisation — past, present and future", "s": [{"t": "Adobe Express (Website)", "d": "Students create a research website examining the impact of colonisation on a specific region, incorporating perspectives from the 'Unsettled' resource (exploring 'How do we read the signs around us?'), Chinese language geography vocabulary, and analysis of how colonisation's effects continue into the present and future.", "c": "end"}, {"t": "iMovie", "d": "Students produce a documentary exploring colonisation stories, featuring primary sources, the carved spotted gum from bushfire-ravaged Country (from the Australian Museum 'Signal Fires' resource), and multiple perspectives on how colonisation has shaped modern Australian society.", "c": "end"}, {"t": "Book Creator", "d": "Students create a 'Colonisation: Past, Present, Future' research book documenting the impact of colonisation using primary and secondary sources, including responses to 'Unsettled' Lesson 2 exploring different means of reading signs and understanding colonisation's ongoing effects.", "c": "end"}, {"t": "Padlet", "d": "Students build a collaborative timeline of colonisation events and their effects (past, present, future), posting research findings and reflections that incorporate multiple perspectives including First Nations voices and connections to geography and place.", "c": "middle"}, {"t": "Google Earth", "d": "Students create a virtual tour of significant colonisation sites, mapping the geographic spread and impact using compass directions and geography vocabulary learned in Chinese language lessons, connecting physical places to colonisation stories.", "c": "middle"}, {"t": "Green Screen + iMovie", "d": "Students film first-person historical accounts using green screen with period-appropriate backgrounds, performing as characters from colonisation eras to bring primary sources to life, incorporating the footage into their iMovie documentary alongside research from the carved canoe investigation and Colonisation: Past, Present, Future book.", "c": "end"}, {"t": "Delightex (CoSpaces)", "d": "Students build a 3D virtual museum in CoSpaces displaying colonisation artefacts and historical sites researched during the unit, creating an immersive walkthrough experience that visitors can explore, connecting virtual exhibits to the geographic sites mapped on Google Earth and the timeline built on Padlet.", "c": "end"}, {"t": "Google Earth", "d": "Students use Google Earth to explore locations connected to the impact of colonisation, dropping pins and adding labels describing what they observe — building a visual map of existing knowledge before the class investigation begins.", "c": "beginning"}, {"t": "Canva", "d": "Students create a 'What I Think I Know' timeline or mind map about colonisation stories in Canva, visually organising their existing knowledge and marking questions with a '?' — establishing a baseline the class can test through research.", "c": "beginning"}, {"t": "Google Earth", "d": "Students take a virtual field trip using Google Earth to explore locations connected to the effects of colonisation — past, present and future, recording observations in a shared document — building geographic context and generating inquiry questions before the unit investigation begins.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the impact of colonisation, building a visual portfolio of evidence throughout the unit.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 5", "th": "How We Express Ourselves", "ci": "People can create or manipulate messages to target specific audiences.", "lo": "The devices used to target audiences; Critical evaluation of messages; How we know we have been influenced", "s": [{"t": "Adobe Express (Video)", "d": "Students create a persuasive advertisement targeting a specific audience, demonstrating the media manipulation techniques explored during the unit, and then create a companion 'behind-the-scenes' analysis video explaining the persuasive devices used — connecting to the Lume Museum visit exploring Van Gogh's visual storytelling techniques.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a 'Media Literacy' analysis poster deconstructing real advertisements to identify persuasive devices (colour, emphasis, process, audience targeting), incorporating critical evaluation skills practised during the persuasive arguments game and ICT communication focus on ethical media use.", "c": "end"}, {"t": "iMovie", "d": "Students produce a short film demonstrating how messages can be manipulated to influence audiences, featuring before/after versions of the same content presented differently — connected to the unit's focus on understanding media representations and modes of presentation.", "c": "end"}, {"t": "Adobe Express (Podcast)", "d": "Students produce a media literacy podcast episode critically evaluating a message aimed at their age group, applying the persuasive analysis skills practised through class activities and connecting to the ethical use of media/information focus.", "c": "middle"}, {"t": "Seesaw", "d": "Students document and annotate examples of persuasive media they encounter daily (ads, posters, social media), identifying the devices used to target specific audiences and sharing their critical evaluations on a class discussion board.", "c": "middle"}, {"t": "Green Screen + iMovie", "d": "Students use green screen to produce their persuasive advertisement, demonstrating firsthand how media creators manipulate settings, backgrounds, and visual context to target specific audiences, connecting the production experience to their critical analysis of media manipulation techniques.", "c": "middle"}, {"t": "GarageBand", "d": "Students compose original jingles or soundtracks in GarageBand for their persuasive advertisements, exploring how audio elements are used to manipulate audience emotions and target demographics, connecting music production to their media literacy analysis of how messages are crafted to influence.", "c": "middle"}, {"t": "Canva", "d": "Students create a quick visual poster in Canva responding to the provocation: 'How do you the devices used to target audiences?' — using images, icons and text to express their current understanding before the inquiry deepens.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page experimenting with different ways to express critical evaluation of messages — through images, text, drawing and recorded voice — reflecting on which medium communicates their idea most effectively.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about how we know we have been influenced using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 5", "th": "How the World Works", "ci": "Design processes enable people to respond creatively to challenges in the natural world.", "lo": "The nature and impact of natural hazards (Causation); How design processes are used to generate and test solutions (Function); The ethical and practical considerations in human responses to natural challenges (Responsibility)", "s": [{"t": "Tinkercad", "d": "Students design a 3D prototype of an earthquake-resistant structure meeting the design constraints (36cm tall, must hold specific weight), applying the full design thinking cycle introduced through the UNICEF Workshop and iterating based on shake-table testing during Prototyping Week.", "c": "end"}, {"t": "Adobe Express (Video)", "d": "Students produce a persuasive pitch presentation explaining their Operation Earth Action design solution, using the persuasive pitch structure to communicate their process, purpose, and design decisions — connected to the school showcase and pitch presentations culminating activity.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a natural hazards response poster for the Lismore flood case study, integrating stakeholder perspectives from the empathic design stakeholder cards, research from the Australian Parliament bushfires resource, and a timeline showing community advocacy for flood protection.", "c": "end"}, {"t": "Seesaw", "d": "Students document each stage of the design thinking cycle (empathise, define, ideate, prototype, test) during their natural hazards response project, photographing prototypes and recording reflections on the 'Nature doesn't need people, people need nature' provocation and Wonder Wall questions.", "c": "beginning"}, {"t": "Micro:bit", "d": "Students use micro:bit accelerometers and sensors to test their earthquake-resistant structure prototypes during the Week 8 prototyping phase, collecting data on structural movement and stability to evaluate their designs against criteria like usability, empathy, and effectiveness.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to navigate through their earthquake-resistant structure prototypes, testing whether pathways remain passable after simulated shaking, adding a dynamic engineering challenge to the design thinking process used for their Operation Earth Action solutions.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build a Lego Spike seismic alert system with sensors that detect vibrations and trigger a motor-driven warning mechanism, connecting engineering design to their earthquake research and the Lismore flood case study about community response to natural hazards.", "c": "end"}, {"t": "Mentimeter", "d": "Students respond to 'What do you already know about the nature and impact of natural hazards (causation)?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how how design processes are used to generate and test solutions (function) works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Seesaw", "d": "Students photograph and annotate their ongoing inquiry work, recording observations and reflections as they investigate the nature and impact of natural hazards (causation), building a visual portfolio of evidence throughout the unit.", "c": "middle"}]}, {"ca": "Elsternwick", "yl": "Year 5", "th": "How We Organise Ourselves", "ci": "Entrepreneurs have a responsibility to develop, market and sell sustainable products and services.", "lo": "The power of giving back; How our environment is impacted by the products we create; Sustainable business practices", "s": [{"t": "Adobe Express (Website)", "d": "Students build a website for their sustainable product business, including product information, sustainability credentials, marketing materials, and data collected about community needs — connecting to the market stall activity where they developed, marketed and sold products.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a business pitch presentation for their sustainable product, incorporating market research data (collected and interpreted during Maths connections), sustainability analysis of environmental impact, and a 'giving back' component showing their product's community benefit.", "c": "end"}, {"t": "iMovie", "d": "Students produce a professional advertisement for their sustainable product, applying marketing and persuasive techniques while demonstrating responsible entrepreneurship — connecting to Dance & Drama exploration of myth's role in various cultures and storytelling for marketing.", "c": "end"}, {"t": "Microsoft Excel", "d": "Students create a spreadsheet tracking their product development data, market research results, and sustainability metrics, using formulas to analyse whether their business model is genuinely sustainable and giving back to the community.", "c": "middle"}, {"t": "Padlet", "d": "Students post product development updates throughout the design process, documenting how they ensured sustainability at each stage and gathering peer feedback about their marketing strategy and environmental impact.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build a Lego Spike prototype or automated production line for their sustainable product business, programming motors and sensors to demonstrate how their product could be manufactured responsibly, connecting engineering to their market research data tracked in Microsoft Excel.", "c": "middle"}, {"t": "Microsoft Forms", "d": "Students complete a quick class survey about their experience with the power of giving back — the teacher shares the live results on screen and the class discusses patterns, surprising answers and questions that emerge to drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students map out their current understanding of how our environment is impacted by the products we create as a simple flowchart or diagram in Canva, showing how they think the system works — the class then compares diagrams to identify gaps and assumptions to investigate.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot testing their assumptions about sustainable business practices — the results reveal what the class already knows and where the biggest knowledge gaps are, helping the teacher shape the inquiry direction.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 5", "th": "Sharing the Planet", "ci": "Finding peaceful solutions to conflict can make a difference in the world.", "lo": "Types of conflict; Causes and impacts of conflict; Conflict resolution", "s": [{"t": "Adobe Express (Video)", "d": "Students create a conflict resolution documentary exploring a real-world conflict, analysing its causes and impacts, and proposing peaceful solutions — incorporating improvisation skills from Drama (exploring perspective and connection through collaborative creative work).", "c": "end"}, {"t": "Canva Presentation", "d": "Students design an analytical poster mapping a conflict's causes, impacts, and potential peaceful resolutions, incorporating perspectives from PE team-based cooperative activities where they experienced conflict resolution through negotiation, fair play, and sportsmanship.", "c": "end"}, {"t": "Scratch", "d": "Students code an interactive 'Choose Your Own Adventure' conflict resolution simulation, where users navigate a conflict scenario making decisions that lead to peaceful or escalated outcomes — connecting to the concepts of perspective and connection explored through Drama improvisation.", "c": "end"}, {"t": "Padlet", "d": "Students create a collaborative conflict resolution strategies board, posting different approaches to peaceful conflict resolution explored during PE cooperative games, Drama improvisation, and class discussions about real-world conflicts.", "c": "middle"}, {"t": "Seesaw", "d": "Students record weekly reflections about conflict situations they observe or experience, analysing causes, impacts, and how peaceful solutions were (or could have been) applied, building a personal conflict resolution toolkit.", "c": "middle"}, {"t": "CoDrone EDU", "d": "Students investigate how drone technology is used in humanitarian aid and conflict zones (delivering medical supplies, mapping disaster areas), programming CoDrone EDU flight paths to simulate aid delivery routes and debating the ethical considerations, connecting to their research on peaceful solutions to real-world conflicts.", "c": "middle"}, {"t": "Padlet", "d": "Students post an image, headline or question about types of conflict on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to causes and impacts of conflict — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about conflict resolution using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 6", "th": "Who We Are", "ci": "Personal changes and influences contribute to our evolving sense of self.", "lo": "Physical, social, emotional and intellectual changes that occur throughout life; Influences that shape our identity; Developing a sense of self", "s": [{"t": "Adobe Express (Video)", "d": "Students create a personal documentary exploring how physical, social, emotional and intellectual changes have shaped their identity, incorporating reflections from music IMP instrumental groups about how personal actions affect relationships, and the owl symbol they designed to represent their learning and growth at Wesley.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a 'Sense of Self' analytical poster mapping the influences that have shaped their identity, connecting personal reflections to PE health investigations about how thoughts about ourselves and others affect exercise, health and wellbeing choices.", "c": "end"}, {"t": "Book Creator", "d": "Students create a reflective identity journal documenting their personal growth journey through Year 6, featuring their owl self-portrait design, genre exploration from Literature/Library provocation about selecting texts that are a 'good fit', and analysis of how changes and influences contributed to their evolving sense of self.", "c": "end"}, {"t": "Padlet", "d": "Students create a collaborative 'Influences on Identity' board exploring how different factors (family, culture, friendships, experiences, media) shape who we are, posting personal reflections and connecting to the Learner Profile attributes co-created at the start of the unit.", "c": "middle"}, {"t": "Seesaw", "d": "Students document their personal growth milestones throughout the unit, recording audio reflections about how physical, social, emotional and intellectual changes have contributed to their sense of self and preparing for their transition beyond primary school.", "c": "middle"}, {"t": "Mentimeter", "d": "Students use Mentimeter live polling and word clouds to anonymously share perspectives on identity influences, personal changes, and growth milestones, generating class-wide data visualisations that feed into their 'Sense of Self' analytical posters and personal documentary reflections.", "c": "middle"}, {"t": "Padlet", "d": "Students respond to the provocation 'Personal changes and influences contribute to our evolving sense of self.' by posting one image and one sentence showing what this looks like in their own life, creating a collaborative gallery that maps the class's diverse starting perspectives on physical, social, emotional and intellectual changes that occur throughout life.", "c": "beginning"}, {"t": "Canva", "d": "Students design a personal infographic mapping their own connection to influences that shape our identity — using icons, images and short text to visualise where they stand before the class explores different perspectives.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students rank their agreement with provocative statements about developing a sense of self using Mentimeter scales, then the class discusses the spread of opinions — establishing that multiple perspectives exist before the inquiry deepens.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 6", "th": "Where We Are in Place and Time", "ci": "Significant events shape a place", "lo": "What is a significant event; Why these events occurred; Impact of significant events", "s": [{"t": "⏳ Planner Needed", "d": "Planner content not yet uploaded — specific suggestions pending. Please send the UOI planner for this unit to Nathan Benn on Teams to generate tailored technology integration suggestions.", "c": "end"}]}, {"ca": "Elsternwick", "yl": "Year 6", "th": "How the World Works", "ci": "Energy may be converted, transformed, and used to support human progress.", "lo": "Different forms of energy and how they are used; The impact of different energy sources on the planet; Sustainable energy practices", "s": [{"t": "Adobe Express (Video)", "d": "Students produce a science documentary explaining energy conversion and transformation, incorporating footage of their Solar Buddy light construction, electrical circuit experiments, and the Rube Goldberg machine chain reaction analysis — using the science experiment report writing skills developed during English.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design an energy systems research poster comparing renewable and non-renewable energy sources, analysing advantages and disadvantages from different perspectives, and presenting their visual representations of energy systems and mini group renewable energy project findings.", "c": "end"}, {"t": "Book Creator", "d": "Students create an 'Energy Transformation' investigation journal documenting their experiments with electrical circuits, dynamos (connecting William Kamkwamba's bicycle headlight dynamo story to modern generators), and Solar Buddy lights — including procedural writing, labelled diagrams, and evidence-based conclusions about sustainable energy practices.", "c": "end"}, {"t": "Seesaw", "d": "Students document their electrical circuit experiments and Solar Buddy light construction process step-by-step, using the Explanation Game thinking routine to demonstrate understanding of energy transfer and transformation — connecting to science experiment report and procedural writing in English.", "c": "middle"}, {"t": "Lego Spike", "d": "Students build and code a renewable energy model (wind turbine with motor or solar tracker) that demonstrates energy conversion from one form to another, collecting data on output and connecting their findings to the unit's investigation of sustainable energy practices and individual responsibilities for promoting them.", "c": "middle"}, {"t": "Micro:bit", "d": "Students program micro:bits to measure energy outputs during their electrical circuit and Solar Buddy experiments, collecting voltage and light data to demonstrate energy conversion and transformation, recording results as evidence in their science documentary and investigation journal.", "c": "middle"}, {"t": "CoDrone EDU", "d": "Students explore how drones convert battery energy into kinetic energy for flight, programming CoDrone EDU to perform controlled manoeuvres while discussing energy transformation chains (chemical → electrical → kinetic), connecting the hands-on experience to their broader research on how energy supports human progress.", "c": "middle"}, {"t": "Sphero", "d": "Students program Spheros to demonstrate energy conversion — rolling at different speeds to show kinetic energy, lighting up LEDs to show electrical energy, and measuring how far the Sphero travels on different surfaces to investigate energy loss through friction, connecting to their circuit experiments and energy investigation journal.", "c": "middle"}, {"t": "Mentimeter", "d": "Students respond to 'What do you already know about different forms of energy and how they are used?' using a live word cloud, then the class discusses the most common responses — revealing existing understanding and misconceptions to shape the inquiry direction.", "c": "beginning"}, {"t": "Canva", "d": "Students create a hypothesis poster in Canva predicting how the impact of different energy sources on the planet works, including a labelled diagram and three questions they want to investigate — setting up the scientific inquiry process.", "c": "beginning"}, {"t": "Kahoot", "d": "Students play a diagnostic Kahoot quiz testing common assumptions about sustainable energy practices — wrong answers reveal misconceptions the class will investigate, and the teacher uses results to differentiate inquiry groups.", "c": "beginning"}]}, {"ca": "Elsternwick", "yl": "Year 6", "th": "Sharing the Planet", "ci": "Communities interact with the environment in different ways.", "lo": "How community values shape the management of the natural environment; The need for sustainable practices; Taking action for environmental stewardship", "s": [{"t": "Adobe Express (Website)", "d": "Students create an environmental stewardship project website presenting their action project (developed during the 'Finalize and share action projects' culminating activity), featuring their KWL chart journey from provocation images through to their final proposals for promoting environmental responsibility.", "c": "end"}, {"t": "iMovie", "d": "Students produce a documentary presenting their environmental stewardship project to peers or younger grades (as planned in the unit), incorporating research about how different communities interact with the environment, personal definitions of the central idea recorded at the start, and evidence of their action-taking.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a persuasive poster promoting their environmental action project, showing how community values shape environmental management and why sustainable practices matter — connecting research from the KWL provocation lessons and reading linked to Sharing the Planet.", "c": "end"}, {"t": "Google Earth", "d": "Students explore and compare how different communities around the world interact with their natural environments, investigating examples of sustainable and unsustainable practices to inform their action project proposals.", "c": "middle"}, {"t": "Padlet", "d": "Students document their environmental action project development, posting research findings, design ideas, and reflections about how they can promote environmental stewardship in their school and local community.", "c": "middle"}, {"t": "DJI Drone (teacher-operated)", "d": "DLC captures aerial footage of the local Elsternwick environment and community green spaces, providing students with a bird's-eye perspective of how their community interacts with the natural environment, incorporating the footage into their iMovie environmental stewardship documentary and action project website.", "c": "middle"}, {"t": "Insta360 Cam", "d": "DLC captures 360° footage of local environmental sites and community spaces using the Insta360 camera, creating immersive reference material that students analyse to understand how different parts of their community interact with the environment and incorporate into their action project presentations.", "c": "middle"}, {"t": "Micro:bit", "d": "Students program micro:bit environmental sensors to collect temperature, light, and moisture data around the school grounds, comparing readings across different zones to understand how the local community's environmental interactions affect conditions, feeding real data into their stewardship project research and Google Earth annotations.", "c": "middle"}, {"t": "Padlet", "d": "Students post an image, headline or question about how community values shape the management of the natural environment on a shared Padlet board, then read and comment on three classmates' posts — surfacing the range of perspectives and questions that will drive the inquiry.", "c": "beginning"}, {"t": "Canva", "d": "Students design a 'What I Care About' poster in Canva showing their personal connection to the need for sustainable practices — including images, facts they already know, and questions they want answered during the unit.", "c": "beginning"}, {"t": "Mentimeter", "d": "Students respond to a series of true/false provocations about taking action for environmental stewardship using Mentimeter live polls — the class sees results in real time, debates surprising answers, and identifies misconceptions to investigate during the unit.", "c": "beginning"}]}, {"ca": "St Kilda", "yl": "Prep", "th": "Who We Are", "ci": "To be healthy, people’s basic needs must be met.", "lo": "How our brain is growing and changing; How our emotions, behaviours and actions promote relationships; How we care for our bodies", "s": [{"t": "Book Creator", "d": "Students create a ‘My Healthy Lifestyle’ book documenting the seven elements from the Healthy Lifestyle Jigsaw (food, sleep, play, mind health, active learning, exercise, safety), featuring their rainbow eating chart from Chinese lessons (naming fruit colours in Chinese), photos of their food classification activities sorting always foods vs sometimes foods, and voice recordings explaining how each element keeps their body and mind healthy.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record themselves explaining the Zones of Regulation (blue, green, yellow, red) and demonstrating one self-regulation strategy they learned — balloon breathing, wall push, or calm counting — connecting to the Grow Your Mind characters (Guard Dog, Elephant, Sifting Sooty) and how understanding their brain helps them care for their wellbeing.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a ‘Healthy Choices’ poster showing the Australian Guide to Healthy Eating food groups explored during the unit, with drawings of always foods and sometimes foods sorted from the classification activities, and their lunchbox assessment showing nutritious choices — connecting to the three macro nutrients (protein, carbohydrate, fats) discussed in class.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph their brain food recess choices and use drawing tools to sort foods into ‘always’ and ‘sometimes’ categories, recording voice explanations about why some foods fill our batteries and others could make them overflow — building on the Nude Foods vs Processed Foods sorting activity and the Cyber Safety lesson ‘Keeping the Balance’.", "c": "middle"}, {"t": "Indi Robot", "d": "Students build a ‘Healthy Choices’ colour-tile path where each colour represents one of the seven healthy lifestyle elements from the Jigsaw (green = exercise, blue = sleep, yellow = healthy food, purple = mind health), programming Indi to follow the path while explaining how each element meets a basic need for staying healthy.", "c": "middle"}, {"t": "Seesaw", "d": "Students draw themselves and record a voice note answering the question: 'What does how our brain is growing and changing mean to you?' — creating a personal snapshot that the class can revisit at the end of the unit to see how thinking has changed.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create an 'All About Me' page featuring drawings and voice recordings about how our emotions, behaviours and actions promote relationships, starting a personal book they will add to throughout the unit as their understanding of to be healthy, people’s basic needs must be met grows.", "c": "beginning"}, {"t": "Seesaw", "d": "Students respond to a class provocation about how we care for our bodies by choosing one of three images on Seesaw and recording why it connects to their life — the teacher uses responses to form inquiry groups for the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about how our brain is growing and changing.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Prep", "th": "How We Express Ourselves", "ci": "People recognise important events through celebrations and traditions.", "lo": "The traditions of our families and communities; How and why people celebrate; The similarities and differences between celebrations", "s": [{"t": "Book Creator", "d": "Students create a ‘Celebrations Around the World’ book documenting celebrations explored during the unit — Lion Dancing for Chinese New Year (using costumes and instruments with Chinese words for Walk, Stop, Jump), Hanukkah (from Pastor Fern’s visit reading Curious George tunes into Hanukkah), Diwali (parent presentation), and the Mid-Autumn Festival — with drawings, photos and voice recordings explaining how and why each celebration is special to families and communities.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record themselves presenting the creative celebration poster they designed in the Go Further activity, explaining the features they included (people, food, costumes, music, dance) and connecting to the common celebration features identified during the class brainstorm — showing understanding that while celebrations have different purposes, they often share common elements.", "c": "end"}, {"t": "Canva Presentation", "d": "Students design a ‘Celebrations Comparison’ poster using a Venn Diagram (as practised when comparing dances) to show similarities and differences between two celebrations, incorporating the Y Chart sensory observations from exploring Halloween, Hanukkah, Diwali, Easter and Christmas, and the common theme of lights discovered across Hanukkah, Christmas and Diwali.", "c": "end"}, {"t": "Seesaw", "d": "Students photograph and narrate the cultural artefacts and food explored during the unit (mooncakes made from clay/playdough for Mid-Autumn Festival, braided bread and dreidel game for Hanukkah with Pastor Fern, money envelopes for Chinese New Year), recording what each item represents and connecting to traditions carried down through families and communities.", "c": "middle"}, {"t": "Cubetto", "d": "Students program Cubetto to visit stations on a ‘Dance Around the World’ floor mat, stopping at each country to explain the cultural dance they learned — Simi Yadech, The Chimes of Dunkirk, Mexican Hat Dance — connecting coding sequences to the dance steps performed and added to their classroom ‘Dance Around the World’ board.", "c": "middle"}, {"t": "Seesaw", "d": "Students use the camera and drawing tools to create a 'Before I Knew' page showing what the traditions of our families and communities looks like to them right now — using pictures, labels and voice recording to capture their starting understanding.", "c": "beginning"}, {"t": "Book Creator", "d": "Students create a page showing different ways they can express the idea of how and why people celebrate — through drawing, voice, photos and text — exploring which method feels most natural to them.", "c": "beginning"}, {"t": "Seesaw", "d": "Students respond to a class provocation about the similarities and differences between celebrations by choosing one of three images on Seesaw and recording why it connects to their life — the teacher uses responses to form inquiry groups for the unit.", "c": "beginning"}, {"t": "Book Creator", "d": "Students contribute pages to a collaborative class book, each adding drawings and voice recordings about what they are discovering about the traditions of our families and communities.", "c": "middle"}]}, {"ca": "St Kilda", "yl": "Prep", "th": "How We Organise Ourselves", "ci": "We all have roles and responsibilities in the community", "lo": "Roles people play; Responsibilities in the community; How working together helps everyone", "s": [{"t": "Book Creator", "d": "Students create a ‘My School Community’ book documenting the staff roles identified during the class brainstorm (teachers, office staff, librarian), featuring photos from the visual timetable, drawings of their Year 4 buddies who shared knowledge of staff and school roles, and voice recordings explaining each person’s responsibilities — connecting to the Wesley Community presentation and the Firefighters’ visit discussion.", "c": "end"}, {"t": "Seesaw", "d": "Students video-record themselve
