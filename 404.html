<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Digital Learning Assistant</title>
  <script>
    // GitHub Pages 404 redirect for single-page apps
    // Captures the path and redirects to index with it as a query param
    var path = window.location.pathname;
    var repo = '/digital-learning-assistant-v2';
    var rest = path.replace(repo, '');
    if (rest && rest !== '/') {
      window.location.replace(
        window.location.origin + repo + '/?p=' + encodeURIComponent(rest) +
        (window.location.search ? '&' + window.location.search.slice(1) : '') +
        window.location.hash
      );
    } else {
      window.location.replace(window.location.origin + repo + '/');
    }
  </script>
</head>
<body></body>
</html>
