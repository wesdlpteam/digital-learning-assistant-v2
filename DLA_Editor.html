<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLA Studio — Wesley College</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root { 
    --mint: #34d399; --bg: #0a0a0a; --card: #161616; 
    --border: #262626; --text-dim: #737373; 
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    background: var(--bg); color: #e5e5e5; 
    font-family: system-ui, -apple-system, sans-serif; 
    display: flex; min-height: 100vh;
  }

  /* SIDEBAR: Always visible on App screen, hidden on Setup */
  #sidebar { 
    width: 280px; background: #111; border-right: 1px solid var(--border); 
    display: none; flex-direction: column; padding: 40px 25px; 
    position: fixed; height: 100vh; z-index: 100;
  }
  #logo-zone { font-weight: 900; font-size: 20px; color: var(--mint); letter-spacing: 1px; margin-bottom: 50px; }
  .nav-item { 
    padding: 12px 16px; border-radius: 8px; color: var(--text-dim); cursor: pointer; 
    margin-bottom: 8px; font-size: 13px; font-weight: 500; transition: 0.2s;
  }
  .nav-item:hover { color: #fff; background: #1a1a1a; }
  .nav-item.active { background: #1a1a1a; color: var(--mint); border: 1px solid #222; }

  #wesley-footer { margin-top: auto; padding-top: 30px; border-top: 1px solid var(--border); }
  .wesley-lion { width: 50px; height: auto; margin-bottom: 15px; opacity: 0.8; }
  .wesley-tag { font-size: 10px; font-weight: 800; color: #fff; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  
  /* MAIN STAGE */
  #main-stage { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 60px 20px; }
  .app-active #main-stage { padding-left: 300px; justify-content: flex-start; } /* Offsets the fixed sidebar */

  /* CONTAINERS */
  .studio-layout { width: 100%; max-width: 1000px; animation: fadeIn 0.4s ease-out; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .card { 
    background: var(--card); border: 1px solid var(--border); border-radius: 16px; 
    padding: 40px; margin-bottom: 20px; position: relative;
  }
  .card-accent::before {
    content: ''; position: absolute; left: 0; top: 40px; bottom: 40px; width: 4px; 
    background: var(--mint); border-radius: 0 4px 4px 0;
  }

  h1 { font-size: 30px; font-weight: 800; margin-bottom: 10px; color: #fff; }
  .subtitle { color: var(--text-dim); font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
  .label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; margin-bottom: 12px; display: block; }
  
  .inp { 
    background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; 
    padding: 15px; width: 100%; outline: none; margin-bottom: 25px;
  }
  .inp:focus { border-color: var(--mint); }

  .btn-launch { 
    background: var(--mint); color: #000; border: none; padding: 16px; border-radius: 10px; 
    font-weight: 800; width: 100%; cursor: pointer; text-transform: uppercase;
  }

  /* DASHBOARD UI */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
  .stat-card { background: #111; border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .stat-num { font-size: 28px; font-weight: 800; color: var(--mint); }
  .row { padding: 15px; background: #111; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; cursor: pointer; display: flex; gap: 10px; }

  .screen { display: none; width: 100%; }
  .screen.active { display: block; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="logo-zone">DLA STUDIO</div>
  <div class="nav-item active" onclick="switchTab('dashboard', this)">Dashboard</div>
  <div class="nav-item" onclick="switchTab('browse', this)">Browse Library</div>
  <div class="nav-item" onclick="switchTab('audit', this)">AI Coaching</div>
  <div id="wesley-footer">
    <img src="image_9107c9.png" class="wesley-lion" alt="Lion">
    <div class="wesley-tag">Wesley College <br>Melbourne</div>
    <div style="font-size:9px; color:var(--mint); margin-top:5px">● SYSTEM ONLINE</div>
  </div>
</div>

<div id="main-stage">
  <div id="screen-setup" class="screen active">
    <div class="studio-layout" style="max-width:500px">
      <div class="card card-accent">
        <span class="label">Authentication</span>
        <h1>Studio Login</h1>
        <p class="subtitle">Enter your Gemini API Key to access the 2026 planner database.</p>
        <input type="password" id="api-key-input" class="inp" placeholder="AIzaSy...">
        <button class="btn-launch" onclick="saveApiKey()">Enter Studio →</button>
      </div>
    </div>
  </div>

  <div id="screen-load" class="screen">
    <div class="studio-layout" style="max-width:500px">
      <div class="card" style="text-align:center">
        <span class="label">Synchronising</span>
        <h2 id="load-status" style="margin-bottom:20px">Ready to connect...</h2>
        <button class="btn-launch" onclick="loadFromDrive()">Initialize Database</button>
      </div>
    </div>
  </div>

  <div id="screen-app" class="screen">
    <div class="studio-layout">
      <div id="tab-dashboard" class="tab-panel">
        <div class="stat-grid" id="stat-cards"></div>
        <div class="card">
          <span class="label">Add to Queue</span>
          <div style="display:flex; gap:10px; margin-bottom:15px">
            <input type="text" id="new-ca" class="inp" style="margin-bottom:0" placeholder="Campus">
            <input type="text" id="new-yl" class="inp" style="margin-bottom:0" placeholder="Year">
            <input type="text" id="new-th" class="inp" style="margin-bottom:0" placeholder="Theme">
          </div>
          <button class="btn-launch" onclick="submitNewUnit()" style="width:auto; padding:12px 30px">Add Unit</button>
        </div>
        <span class="label">Pending Audits</span>
        <div id="all-issues-list"></div>
      </div>
      
      <div id="tab-browse" class="tab-panel" style="display:none">
        <input id="browse-search" class="inp" placeholder="Search library..." oninput="renderBrowse()">
        <div id="browse-list"></div>
      </div>

      <div id="entry-detail" style="display:none">
        <button onclick="closeDetail()" style="background:#222; color:#fff; border:none; padding:8px 15px; border-radius:5px; margin-bottom:20px; cursor:pointer">← Back</button>
        <div class="card" id="detail-header" style="margin-bottom:15px"></div>
        <div id="sug-rows-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
let DATA = [];
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyUlNbBkcwXB8ImUUhEQDP7C3itYCUu-j_vRNKA7_Km2h4uJMIs0RVFJxUXKcFOFgIW/exec';

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  
  if(id === 'app') {
    document.body.classList.add('app-active');
    document.getElementById('sidebar').style.display = 'flex';
  } else {
    document.body.classList.remove('app-active');
    document.getElementById('sidebar').style.display = 'none';
  }
}

function saveApiKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if(!k) return alert("Key required");
  localStorage.setItem('dla_api_key', k);
  showScreen('load');
}

async function loadFromDrive() {
  const status = document.getElementById('load-status');
  status.textContent = "Connecting...";
  try {
    const token = await new Promise(res => {
      google.accounts.oauth2.initTokenClient({
        client_id: '334712966315-9diac0qcv57168kn378i5js2ikgqqvpt.apps.googleusercontent.com',
        scope: 'https://www.googleapis.com/auth/drive',
        callback: (resp) => res(resp.access_token)
      }).requestAccessToken();
    });
    status.textContent = "Fetching Data...";
    const r = await fetch("https://www.googleapis.com/drive/v3/files?q=name='data.json'&fields=files(id)", {headers:{'Authorization':'Bearer '+token}});
    const d = await r.json();
    const fr = await fetch(`https://www.googleapis.com/drive/v3/files/${d.files[0].id}?alt=media`, {headers:{'Authorization':'Bearer '+token}});
    DATA = await fr.json();
    renderDashboard();
    showScreen('app');
  } catch(e) { alert("Error: " + e.message); status.textContent = "Error: " + e.message; }
}

function renderDashboard() {
  const missing = DATA.filter(e => e.audited === false);
  document.getElementById('stat-cards').innerHTML = `
    <div class="stat-card"><div class="stat-num">${missing.length}</div><div class="stat-label">missing</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#fff">${DATA.length}</div><div class="stat-label">total</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--mint)">3.1 Pro</div><div class="stat-label">engine</div></div>`;
  document.getElementById('all-issues-list').innerHTML = missing.map(e => `
    <div class="row" onclick="openEntry(${DATA.indexOf(e)})"><span style="color:var(--mint)">●</span> <b>${e.yl}</b> — ${e.th}</div>`).join('');
}

function openEntry(idx) {
  const e = DATA[idx];
  document.getElementById('tab-dashboard').style.display='none';
  document.getElementById('entry-detail').style.display='block';
  document.getElementById('detail-header').innerHTML = `<h1>${e.th}</h1><p>${e.ca} · ${e.yl}</p>`;
  document.getElementById('sug-rows-list').innerHTML = e.s.map(s => `<div class="card" style="padding:20px; margin-bottom:10px; border-left:3px solid var(--mint)"><b>${s.t}</b><p style="margin-top:5px; font-size:12px; opacity:0.7">${s.d}</p></div>`).join('');
}

function closeDetail() { document.getElementById('entry-detail').style.display='none'; document.getElementById('tab-dashboard').style.display='block'; }

function switchTab(tab, btn) {
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';
  document.getElementById('entry-detail').style.display = 'none';
  if(tab === 'browse') renderBrowse();
}

function renderBrowse() {
  const q = document.getElementById('browse-search').value.toLowerCase();
  const filtered = DATA.filter(e => (!q || e.th.toLowerCase().includes(q) || e.ca.toLowerCase().includes(q)));
  document.getElementById('browse-list').innerHTML = filtered.map(e => `<div class="row" onclick="openEntry(${DATA.indexOf(e)})"><b>${e.yl}</b> — ${e.th}</div>`).join('');
}

function submitNewUnit() {
  const ca=document.getElementById('new-ca').value, yl=document.getElementById('new-yl').value, th=document.getElementById('new-th').value;
  if(!ca || !yl || !th) return alert("Fill all fields");
  fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',body:JSON.stringify({ca,yl,th,ci:""})}).then(()=>alert("Added!"));
}

window.onload = () => {
  const key = localStorage.getItem('dla_api_key');
  if (key) showScreen('load'); else showScreen('setup');
};
</script>
</body>
</html>
