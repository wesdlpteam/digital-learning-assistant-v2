<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLA Editor v3.1 — Wesley College</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0a;color:#e5e5e5;font-family:'SF Mono',ui-monospace,Menlo,monospace;font-size:13px;min-height:100vh}
  h1,h2,h3,h4{font-family:system-ui,-apple-system,sans-serif}
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit;font-size:12px}
  #header{background:#111;border-bottom:1px solid #222;padding:10px 16px;display:none;align-items:center;gap:8px;position:sticky;top:0;z-index:100}
  #logo{font-family:system-ui,sans-serif;font-weight:700;font-size:14px;color:#34d399;letter-spacing:-.5px}
  #main{padding:20px}
  .center{max-width:820px;margin:0 auto}
  .btn-pri{padding:8px 12px;border-radius:5px;border:none;background:#34d399;color:#0a0a0a;font-size:11px;font-weight:600}
  .btn-pri:hover{background:#2fb888}
  .btn-tab{padding:4px 10px;border-radius:4px;border:1px solid transparent;background:transparent;color:#525252;font-size:10px}
  .btn-tab.active{background:#1e1e1e;color:#e5e5e5;border-color:#333}
  .card{background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:16px;margin-bottom:12px}
  .label{font-size:10px;color:#525252;letter-spacing:.08em;text-transform:uppercase;font-weight:500;display:block;margin-bottom:8px}
  .inp{background:#0a0a0a;border:1px solid #2a2a2a;color:#e5e5e5;border-radius:4px;padding:8px;outline:none;width:100%}
  .badge{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;display:inline-block}
  .badge-incomplete{background:#9a3412;color:#fdba74}
  .issue-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:6px;cursor:pointer;margin-bottom:6px;background:#161616;border:1px solid #222}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
  .stat-card{background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:16px}
  .stat-num{font-size:30px;font-weight:700;color:#34d399}
  .screen{display:none}
  .screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh}
  .tab-panel{display:none}
  .tab-panel.active{display:block}
  .sug-row{border-radius:6px;margin-bottom:8px;background:#052e16;border:1px solid #14532d;padding:12px}
</style>
</head>
<body>

<div id="header">
  <div id="logo">DLA Editor</div>
  <div style="flex:1"></div>
  <button class="btn-tab active" onclick="switchTab('dashboard', this)">dashboard</button>
  <button class="btn-tab" onclick="switchTab('browse', this)">browse</button>
  <button class="btn-tab" onclick="switchTab('audit', this)">feedback</button>
</div>

<div id="main">
  <div id="screen-apikey" class="screen active">
    <div class="card" style="width:340px">
      <span class="label">gemini api key</span>
      <input type="password" id="api-key-input" class="inp" placeholder="AIzaSy..." style="margin-bottom:12px">
      <button class="btn-pri" onclick="saveApiKey()" style="width:100%">Continue →</button>
    </div>
  </div>

  <div id="screen-load" class="screen">
    <div class="card" style="width:340px; text-align:center">
      <span class="label">Connect to Database</span>
      <button class="btn-pri" id="btn-drive-load" onclick="loadFromDrive()" style="width:100%; padding:12px">↑ Load from Google Drive</button>
      <div id="load-status" style="margin-top:12px; font-size:11px; color:#525252"></div>
    </div>
  </div>

  <div id="screen-app" class="screen" style="display:none; justify-content:flex-start; align-items:stretch">
    <div id="tab-dashboard" class="center tab-panel active">
      <div class="stat-grid" id="stat-cards"></div>
      
      <div class="card" style="border-left: 4px solid #34d399;">
        <span class="label" style="color:#34d399">Add to AI Queue</span>
        <div style="display:flex;gap:10px;margin-bottom:12px">
          <input type="text" id="new-ca" class="inp" placeholder="Campus">
          <input type="text" id="new-yl" class="inp" placeholder="Year Level">
          <input type="text" id="new-th" class="inp" placeholder="Theme">
        </div>
        <button class="btn-pri" onclick="submitNewUnit()">Add to Queue</button>
      </div>

      <div class="card"><span class="label">Missing Planners</span><div id="all-issues-list"></div></div>
    </div>

    <div id="tab-browse" class="center tab-panel">
      <div class="card"><input id="browse-search" class="inp" placeholder="Search themes..." oninput="renderBrowse()"></div>
      <div id="browse-list"></div>
    </div>

    <div id="tab-audit" class="center tab-panel">
      <div class="card">
        <span class="label">Global AI Feedback</span>
        <textarea id="audit-feedback" class="inp" rows="4" placeholder="e.g. Focus more on robotics..."></textarea>
        <button class="btn-pri" onclick="applyAuditFeedback()" style="margin-top:12px">Apply to All Units</button>
      </div>
    </div>

    <div id="entry-detail" style="display:none" class="center">
      <button class="btn-pri" onclick="closeDetail()" style="margin-bottom:15px; background:#222; color:#fff">← Back</button>
      <div class="card" id="detail-header"></div>
      <div id="sug-rows-list"></div>
    </div>
  </div>
</div>

<script>
// --- CORE UTILITIES ---
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
  });
  const target = document.getElementById(id);
  target.classList.add('active');
  target.style.display = (id === 'screen-app') ? 'block' : 'flex';
  if(id === 'screen-app') document.getElementById('header').style.display = 'flex';
}

function saveApiKey() {
  const k = document.getElementById('api-key-input').value.trim();
  if(!k) { alert("Please enter your API key first."); return; }
  try {
    localStorage.setItem('dla_api_key', k);
    showScreen('screen-load');
  } catch(e) {
    alert("Storage Error: Your browser might be blocking 'localStorage'. Ensure you aren't in a super-restricted Incognito mode.");
  }
}

function switchTab(tab, btn) {
  document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('entry-detail').style.display = 'none';
}

// --- DRIVE LOGIC ---
let DATA = [];
async function getDriveToken() {
  return new Promise((res) => {
    google.accounts.oauth2.initTokenClient({
      client_id: '334712966315-9diac0qcv57168kn378i5js2ikgqqvpt.apps.googleusercontent.com',
      scope: 'https://www.googleapis.com/auth/drive',
      callback: (resp) => res(resp.access_token)
    }).requestAccessToken();
  });
}

async function loadFromDrive() {
  const status = document.getElementById('load-status');
  status.textContent = "Authenticating...";
  try {
    const token = await getDriveToken();
    status.textContent = "Searching for data.json...";
    const r = await fetch("https://www.googleapis.com/drive/v3/files?q=name='data.json'&fields=files(id)", {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const d = await r.json();
    if(!d.files || d.files.length === 0) throw new Error("Could not find 'data.json' in your Drive.");
    
    status.textContent = "Downloading data...";
    const fr = await fetch(`https://www.googleapis.com/drive/v3/files/${d.files[0].id}?alt=media`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    DATA = await fr.json();
    renderDashboard();
    showScreen('screen-app');
  } catch(e) {
    alert("Drive Error: " + e.message);
    status.textContent = "Error: " + e.message;
  }
}

// --- UI RENDERING ---
function renderDashboard() {
  const missing = DATA.filter(e => e.audited === false);
  document.getElementById('stat-cards').innerHTML = `
    <div class="stat-card"><div class="stat-num">${missing.length}</div><div class="stat-label">missing planners</div></div>
    <div class="stat-card"><div class="stat-num">${DATA.length}</div><div class="stat-label">total units</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#34d399">3.1 Pro</div><div class="stat-label">AI Engine</div></div>
  `;
  document.getElementById('all-issues-list').innerHTML = missing.map(e => `
    <div class="issue-row" onclick="openEntry(${DATA.indexOf(e)})">
      <span class="badge badge-incomplete">missing planner</span>
      ${e.yl} - ${e.th}
    </div>`).join('');
}

function openEntry(idx) {
  const e = DATA[idx];
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('entry-detail').style.display = 'block';
  document.getElementById('detail-header').innerHTML = `<h3>${e.th}</h3><p>${e.ca} · ${e.yl}</p>`;
  document.getElementById('sug-rows-list').innerHTML = e.s.map(s => `
    <div class="sug-row"><b>${s.t}</b><p style="margin-top:5px; font-size:11px; opacity:0.8">${s.d}</p></div>`).join('');
}

function closeDetail() {
  document.getElementById('entry-detail').style.display = 'none';
  document.getElementById('tab-dashboard').classList.add('active');
}

// --- INITIALIZE ---
window.onload = () => {
  if(localStorage.getItem('dla_api_key')) {
    showScreen('screen-load');
  }
};
</script>
</body>
</html>
