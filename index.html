// JSONP fallback — used only if the primary fetch() path fails (e.g. CORS
// blocked by a proxy or extension). Kept because Apps Script's redirect chain
// occasionally trips strict browser cache policies on cross-origin GETs.
function fetchLeaderboardJsonp(now){
  return new Promise(function(resolve,reject){
    var cb='dlaLbCb_'+now+'_'+(++_lbJsonpSeq);
    var script=document.createElement('script');
    var done=false;
    var timer=setTimeout(function(){cleanup();reject(new Error('Leaderboard JSONP timeout'));},10000);
    function cleanup(){
      if(done)return;
      done=true;
      clearTimeout(timer);
      try{delete window[cb];}catch(e){window[cb]=undefined;}
      if(script.parentNode)script.parentNode.removeChild(script);
    }
    window[cb]=function(data){cleanup();resolve(data);};
    script.onerror=function(){cleanup();reject(new Error('Leaderboard JSONP failed'));};

    document.head.appendChild(script);
  });

function readHash(){try{
  // If we arrived via the 404.html SPA shim (e.g. /?p=%2FEL%2FYear2),
  // decode the route and restore the real URL before reading pathname.
  var q=window.location.search;

    var routed=decodeURIComponent(pm[1]);

  }

  var hash=window.location.hash.replace(/^#/,'');
  var raw='';

  // Only use path-based routing on GitHub Pages — not in Claude preview or local file
  var onGitHubPages=/github\.io/.test(window.location.hostname);

    var seg=(pathname.startsWith(_basePath)

    raw=seg||decodeURIComponent(hash);
  } else {
    // Claude preview / local file — only trust the hash
    raw=decodeURIComponent(hash);
  }

      } else {

        if(isNaN(idx)||!us[idx])idx=-1;

    }
  }

var _pageStart=Date.now(),_pageName="Home",_pageCampus="",_pageYear="";
var _userSession="User-"+new Date().toLocaleDateString('en-AU',{day:'2-digit',month:'short'})+"-"+Math.random().toString(36).substr(2,4).toUpperCase();

// Analytics queue — batches navigation events and flushes every 30s or on tab close
// This prevents hammering the Apps Script webhook when many teachers are online simultaneously
var _analyticsQueue=[];
var _analyticsFlushTimer=null;

function _flushAnalytics(sync){
if(!_analyticsQueue.length)return;
var batch={type:'analytics_batch',v:'2',session:_userSession,events:_analyticsQueue.slice()};
_analyticsQueue=[];
var body=JSON.stringify(batch);
if(sync&&navigator.sendBeacon){
// sendBeacon is guaranteed to complete even during page unload
navigator.sendBeacon(FBHOOK,new Blob([body],{type:'text/plain'}));
}else{
fetch(FBHOOK,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:body}).catch(function(){});
}
}

function _scheduleFlush(){
if(_analyticsFlushTimer)clearTimeout(_analyticsFlushTimer);
_analyticsFlushTimer=setTimeout(function(){_flushAnalytics(false);},30000);
}

function trackPage(name,campus,year){
var spent=Math.round((Date.now()-_pageStart)/1000);
// Only queue events where the user actually spent time on the page (2s–10min)
if(spent>=2&&spent<=600){
_analyticsQueue.push({page:_pageName,campus:_pageCampus,year:_pageYear,seconds:spent});
_scheduleFlush();
// Flush immediately if queue is getting large (e.g. very active session)
if(_analyticsQueue.length>=8)_flushAnalytics(false);
}
_pageStart=Date.now();_pageName=name;_pageCampus=campus||"";_pageYear=year||"";}

// Use sendBeacon on unload — reliable, non-blocking, won't trigger another concurrent write
window.addEventListener('visibilitychange',function(){
if(document.visibilityState==='hidden'){trackPage('exit','','');_flushAnalytics(true);}
});
window.addEventListener('beforeunload',function(){trackPage('exit','','');_flushAnalytics(true);});

</script>

(function(){

  function isMapMaker_(t){const k=k_(t); return k==='national geographic mapmaker'||k==='national geographic map maker'||k==='nat geo mapmaker'||k==='nat geo map maker'||k==='mapmaker'||k==='map maker';}
  function text_(s){return String(s||'').replace(/\bDelightex\s*\(\s*CoSpaces\s*\)/gi,'Delightex').replace(/\bCoSpaces\s*\(\s*Delightex\s*\)/gi,'Delightex').replace(/\bCoSpaces\b/gi,'Delightex').replace(/\bCoSpace\b/gi,'Delightex').trim();}
  function annotatedMap_(d){return /\b(annotat|label|layer|data layer|custom map|map maker|mapmaker|gis|plot data|overlay|thematic map|spatial data)\b/i.test(String(d||'')) && !/street\s*view/i.test(String(d||''));}
  function sanitiseSug_(s){
    if(!s) return s;
    const out=Object.assign({},s);
    let tool=text_(out.t||out.tool||out.name||'');

    if(isMapMaker_(tool)) tool=NATGEO_TOOL;
    if(/cospaces/i.test(tool)) tool='Delightex';

    if(isGoogleMaps_(tool) && !/street\s*view/i.test(desc)) desc += ' Students use Street View to observe ground-level evidence, compare places and gather notes that connect to the unit.';
    if(tool===NATGEO_TOOL){
      desc=desc.replace(/\bGoogle Maps\b/gi,NATGEO_TOOL).replace(/\bStreet View\b/gi,'map layers');
      if(!/mapmaker|map maker|layer|annotat|label|gis/i.test(desc)) desc += ' Students add labels, layers or spatial evidence to communicate their thinking clearly.';
    }
    out.t=tool; out.d=desc;
    return out;
  }
  function sanitiseData_(){

      HT['Google Maps']='<ol><li>Open <b>Google Maps</b> and search for the place you want students to explore.</li><li>Drag the yellow <b>Street View</b> person onto a road or blue-highlighted path.</li><li>Students move through the location at ground level and observe visible evidence.</li><li>Ask students to capture notes about what they see, such as land use, buildings, transport, environment or community features.</li><li>Students compare two places using Street View evidence.</li><li>They use their observations in a short explanation, discussion or reflection.</li></ol><div class="sg-howto-tip">Tip: For annotated maps or data layers, use National Geographic MapMaker instead.</div>';
      HT['Delightex']='<ol><li>Open <b>Delightex</b> and create a new 3D or VR scene.</li><li>Choose an environment that suits the unit context.</li><li>Add objects, characters, labels and narration to build the scene.</li><li>Use visual coding to animate objects or create simple interactions.</li><li>Preview the scene and refine it based on peer feedback.</li><li>Share the finished world as a link or view it in VR with teacher guidance.</li></ol><div class="sg-howto-tip">Tip: Delightex is the current name for what many teachers used to know as CoSpaces.</div>';
      HT['Delightex (CoSpaces)']=HT['Delightex'];
    }
  }catch(e){}

  if(typeof gA==='function'){
    const oldGA=gA;

      if(isMapMaker_(t)||t===NATGEO_TOOL) return {steps:['Open National Geographic MapMaker.','Choose a relevant base map or starter map.','Turn on useful layers connected to the inquiry.','Students add labels, notes or spatial evidence.','Students explain the patterns or connections their map shows.','Share the map link or use screenshots in the final product.'],tip:'MapMaker is best for annotated maps, map layers and GIS-style evidence.'};
      if(/cospaces/i.test(t)) t='Delightex';
