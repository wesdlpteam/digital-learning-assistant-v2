<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wesley Digital Learning Assistant</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23111111'/%3E%3Cpolygon points='19,3 10,17 15,17 13,29 22,15 17,15' fill='%23CDEB45'/%3E%3Ccircle cx='6' cy='6' r='2' fill='%23CDEB45' opacity='0.5'/%3E%3Ccircle cx='26' cy='26' r='2' fill='%23CDEB45' opacity='0.5'/%3E%3Ccircle cx='26' cy='6' r='1.5' fill='%237ED957' opacity='0.6'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#111111;--sf:#1A1A1A;--tx:#F2F2F2;--mt:#999;--bd:#2A2A2A;--ac:#CDEB45;--ac2:#7ED957;--hl:#222}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.hd{background:var(--bg);position:sticky;top:0;z-index:100;caret-color:transparent}
.hi{max-width:700px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:10px;user-select:none}
.logo{height:34px;width:auto;border-radius:4px;mix-blend-mode:lighten}
.bk{background:var(--hl);border:none;color:#fff;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s}
.bk:hover{background:#333}
.hd h1{color:#FFF;font-size:15px;font-weight:700;letter-spacing:-.3px}
.hd-sub{color:#999;font-size:11px;font-weight:500;margin-top:1px}

.admin-btn{margin-left:auto;display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;background:#222;color:var(--ac);border:1px solid #333;text-decoration:none;font-size:12px;font-weight:700;line-height:1;transition:all .15s;white-space:nowrap;flex-shrink:0}
.admin-btn:hover{background:#CDEB4515;border-color:var(--ac);color:#FFF;transform:translateY(-1px)}
.admin-btn:focus{outline:2px solid var(--ac);outline-offset:2px}
@media(max-width:430px){.admin-btn{font-size:0;padding:9px 10px}.admin-btn::after{content:'Admin';font-size:11px}.admin-btn .admin-ico{font-size:13px}}

.wp{max-width:700px;margin:0 auto;padding:0 20px 80px}
.fd{animation:fu .3s ease both}@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
#app{min-height:100vh}
.tab-fade .fd{animation:tf .15s ease both}@keyframes tf{from{opacity:.6}to{opacity:1}}

.hero{margin:24px 0 36px}
.hero-title{font-size:clamp(36px,9vw,56px);font-weight:700;line-height:1.08;letter-spacing:-2px;color:#FFF}
.hero-accent{color:var(--ac)}
.hero-sub{font-size:15px;color:var(--mt);margin-top:16px;line-height:1.6;max-width:400px}

.tag{display:inline-block;font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px;background:var(--hl);color:#FFF;letter-spacing:.2px}
.tag-t{display:inline-block;font-size:10px;font-weight:700;padding:4px 12px;border-radius:99px;background:rgba(0,0,0,.15);letter-spacing:.3px}
.tag-tool{display:inline-block;font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px;letter-spacing:.2px}
.tag-meta{display:inline-block;font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px;background:var(--hl);color:#BBB}

.cc{border-radius:20px;padding:28px;margin-bottom:12px;cursor:pointer;transition:transform .15s;position:relative;overflow:hidden}
.cc:hover{transform:scale(1.01)}
.cc-wm{position:absolute;right:-20px;bottom:-20px;font-size:110px;font-weight:800;opacity:.1;line-height:1;letter-spacing:-6px;pointer-events:none}
.cc-inner{position:relative;z-index:1}
.cc-name{font-size:26px;font-weight:700;letter-spacing:-.5px}
.cc-sub{font-size:14px;margin-top:4px;font-weight:500}

.sec-title{font-size:clamp(28px,7vw,36px);font-weight:700;margin-top:14px;letter-spacing:-1px;color:#FFF;line-height:1.15}

.yg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.yc{background:var(--sf);border-radius:16px;padding:22px 18px;cursor:pointer;transition:all .15s;border:2px solid var(--bd);position:relative;overflow:hidden}
.yc:hover{border-color:var(--ac);background:rgba(205,235,69,.05);transform:translateY(-3px)}
.yc-dot{width:14px;height:14px;border-radius:4px;margin-bottom:14px}
.yc h3{font-size:20px;font-weight:700;letter-spacing:-.3px}.yc .cn{font-size:12px;color:var(--mt);margin-top:4px}

.uc{border-radius:16px;padding:20px 22px;margin-bottom:10px;cursor:pointer;transition:transform .15s;position:relative;overflow:hidden}
.uc:hover{transform:scale(1.01)}
.uc-emoji{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:48px;opacity:.3;pointer-events:none}
.uc-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;opacity:.5;margin-bottom:4px}
.uc-name{font-size:20px;font-weight:700;letter-spacing:-.3px;max-width:80%;line-height:1.2;color:inherit}

.dh{border-radius:20px;padding:28px 26px;margin:16px 0 20px;position:relative;overflow:hidden}
.dh-wm{position:absolute;right:-10px;bottom:-10px;font-size:100px;opacity:.15;line-height:1;pointer-events:none}
.dh-title{font-size:26px;font-weight:700;letter-spacing:-.5px;line-height:1.15}
.dh-ci{font-size:15px;opacity:.8;margin-top:10px;line-height:1.6;font-style:italic}

.loi-box{background:var(--sf);border-radius:16px;padding:20px 22px;margin-bottom:20px;border:2px solid var(--bd);position:relative}
.loi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--mt);margin-bottom:12px}
.loi-item{padding:10px 0;border-bottom:1px solid var(--bd);font-size:14px;line-height:1.55;color:#EEE}
.loi-item:last-child{border-bottom:none}
.loi-num{font-weight:700;margin-right:8px}

.uoi-edit-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(56,189,248,.12);color:#38BDF8;border:1px solid rgba(56,189,248,.4);border-radius:8px;padding:6px 12px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.uoi-edit-btn:hover{background:rgba(56,189,248,.22)}
.uoi-pending-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(212,160,23,.12);color:#FBBF24;border:1px solid rgba(212,160,23,.4);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;margin-left:auto}
.uoi-pending-pill button{background:none;border:none;color:inherit;cursor:pointer;font-size:14px;line-height:1;padding:0;margin-left:4px;opacity:.7}
.uoi-pending-pill button:hover{opacity:1}
.uoi-edit-form{background:var(--sf);border-radius:16px;padding:22px;margin-bottom:20px;border:2px solid #38BDF8}
.uoi-edit-form h3{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:#38BDF8;margin-bottom:6px}
.uoi-edit-form .uoi-edit-hint{font-size:12px;color:#aaa;line-height:1.5;margin-bottom:14px;padding:10px 12px;background:#1a1a1a;border-radius:8px;border-left:3px solid #38BDF8}
.uoi-edit-form .uoi-edit-hint strong{color:#fff}
.uoi-edit-form label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#888;margin:14px 0 6px}
.uoi-edit-form textarea{width:100%;background:#0F0F0F;border:1px solid #2A2A2A;border-radius:10px;padding:11px 13px;color:#EEE;font-family:inherit;font-size:14px;line-height:1.5;resize:vertical;box-sizing:border-box}
.uoi-edit-form textarea:focus{outline:none;border-color:#38BDF8;background:#111}
.uoi-edit-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;padding-top:14px;border-top:1px solid #333}
.uoi-edit-actions button{border:none;border-radius:10px;padding:10px 16px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s}
.uoi-edit-actions .uoi-edit-save{background:#22C55E;color:#0a1f12}
.uoi-edit-actions .uoi-edit-save:hover:not(:disabled){background:#4ADE80}
.uoi-edit-actions .uoi-edit-save:disabled{opacity:.6;cursor:not-allowed}
.uoi-edit-actions .uoi-edit-cancel{background:#252525;color:#CCC;border:1px solid #3A3A3A}
.uoi-edit-actions .uoi-edit-cancel:hover{background:#333;color:#FFF}
.tech-modal.uoi-modal{border-color:#38BDF8;max-width:620px}
.tech-modal.uoi-modal .tech-modal-icon{background:rgba(56,189,248,.12);color:#38BDF8}
.tech-modal.uoi-modal .uoi-edit-form{background:transparent;border:none;padding:0;margin:0;border-radius:0}
.uoi-loi-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.uoi-loi-num{flex-shrink:0;width:26px;color:#38BDF8;font-weight:800;font-size:13px;letter-spacing:.3px}
.uoi-loi-input{flex:1;background:#0F0F0F;border:1px solid #2A2A2A;border-radius:10px;padding:10px 13px;color:#EEE;font-family:inherit;font-size:14px;line-height:1.4;box-sizing:border-box}
.uoi-loi-input:focus{outline:none;border-color:#38BDF8;background:#111}
.uoi-loi-remove{flex-shrink:0;width:30px;height:34px;border-radius:8px;border:1px solid #333;background:#222;color:#888;cursor:pointer;font-size:16px;line-height:1;transition:all .15s;display:flex;align-items:center;justify-content:center}
.uoi-loi-remove:hover{border-color:#EF4444;color:#EF4444;background:#1a1010}
.uoi-loi-add{margin-top:6px;background:transparent;border:1px dashed #38BDF8;color:#38BDF8;border-radius:10px;padding:10px 14px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;width:100%}
.uoi-loi-add:hover{background:rgba(56,189,248,.1)}

.tb{display:flex;gap:6px;margin-bottom:18px;background:var(--sf);border-radius:14px;padding:5px}
.tt{flex:1;padding:12px 8px;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--mt);transition:all .2s;letter-spacing:-.2px}
.tt.on{background:var(--ac);color:#111}
.tt-count{font-weight:600;opacity:.7;font-size:11px}

.sg{background:var(--sf);border:2px solid var(--bd);border-radius:16px;overflow:hidden;margin-bottom:14px;transition:border-color .15s}
.sg:hover{border-color:var(--ac)}
.sg-pending{background:transparent;border:2px dashed #333;border-radius:16px;padding:28px 24px;margin-bottom:14px;text-align:center}
.sg-pending-icon{font-size:40px;margin-bottom:12px}
.sg-pending-title{font-size:16px;font-weight:700;color:#F5A623;margin-bottom:8px}
.sg-pending-msg{font-size:14px;line-height:1.6;color:#888;max-width:400px;margin:0 auto}
.sg-pending-cta{display:inline-block;margin-top:16px;font-size:13px;font-weight:600;color:#CDEB45;background:#CDEB4515;padding:8px 18px;border-radius:99px;border:1px solid #CDEB4530;text-decoration:none;cursor:pointer;transition:all .15s}
.sg-pending-cta:hover{background:#CDEB4530;color:#FFF}
.sg-head{padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--bd)}
.sg-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sg-meta{flex:1}
.sg-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--mt)}
.sg-tool{font-size:17px;font-weight:700;letter-spacing:-.3px;margin-top:2px}
.sg-body{padding:16px 20px 20px}
.sg-desc{font-size:14px;line-height:1.7;color:#F2F2F2}
.sg-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
.sg-section{margin-top:16px}
.sg-refs{margin-top:14px}
.sg-ref-link{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--ac);text-decoration:none;padding:8px 12px;background:rgba(205,235,69,.08);border-radius:8px;margin-bottom:5px;border:1px solid rgba(205,235,69,.15);transition:background .15s}
.sg-ref-link:hover{background:rgba(205,235,69,.18);color:#fff}
.sg-ref-doc{background:rgba(126,217,87,.1);border-color:rgba(126,217,87,.2);color:var(--ac2)}
.sg-ref-doc:hover{background:rgba(126,217,87,.22);color:#fff}
.sg-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--mt);margin-bottom:6px}
.sg-label svg{width:15px;height:15px;flex-shrink:0}
.vb{background:rgba(205,235,69,.08);border-left:3px solid var(--ac);padding:11px 15px;border-radius:0 10px 10px 0;font-size:13px;color:#CDEB45;line-height:1.55;font-style:italic}

.cur-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.cur-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;border:2px solid var(--bd);background:var(--sf);color:var(--tx);transition:all .2s;user-select:none}
.cur-pill:hover{border-color:var(--ac);background:rgba(205,235,69,.05)}
.cur-pill.open{border-color:var(--ac);background:rgba(205,235,69,.08)}
.cur-pill svg{width:12px;height:12px;transition:transform .2s;flex-shrink:0}
.cur-pill.open svg{transform:rotate(180deg)}
.cur-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cur-detail{overflow:hidden;max-height:0;transition:max-height .2s ease-out,padding .2s ease-out;padding:0 14px;background:rgba(205,235,69,.06);border-left:3px solid var(--ac);border-radius:0 8px 8px 0;font-size:12.5px;color:#CDEB45;line-height:1.5;margin-top:0}
.cur-detail.open{max-height:300px;padding:10px 14px;margin-top:6px;transition:max-height .3s ease-in,padding .3s ease-in}
.cur-detail b{font-weight:700}
.cur-detail li{color:#DDD}

.bb{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:var(--ac);color:#111;border:none;border-radius:16px;padding:18px 24px;font-family:inherit;font-size:17px;font-weight:700;text-decoration:none;cursor:pointer;width:100%;margin-top:24px;letter-spacing:-.3px;transition:transform .15s}
.bb:hover{transform:scale(1.01)}
.bb-sub{font-size:12px;font-weight:500;opacity:.6}

@media(max-width:480px){.hero-title{font-size:36px}.cc-name{font-size:22px}.cc-wm{font-size:80px}}

.atl-section{margin-top:16px}
.atl-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.atl-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;border:2px solid var(--bd);background:var(--sf);color:var(--tx);transition:all .2s;user-select:none}
.atl-pill:hover{border-color:#F5A623;background:rgba(245,166,35,.05)}
.atl-pill.open{border-color:#F5A623;background:rgba(245,166,35,.08)}
.atl-pill svg{width:12px;height:12px;transition:transform .2s;flex-shrink:0}
.atl-pill.open svg{transform:rotate(180deg)}
.atl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.atl-detail{overflow:hidden;max-height:0;transition:max-height .2s ease-out,padding .2s ease-out;padding:0 14px;background:rgba(245,166,35,.06);border-left:3px solid #F5A623;border-radius:0 8px 8px 0;font-size:12.5px;color:#F5A623;line-height:1.5;margin-top:0}
.atl-detail.open{max-height:300px;padding:10px 14px;margin-top:6px;transition:max-height .3s ease-in,padding .3s ease-in}
.atl-detail b{font-weight:700}
.atl-detail li{color:#DDD;margin-bottom:4px}
.wds-section{margin-top:12px}
.wds-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.wds-pill{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;border:2px solid var(--bd);background:var(--sf);color:var(--tx);transition:all .2s;user-select:none}
.wds-pill:hover{border-color:#9333EA;background:rgba(147,51,234,.05)}
.wds-pill.open{border-color:#9333EA;background:rgba(147,51,234,.08)}
.wds-pill svg{width:12px;height:12px;transition:transform .2s;flex-shrink:0}
.wds-pill.open svg{transform:rotate(180deg)}
.wds-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.wds-detail{overflow:hidden;max-height:0;transition:max-height .2s ease-out,padding .2s ease-out;padding:0 14px;background:rgba(147,51,234,.06);border-left:3px solid #9333EA;border-radius:0 8px 8px 0;font-size:12.5px;color:#9333EA;line-height:1.5;margin-top:0}
.wds-detail.open{max-height:400px;padding:10px 14px;margin-top:6px;transition:max-height .3s ease-in,padding .3s ease-in}
.wds-detail b{font-weight:700}
.wds-detail li{color:#DDD;margin-bottom:4px}

.sg-tool a:hover{text-decoration-color:#FFF}

.sg-fb{display:flex;align-items:center;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--bd);flex-wrap:wrap}
.sg-fb-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:8px 18px;border-radius:99px;cursor:pointer;text-decoration:none;border:none;background:#333;color:#AAA;transition:all .15s;font-family:inherit}
.sg-fb-btn:hover{background:#444;color:#FFF}
.fb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.fb-overlay.open{opacity:1;pointer-events:all}
.fb-modal{background:#1A1A1A;border:2px solid #333;border-radius:20px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.fb-title{font-size:18px;font-weight:700;color:#FFF;margin-bottom:4px}
.fb-sub{font-size:12px;color:#888;margin-bottom:20px}
.fb-context{font-size:13px;color:#CDEB45;background:#CDEB4510;border:1px solid #CDEB4530;border-radius:10px;padding:10px 14px;margin-bottom:16px;line-height:1.5}
.fb-label{font-size:12px;font-weight:600;color:#AAA;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fb-textarea{width:100%;min-height:100px;background:#111;border:2px solid #333;border-radius:12px;color:#FFF;font-family:inherit;font-size:14px;padding:12px;resize:vertical;outline:none;transition:border-color .15s;box-sizing:border-box}
.fb-textarea:focus{border-color:#CDEB45}
.fb-textarea::placeholder{color:#555}
.fb-actions{display:flex;gap:10px;margin-top:16px}
.fb-submit{flex:1;padding:12px;border:none;border-radius:12px;background:#CDEB45;color:#111;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}
.fb-submit:hover{background:#D8F050;transform:scale(1.01)}
.fb-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.fb-cancel{padding:12px 20px;border:2px solid #333;border-radius:12px;background:none;color:#888;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.fb-cancel:hover{border-color:#555;color:#CCC}
.fb-success{text-align:center;padding:20px 0}
.fb-success-icon{font-size:48px;margin-bottom:12px}
.fb-success-msg{font-size:16px;font-weight:600;color:#CDEB45}
.fb-success-sub{font-size:13px;color:#888;margin-top:6px}

.sg-collapse{cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;padding:8px 0}
.sg-collapse:hover .sg-label{opacity:1}
.sg-collapse .sg-label{opacity:.7;transition:opacity .15s;margin:0}
.sg-collapse svg{width:14px;height:14px;color:#888;transition:transform .2s;flex-shrink:0}
.sg-collapse.open svg{transform:rotate(180deg)}
.sg-collapsible{overflow:hidden;max-height:0;transition:max-height .25s ease-out;padding:0}
.sg-collapsible.open{max-height:600px;padding:8px 0 0;transition:max-height .35s ease-in}

.sg-react{display:inline-flex;gap:8px;margin-left:auto}

.planner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.planner-overlay.open{opacity:1;pointer-events:all}
.planner-modal{background:#1A1A1A;border:2px solid #F5A623;border-radius:20px;padding:36px;width:100%;max-width:480px;text-align:center}
.planner-modal-icon{font-size:52px;margin-bottom:16px}
.planner-modal-title{font-size:20px;font-weight:700;color:#F5A623;margin-bottom:8px}
.planner-modal-sub{font-size:14px;line-height:1.6;color:#888;margin-bottom:20px}

/* Tech Champions ribbon — top-of-home recognition strip; pinned above the hero so leaderboard
   status is visible without scrolling. Breaks out of the 700px .wp wrapper to use full viewport
   width: calc(50% - 50vw) is 0 on narrow viewports (where .wp already fills the screen) and grows
   negative as the viewport widens, pulling the ribbon edges out to the screen edges. */
.champ-ribbon{
  background:linear-gradient(90deg,rgba(245,166,35,.10) 0%,rgba(205,235,69,.06) 100%);
  border:1px solid rgba(245,166,35,.25);
  border-left:none;border-right:none;border-radius:0;
  margin-left:calc(50% - 50vw);margin-right:calc(50% - 50vw);
  width:100vw;max-width:100vw;
  /* Inner padding keeps content roughly aligned with .wp on wide viewports, with extra outer
     padding on narrow viewports so pills don't kiss the screen edge. */
  padding:10px clamp(14px, calc(50vw - 350px + 14px), 80px);
  margin-top:14px;margin-bottom:14px;
  overflow-x:auto;overflow-y:hidden;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:thin;
}
.champ-ribbon::-webkit-scrollbar{height:4px}
.champ-ribbon::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
.champ-ribbon-inner{display:inline-flex;align-items:center;gap:10px;min-width:100%;justify-content:flex-start}

/* Inline confetti burst — anchored to the clicked button, not the viewport */
@keyframes confettiBurst{0%{transform:translate(0,0) rotate(0deg);opacity:1}100%{transform:translate(var(--cx,0),var(--cy,0)) rotate(720deg);opacity:0}}
@keyframes pointPopIn{0%{transform:translate(-50%,-90%) scale(.4);opacity:0}55%{transform:translate(-50%,-100%) scale(1.08);opacity:1}100%{transform:translate(-50%,-100%) scale(1);opacity:1}}
@keyframes pointPopOut{0%{transform:translate(-50%,-100%) scale(1);opacity:1}100%{transform:translate(-50%,-110%) scale(.95);opacity:0}}
.confetti-container{position:absolute;pointer-events:none;z-index:9999;width:1px;height:1px;overflow:visible}
.confetti{position:absolute;top:0;left:0;width:8px;height:8px;border-radius:2px;animation:confettiBurst 1.4s cubic-bezier(.2,.7,.3,1) forwards}
.point-popup-inline{position:absolute;z-index:10000;pointer-events:auto;background:#111;border:2px solid #CDEB45;border-radius:16px;padding:14px 22px 12px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.55),0 0 32px rgba(205,235,69,.35);min-width:200px;max-width:min(320px,calc(100vw - 24px));font-family:inherit;animation:pointPopIn .45s cubic-bezier(.2,.7,.3,1.2) forwards;outline:none}
.point-popup-inline.fade-out{animation:pointPopOut .3s ease-in forwards}
.point-popup-inline::after{content:"";position:absolute;left:50%;bottom:-9px;transform:translateX(-50%) rotate(45deg);width:14px;height:14px;background:#111;border-right:2px solid #CDEB45;border-bottom:2px solid #CDEB45;border-radius:0 0 3px 0}
.point-popup-inline.streak{border-color:#F5A623;box-shadow:0 12px 40px rgba(0,0,0,.55),0 0 40px rgba(245,166,35,.45);min-width:240px;padding:16px 24px 14px}
.point-popup-inline.streak::after{border-right-color:#F5A623;border-bottom-color:#F5A623}
/* Undo popup — subtler grey treatment so it reads as "click acknowledged" not "celebration". */
.point-popup-inline.undo{border-color:#666;box-shadow:0 8px 24px rgba(0,0,0,.45);min-width:180px;padding:10px 18px 9px}
.point-popup-inline.undo::after{border-right-color:#666;border-bottom-color:#666}
.point-popup-inline.undo .ppi-emoji{font-size:22px;margin-bottom:2px}
.point-popup-inline.undo .ppi-text{font-size:16px;color:#BBB}
.point-popup-inline.undo .ppi-sub{font-size:11px}
.ppi-emoji{font-size:30px;line-height:1;margin-bottom:4px}
.point-popup-inline.streak .ppi-emoji{font-size:36px}
.ppi-headline{font-size:11px;font-weight:800;letter-spacing:1.5px;color:#F5A623;text-transform:uppercase;margin-bottom:2px}
.ppi-text{font-size:20px;font-weight:800;color:#CDEB45;font-family:"Space Grotesk",sans-serif;line-height:1.1}
.point-popup-inline.streak .ppi-text{color:#F5A623;font-size:22px}

.tech-btn{border:none;border-radius:10px;padding:9px 14px;font-family:inherit;font-weight:700;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;background:#252525;color:#CCC;border:1px solid #3A3A3A;transition:all .15s}

.tech-btn.primary{background:#22C55E;color:#0a1f12;border-color:#22C55E}

.tech-meta{font-size:11px;color:#666;margin-top:8px;text-align:right}
.tech-error{padding:14px;border-radius:10px;background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.3);color:#FCA5A5;font-size:13px;line-height:1.5}

.tech-editor-body{padding:4px 16px 16px}
.tech-editor-hint{font-size:12px;color:#AAA;line-height:1.5;margin-bottom:12px;padding:8px 10px;background:#1A1A1A;border-radius:6px;border-left:3px solid #38BDF8}

.tech-editor-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#888;margin:10px 0 4px}

.tech-editor-input{width:100%;background:#0F0F0F;border:1px solid #2A2A2A;border-radius:8px;padding:9px 11px;color:#EEE;font-family:inherit;font-size:13px;line-height:1.5;resize:vertical;box-sizing:border-box}
.tech-editor-input:focus{outline:none;border-color:#38BDF8;background:#111}
.tech-editor-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}

<script>

function linkifyDesc(text){
  if(!text) return '';
  // Fix corrupted em-dashes: '?' between non-whitespace chars should be ' — '
  // e.g. "Machines'?interactive" → "Machines' — interactive", "scenario?such" → "scenario — such"
  // Skip URLs so query-string '?' like "foo.com?q=x" isn't mangled.
  var cleaned = String(text).replace(/(https?:\/\/\S+)|([^\s])\?([A-Za-z])/g, function(match, url, before, after){
    if(url) return url; // leave URLs alone
    return before + ' — ' + after;
  });
  // Also fix double-? variants sometimes produced: "word??word"
  cleaned = cleaned.replace(/([^\s])\?\?([A-Za-z])/g, '$1 — $2');
  // Escape HTML BEFORE linkifying so AI-generated descriptions can't inject markup.
  // URLs are matched against the escaped string — http:// and / survive escaping unchanged.
  var escaped = cleaned.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  return escaped.replace(/(https?:\/\/[^\s)]+)/g, '<a href="$1" target="_blank" rel="noopener noreferrer" style="color:var(--ac);text-decoration:underline;text-decoration-color:#555;text-underline-offset:3px;word-break:break-all">$1</a>');
}

"Google Earth":"<ol><li>Open <b>earth.google.com</b> in Chrome.</li><li>Click <b>Projects → New Project</b>.</li><li>Search for locations and click <b>Add to project</b> to pin them.</li><li>For each pin, add a <b>title, description and images</b>.</li><li>Click the <b>microphone icon</b> to record voice narration at each stop.</li><li>Click <b>Present</b> to fly between locations with narration playing automatically.</li></ol><div class=\"sg-howto-tip\">Tip: Students can collaborate on a shared project by clicking the share icon.</div>",

"Scratch Jr":"<ol><li>Open the <b>Scratch Jr app</b> on the iPad.</li><li>Tap <b>+</b> to start a new project.</li><li>Choose or draw <b>characters</b> and <b>backgrounds</b>.</li><li>Drag <b>coding blocks</b> together to make characters move, jump, grow, shrink and speak.</li><li>Tap the <b>green flag</b> to play the animation.</li><li>Add extra <b>pages</b> (like slides) to create a multi-scene story.</li></ol><div class=\"sg-howto-tip\">Tip: Use the paint editor to let students draw their own characters — great for younger learners.</div>",
"Seesaw":"<ol><li>Open <b>Seesaw</b> and go to the class journal.</li><li>Tap <b>Add</b> (+) to start a new post.</li><li>Choose the tool: <b>photo, video, drawing, voice recording, link or file</b>.</li><li>Students capture their work and <b>annotate</b> with labels, arrows and voice.</li><li>Tap the <b>green tick</b> to submit for teacher approval.</li></ol><div class=\"sg-howto-tip\">Tip: Create an Activity template with instructions so students know exactly what to do.</div>",
"Book Creator":"<ol><li>Open <b>bookcreator.com</b> and select your class library.</li><li>Click <b>New Book</b> and choose a template or blank page.</li><li>Add content: <b>text, images, drawings, audio recordings, videos and shapes</b>.</li><li>Use the <b>record button</b> for voice narration on any page.</li><li>Add more <b>pages</b> to build out the book.</li><li>Click <b>Publish</b> to share as a link or export as ePub/PDF.</li></ol><div class=\"sg-howto-tip\">Tip: Use the comic book template for visual storytelling or the blank template for information reports.</div>",
"Canva":"<ol><li>Open <b>canva.com</b> and click <b>Create a design</b>.</li><li>Choose a format: <b>poster, presentation, infographic, video</b> etc.</li><li>Use <b>templates</b> as a starting point or start from scratch.</li><li>Drag in <b>text, images, icons, shapes and charts</b> from the sidebar.</li><li>Upload your own <b>photos</b> using the Uploads tab.</li><li>Click <b>Share → Download</b> or <b>Share → Link</b> to publish.</li></ol><div class=\"sg-howto-tip\">Tip: Use Canva Education for free premium features and classroom integration.</div>",
"Padlet":"<ol><li>Open <b>padlet.com</b> and click <b>Make a padlet</b>.</li><li>Choose a format: <b>Wall, Canvas, Timeline, Map, Grid</b> or others.</li><li>Set a <b>title</b> and description.</li><li>Share the <b>link or QR code</b> with students.</li><li>Students tap <b>+</b> to add posts with <b>text, images, links, audio or video</b>.</li><li>Students can <b>comment and react</b> on each other's posts.</li></ol><div class=\"sg-howto-tip\">Tip: Use the Map format for geographic projects — students pin locations and add multimedia at each point.</div>",
"Mentimeter":"<ol><li>Open <b>mentimeter.com</b> and click <b>New presentation</b>.</li><li>Add a slide and choose the type: <b>word cloud, poll, quiz, scales, open-ended</b>.</li><li>Type your <b>question</b>.</li><li>Click <b>Present</b> and share the <b>join code</b> with students.</li><li>Students go to <b>menti.com</b>, enter the code and respond.</li><li>Results appear <b>live on screen</b> in real time.</li></ol><div class=\"sg-howto-tip\">Tip: Word clouds work brilliantly for tuning-in provocations — instant visual of the class's thinking.</div>",
"iMovie":"<ol><li>Open <b>iMovie</b> on iPad or Mac.</li><li>Tap <b>Create Project → Movie</b>.</li><li>Import <b>video clips and photos</b> from the camera roll.</li><li>Drag clips onto the <b>timeline</b> and trim them.</li><li>Add <b>titles, transitions and background music</b>.</li><li>Record a <b>voiceover</b> by tapping the microphone icon.</li><li>Tap <b>Share</b> to export the finished video.</li></ol><div class=\"sg-howto-tip\">Tip: Use the Trailer templates for polished-looking news reports and documentaries.</div>",
"GarageBand":"<ol><li>Open <b>GarageBand</b> on iPad or Mac.</li><li>Choose <b>Live Loops, Tracks or Drummer</b> to start.</li><li>Tap instruments to <b>play and record</b> — keyboard, guitar, drums, strings.</li><li>Use <b>Smart Instruments</b> for students who do not play an instrument.</li><li>Layer multiple <b>tracks</b> together to build a composition.</li><li>Tap <b>Share</b> to export as an audio file.</li></ol><div class=\"sg-howto-tip\">Tip: Use Live Loops for quick, fun music creation — students tap cells to build arrangements without needing to play notes.</div>",
"Microsoft Forms":"<ol><li>Open <b>forms.office.com</b> and click <b>New Form</b>.</li><li>Add questions: <b>choice, text, rating, date, ranking, Likert</b>.</li><li>Toggle <b>Required</b> for must-answer questions.</li><li>Click <b>Share</b> and copy the link or QR code.</li><li>Students open the link and submit responses.</li><li>Click <b>Responses</b> to see results in real time with auto-generated charts.</li></ol><div class=\"sg-howto-tip\">Tip: Use the Quiz mode for self-marking assessments with automatic scores and feedback.</div>",
"Kahoot":"<ol><li>Open <b>kahoot.com</b> and click <b>Create</b>.</li><li>Add <b>questions</b> with multiple choice answers and mark the correct one.</li><li>Set a <b>time limit</b> per question.</li><li>Click <b>Play</b> and choose <b>Classic</b> (individual) or <b>Team</b> mode.</li><li>Students join at <b>kahoot.it</b> with the game PIN.</li><li>Results show on the <b>leaderboard</b> after each question.</li></ol><div class=\"sg-howto-tip\">Tip: Use it as a diagnostic at the start of a unit to reveal what students already know and where misconceptions are.</div>",
"Podcasting using Canva":"<ol><li>Open <b>canva.com</b> and sign in with your school account.</li><li>Search <b>Podcast</b> in templates or start a new design.</li><li>Choose a <b>podcast cover</b> template — add a title, episode number and cover art.</li><li>Open the <b>Uploads</b> tab and click <b>Record yourself</b> to capture audio directly in the browser.</li><li>Edit the recording: <b>trim, split, layer</b> tracks and add background music from Canva's <b>audio library</b>.</li><li>Use the <b>AI tools</b> in Canva to tidy up timing, add captions or generate a transcript.</li><li>Click <b>Share</b> to publish, or download as MP4/MP3 to distribute the episode.</li></ol><div class=\"sg-howto-tip\">Tip: Students can record multi-episode series — great for inquiry journals, book reviews, or current events reports. Works in Safari on iPads.</div>",
"Adobe Express":"<ol><li>Open <b>express.adobe.com</b> and sign in with school account.</li><li>Click <b>Create new</b> and choose: <b>poster, video, webpage, social post</b>.</li><li>Use <b>templates</b> or start blank.</li><li>Add <b>text, images, icons, video clips and animations</b>.</li><li>Use <b>brand tools</b> to keep consistent colours and fonts.</li><li>Click <b>Download</b> or <b>Share link</b> to publish.</li></ol><div class=\"sg-howto-tip\">Tip: The video tool is great for animated explainer videos — students add voiceover and the visuals animate automatically.</div>",
"Micro:bit":"<ol><li>Open <b>makecode.microbit.org</b> and click <b>New Project</b>.</li><li>Drag <b>coding blocks</b> to program the micro:bit.</li><li>Use blocks for <b>LED display, buttons, sensors</b> (light, temperature, accelerometer, compass).</li><li>Click <b>Download</b> and drag the file onto the micro:bit (connected via USB).</li><li>The program runs on the <b>physical device</b> immediately.</li></ol><div class=\"sg-howto-tip\">Tip: Start with the LED display — students can show their name, an icon, or a scrolling message as their first program.</div>",
"Sphero":"<ol><li>Open the <b>Sphero Edu</b> app on iPad.</li><li>Connect to a <b>Sphero robot</b> via Bluetooth.</li><li>Choose <b>Draw, Block or Text</b> coding mode.</li><li>Draw a path or drag blocks to <b>control movement, lights, speed and sounds</b>.</li><li>Tap <b>Start</b> to run the program on the physical robot.</li><li>Iterate: observe, adjust code, try again.</li></ol><div class=\"sg-howto-tip\">Tip: Use Draw mode for younger students — they draw the path and the robot follows it.</div>",
"Beebots":"<ol><li>Place the <b>Beebot</b> on a mat or floor space.</li><li>Press the <b>arrow buttons</b> (forward, back, left turn, right turn) to enter a sequence.</li><li>Press <b>Go</b> and the Beebot follows the programmed path.</li><li>Press <b>X</b> (clear) to reset and try a new sequence.</li><li>Students <b>predict</b> where it will end up, then <b>test and adjust</b>.</li></ol><div class=\"sg-howto-tip\">Tip: Create custom mats using butcher paper — draw a grid of squares matching the Beebot step size (15cm).</div>",

function stripForPrompt(value){
  return String(value||'')
    .replace(/<[^>]*>/g,' ')
    .replace(/&nbsp;/g,' ')
    .replace(/&amp;/g,'&')
    .replace(/&lt;/g,'<')
    .replace(/&gt;/g,'>')
    .replace(/&quot;/g,'"')
    .replace(/&#39;/g,"'")
    .replace(/\s+/g,' ')
    .trim();
}
function formatPromptResources(resources){
  if(!resources || !resources.length) return 'None provided.';
  return resources.map(function(r,i){
    return (i+1)+'. '+stripForPrompt(r.label||'Resource')+(r.url?' — '+r.url:'');
  }).join('\n');
}
function buildCopilotPrompt(d){
  d=d||{};

    'I am a primary teacher at Wesley College in Melbourne. Help me run this digital learning activity in a practical classroom way.',
    '',
    'Use Australian spelling. Keep the advice clear, concrete and suitable for a busy primary classroom teacher. Do not assume I already know the tool well.',
    '',

    'Activity description from the Digital Learning Assistant:',

    'Important: Keep the plan realistic. Make it something I could actually use with my class this week.'

}
function copyTextFallback(text){
  var ta=document.createElement('textarea');
  ta.value=text;
  ta.setAttribute('readonly','');
  ta.style.position='fixed';
  ta.style.left='-9999px';
  document.body.appendChild(ta);
  ta.select();
  try{document.execCommand('copy');document.body.removeChild(ta);return true;}
  catch(e){document.body.removeChild(ta);return false;}
}

function focusDlaDialog(overlay){

function copyPromptToClipboard(text){
  if(navigator.clipboard && window.isSecureContext){
    return navigator.clipboard.writeText(text).then(function(){return true;}).catch(function(){return copyTextFallback(text);});
  }
  return Promise.resolve(copyTextFallback(text));
}

// ========== TEACHER-PICKED TECH SUGGESTION ==========
// Lets a teacher pick a specific approved tool for the current unit and get
// a live AI-tailored suggestion. Server caches per (campus|year|theme|tool),
// so repeat opens are instant and free. A chip is left behind on the unit
// page after the popup closes so the teacher sees what they've explored.

function techChipsKey(campus,yl,theme){
  return 'dla_tech_chips_'+campus+'|'+yl+'|'+theme;
}
function getTechChips(campus,yl,theme){
  try{
    var raw=localStorage.getItem(techChipsKey(campus,yl,theme));
    return raw?JSON.parse(raw):[];
  }catch(e){return [];}
}
function addTechChip(campus,yl,theme,tool){
  try{
    var arr=getTechChips(campus,yl,theme);
    if(arr.indexOf(tool)===-1){arr.push(tool);localStorage.setItem(techChipsKey(campus,yl,theme),JSON.stringify(arr));}
  }catch(e){}
}
function removeTechChip(campus,yl,theme,tool){
  try{
    var arr=getTechChips(campus,yl,theme).filter(function(t){return t!==tool;});
    localStorage.setItem(techChipsKey(campus,yl,theme),JSON.stringify(arr));
  }catch(e){}
}

function renderTechPickerPrompt(campus,yl,theme,ci,lo){
  var chips=getTechChips(campus,yl,theme);
  var chipsHtml='';
  var caEnc=encodeURIComponent(campus),ylEnc=encodeURIComponent(yl),thEnc=encodeURIComponent(theme);
  var ciEnc=encodeURIComponent(ci||''),loEnc=encodeURIComponent(lo||'');
  if(chips.length){
    chipsHtml='<div class="tech-chips">';
    chips.forEach(function(t){
      var tEnc=encodeURIComponent(t);
      var tSafe=escapeHtml(t);
      chipsHtml+='<span class="tech-chip">'
        +'<button type="button" class="tech-chip-main" onclick="reopenTechChip(\''+caEnc+'\',\''+ylEnc+'\',\''+thEnc+'\',\''+tEnc+'\',\''+ciEnc+'\',\''+loEnc+'\')" title="Reopen suggestion for '+tSafe+'">🔧 '+tSafe+'</button>'
        +'<button type="button" class="tech-chip-x" onclick="dismissTechChip(\''+caEnc+'\',\''+ylEnc+'\',\''+thEnc+'\',\''+tEnc+'\')" title="Remove" aria-label="Remove '+tSafe+'">✕</button>'
        +'</span>';
    });
    chipsHtml+='</div>';
  }
  return chipsHtml +
    '<div class="tech-prompt" onclick="openTechPicker(\''+caEnc+'\',\''+ylEnc+'\',\''+thEnc+'\',\''+ciEnc+'\',\''+loEnc+'\')"><div class="tech-prompt-icon">🔧</div><div class="tech-prompt-text"><div class="tech-prompt-title">Have a tech tool in mind?</div><div class="tech-prompt-sub">Pick an approved tool and we\'ll tailor a suggestion to this unit →</div></div><div class="tech-prompt-arrow">→</div></div>';
}

function reopenTechChip(campusEnc,ylEnc,themeEnc,toolEnc,ciEnc,loEnc){
  var campus=decodeURIComponent(campusEnc),yl=decodeURIComponent(ylEnc),theme=decodeURIComponent(themeEnc),tool=decodeURIComponent(toolEnc);
  var ci=ciEnc?decodeURIComponent(ciEnc):'',lo=loEnc?decodeURIComponent(loEnc):'';
  openTechResult(campus,yl,theme,tool,false,ci,lo);
}
function dismissTechChip(campusEnc,ylEnc,themeEnc,toolEnc){
  var campus=decodeURIComponent(campusEnc),yl=decodeURIComponent(ylEnc),theme=decodeURIComponent(themeEnc),tool=decodeURIComponent(toolEnc);
  removeTechChip(campus,yl,theme,tool);

function filterTechTiles(q){

function pickTech(btn,campusEnc,ylEnc,themeEnc){

function openTechResult(campus,yl,theme,tool,regen,ci,lo,customCi,customLo){
  var overlay=document.getElementById('techOverlay');
  if(!overlay){
    // No picker open (e.g. chip click) — create a fresh overlay shell
    var oldShell=document.getElementById('techOverlay');if(oldShell)oldShell.remove();
    overlay=document.createElement('div');
    overlay.id='techOverlay';
    overlay.className='tech-overlay';
    overlay.dataset.campus=campus;overlay.dataset.yl=yl;overlay.dataset.theme=theme;
    overlay.onclick=function(ev){if(ev.target===overlay)closeTech();};
    document.body.appendChild(overlay);
    lockDlaOverlayScroll();
    document.addEventListener('keydown',handleTechKey);
    requestAnimationFrame(function(){overlay.classList.add('open');});
  }
  overlay.dataset.tool=tool;
  // Persist the canonical (unit) CI/LOI plus any custom override on the
  // overlay so renderTechResult's editable panel and the Regenerate button
  // can re-read them without a fresh page lookup.
  if(typeof ci==='string')overlay.dataset.ci=ci;
  if(typeof lo==='string')overlay.dataset.lo=lo;
  overlay.dataset.customCi=customCi||'';
  overlay.dataset.customLo=customLo||'';
  overlay.innerHTML='<div class="tech-modal" role="dialog" aria-modal="true" aria-labelledby="techModalTitle">' +
    '<button type="button" class="tech-modal-close" onclick="closeTech()" aria-label="Close">✕</button>' +
    '<div class="tech-modal-header"><div class="tech-modal-icon" aria-hidden="true">🔧</div><div><div id="techModalTitle" class="tech-modal-title">'+escapeHtml(tool)+'</div><div class="tech-modal-sub">'+escapeHtml(yl)+' · '+escapeHtml(theme)+'</div></div></div>' +
    '<div class="tech-modal-body" id="techModalBody"><div class="tech-loading"><div class="tech-spinner" aria-hidden="true"></div><div>'+(regen?'Regenerating with fresh ideas…':'Tailoring a suggestion for this unit…')+'</div></div></div></div>';
  focusDlaDialog(overlay);
  fetchTechSuggestion(campus,yl,theme,tool,regen,customCi,customLo);
}

function escapeHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function fetchTechSuggestion(campus,yl,theme,tool,regen,customCi,customLo){
  var url=AI_HOOK
    +'?action=suggestTech'
    +'&ca='+encodeURIComponent(campus)
    +'&yl='+encodeURIComponent(yl)
    +'&th='+encodeURIComponent(theme)
    +'&tool='+encodeURIComponent(tool)
    +'&regen='+(regen?'1':'0')
    +(customCi?'&customCi='+encodeURIComponent(customCi):'')
    +(customLo?'&customLo='+encodeURIComponent(customLo):'')
    +'&t='+Date.now();
  // Apps Script returns Access-Control-Allow-Origin: * on GETs, so a plain
  // fetch works and is far more reliable than JSONP for slow cold starts
  // (data.json load + OpenAI call can be 8–12s, which kills script tags
  // behind some corporate proxies). AbortController gives us a real timeout.
  var controller=(typeof AbortController!=='undefined')?new AbortController():null;
  var timeoutId=setTimeout(function(){if(controller)controller.abort();},60000);
  fetch(url,{method:'GET',redirect:'follow',credentials:'omit',cache:'no-store',signal:controller?controller.signal:undefined})
    .then(function(r){
      if(!r.ok)throw new Error('HTTP '+r.status);
      return r.text();
    })
    .then(function(txt){
      clearTimeout(timeoutId);
      var parsed;
      try{parsed=JSON.parse(txt);}
      catch(e){throw new Error('Server returned invalid JSON');}
      renderTechResult(campus,yl,theme,tool,parsed);
    })
    .catch(function(err){
      clearTimeout(timeoutId);
      var msg='Could not reach the suggestion service. Check your internet and try again.';
      if(err&&err.name==='AbortError')msg='The suggestion is taking longer than 60 seconds — please try again.';
      else if(err&&err.message)msg='Could not reach the suggestion service ('+err.message+'). Please try again.';
      renderTechResult(campus,yl,theme,tool,{error:msg});
    });
}

function renderTechResult(campus,yl,theme,tool,resp){
  var body=document.getElementById('techModalBody');
  if(!body)return;
  var overlay=document.getElementById('techOverlay');
  // Prefer any teacher-typed custom values still on the overlay; fall back to
  // the canonical unit CI/LOI we plumbed in. Empty strings are fine — the
  // editor just renders blank fields for a new unit.
  var customCi=overlay&&overlay.dataset.customCi?overlay.dataset.customCi:'';
  var customLo=overlay&&overlay.dataset.customLo?overlay.dataset.customLo:'';

// ========== TEACHER UOI EDIT PROPOSAL ==========
// Teachers click "Edit" on a unit detail page, confirm, edit CI/LOI,
// Save -> submission goes to the DLA team's review queue (not directly
// into data.json). After save we ask if they would like to regenerate
// the tech suggestions immediately using their edits (the tech picker
// accepts custom CI/LOI inline, no approval needed for that). The
// proposal is also remembered in localStorage so they see a
// "Submitted for approval" reminder on this unit until they clear it.

function uoiProposalLocalKey(ca,yl,th){return 'dla_uoi_prop_v1::'+ca+'::'+yl+'::'+th;}

function getLocalUoiProposal(ca,yl,th){
  try{
    var raw=localStorage.getItem(uoiProposalLocalKey(ca,yl,th));
    if(!raw)return null;
    var obj=JSON.parse(raw);
    return (obj && typeof obj==='object') ? obj : null;
  }catch(e){return null;}
}

function saveLocalUoiProposal(ca,yl,th,ci,lo,note){
  try{
    localStorage.setItem(uoiProposalLocalKey(ca,yl,th), JSON.stringify({
      ci:String(ci||''),
      lo:String(lo||''),
      note:String(note||''),
      submittedAt:new Date().toISOString()
    }));
  }catch(e){}
}

function clearLocalUoiProposal(ca,yl,th){
  try{localStorage.removeItem(uoiProposalLocalKey(ca,yl,th));}catch(e){}
}

function startUoiEdit(){
  if(!confirm('Edit the Central Idea and Lines of Inquiry for this unit?\n\nYour edits will be sent to the DLA team for review and approval. They will not change what other teachers see until they are approved. You can still use your edits to generate fresh tech ideas right away.'))return;
  if(S.v!=='detail'||S.ca==null||S.yl==null||S.ui==null)return;
  var us=gu(S.ca,S.yl); var u=us[S.ui]; if(!u)return;
  var campus=CN[S.ca]||S.ca, yl=S.yl, theme=u.th;
  var existing=getLocalUoiProposal(campus,yl,theme);
  var startCi=existing&&existing.ci?existing.ci:(u.ci||'');
  var startLoText=existing&&existing.lo?existing.lo:(u.lo||'');
  var startNote=existing&&existing.note?existing.note:'';
  var startLois=splitLinesOfInquiry(startLoText);
  while(startLois.length<3) startLois.push('');

  var old=document.getElementById('uoiEditOverlay');if(old)old.remove();

  function pad2(n){n=String(n);return n.length<2?'0'+n:n;}
  var loiInputsHtml='';
  startLois.forEach(function(text,i){
    loiInputsHtml+=
      '<div class="uoi-loi-row">'
        +'<div class="uoi-loi-num">'+pad2(i+1)+'</div>'
        +'<input type="text" class="uoi-loi-input" placeholder="Line of inquiry '+(i+1)+'" value="'+escapeHtml(text)+'">'
        +'<button type="button" class="uoi-loi-remove" onclick="removeUoiLoiInput(this)" title="Remove this line of inquiry" aria-label="Remove">×</button>'
      +'</div>';
  });

  var caEnc=encodeURIComponent(campus),ylEnc=encodeURIComponent(yl),thEnc=encodeURIComponent(theme);
  var html=
    '<div class="tech-modal uoi-modal" role="dialog" aria-modal="true" aria-labelledby="uoiModalTitle">'
      +'<button type="button" class="tech-modal-close" onclick="closeUoiEdit()" aria-label="Close">✕</button>'
      +'<div class="tech-modal-header">'
        +'<div class="tech-modal-icon" aria-hidden="true">✏️</div>'
        +'<div><div id="uoiModalTitle" class="tech-modal-title">Edit Central Idea &amp; Lines of Inquiry</div>'
        +'<div class="tech-modal-sub">'+escapeHtml(yl)+' · '+escapeHtml(theme)+'</div></div>'
      +'</div>'
      +'<div class="tech-modal-body">'
        +'<div class="uoi-edit-form">'
          +'<div class="uoi-edit-hint">Your edits will be sent to the <strong>DLA team for review</strong>. They won\'t change what other teachers see on this unit until they are approved. After saving, you can generate fresh tech ideas using your edits right away.</div>'
          +'<label for="uoi-edit-ci">Central Idea</label>'
          +'<textarea id="uoi-edit-ci" rows="3" placeholder="e.g. Sharing personal stories helps us understand and value different perspectives.">'+escapeHtml(startCi)+'</textarea>'
          +'<label>Lines of Inquiry</label>'
          +'<div id="uoi-loi-list">'+loiInputsHtml+'</div>'
          +'<button type="button" class="uoi-loi-add" onclick="addUoiLoiInput()">+ Add another line of inquiry</button>'
          +'<label for="uoi-edit-note">Note to the DLA team <span style="font-weight:400;text-transform:none;color:#666;letter-spacing:0">(optional)</span></label>'
          +'<textarea id="uoi-edit-note" rows="2" placeholder="Why these edits? (e.g. updated for 2026 planner, central idea reworded for clarity, new line of inquiry added)">'+escapeHtml(startNote)+'</textarea>'
          +'<div class="uoi-edit-actions">'
            +'<button id="uoi-edit-save" class="uoi-edit-save" onclick="submitUoiEdit(\''+caEnc+'\',\''+ylEnc+'\',\''+thEnc+'\')">💾 Save and submit for approval</button>'
            +'<button class="uoi-edit-cancel" onclick="closeUoiEdit()">Cancel</button>'
          +'</div>'
        +'</div>'
      +'</div>'

function closeUoiEdit(){
  var el=document.getElementById('uoiEditOverlay');
  if(!el)return;
  el.classList.remove('open');
  setTimeout(function(){
    if(el.parentNode)el.remove();
    if(typeof unlockDlaOverlayScrollIfClear==='function')unlockDlaOverlayScrollIfClear();
    document.removeEventListener('keydown',handleUoiEditKey);
  },200);
}

function handleUoiEditKey(ev){
  if(ev.key==='Escape'){ev.preventDefault();closeUoiEdit();}
}

function renumberUoiLois(){
  var list=document.getElementById('uoi-loi-list');if(!list)return;
  var rows=list.querySelectorAll('.uoi-loi-row');
  rows.forEach(function(row,i){
    var n=String(i+1);if(n.length<2)n='0'+n;
    var num=row.querySelector('.uoi-loi-num');if(num)num.textContent=n;
    var input=row.querySelector('.uoi-loi-input');if(input)input.placeholder='Line of inquiry '+(i+1);
  });
}

function addUoiLoiInput(){
  var list=document.getElementById('uoi-loi-list');if(!list)return;
  var n=list.querySelectorAll('.uoi-loi-row').length+1;
  var nPad=String(n);if(nPad.length<2)nPad='0'+nPad;
  var row=document.createElement('div');
  row.className='uoi-loi-row';
  row.innerHTML=
    '<div class="uoi-loi-num">'+nPad+'</div>'
    +'<input type="text" class="uoi-loi-input" placeholder="Line of inquiry '+n+'" value="">'
    +'<button type="button" class="uoi-loi-remove" onclick="removeUoiLoiInput(this)" title="Remove this line of inquiry" aria-label="Remove">×</button>';
  list.appendChild(row);
  var input=row.querySelector('.uoi-loi-input');if(input)try{input.focus();}catch(e){}
}

function removeUoiLoiInput(btn){
  var row=btn.closest('.uoi-loi-row');if(!row)return;
  var list=document.getElementById('uoi-loi-list');if(!list)return;
  if(list.querySelectorAll('.uoi-loi-row').length<=1){
    var input=row.querySelector('.uoi-loi-input');if(input)input.value='';
    return;
  }
  row.remove();
  renumberUoiLois();
}

function submitUoiEdit(campusEnc,ylEnc,themeEnc){
  var campus=decodeURIComponent(campusEnc),yl=decodeURIComponent(ylEnc),theme=decodeURIComponent(themeEnc);
  var ciEl=document.getElementById('uoi-edit-ci');
  var noteEl=document.getElementById('uoi-edit-note');
  var ci=ciEl?ciEl.value.trim():'';
  var note=noteEl?noteEl.value.trim():'';
  var loiInputs=document.querySelectorAll('#uoi-loi-list .uoi-loi-input');
  var loiVals=[];
  loiInputs.forEach(function(inp){var v=String(inp.value||'').trim();if(v)loiVals.push(v);});
  var lo=loiVals.join('\n');
  if(!ci&&!lo){alert('Please fill in the Central Idea or at least one Line of Inquiry before submitting.');return;}
  var saveBtn=document.getElementById('uoi-edit-save');
  if(saveBtn){saveBtn.disabled=true;saveBtn.textContent='Submitting...';}
  var url=AI_HOOK
    +'?action=submitUoiProposal'
    +'&ca='+encodeURIComponent(campus)
    +'&yl='+encodeURIComponent(yl)
    +'&th='+encodeURIComponent(theme)
    +'&ci='+encodeURIComponent(ci)
    +'&lo='+encodeURIComponent(lo)
    +'&note='+encodeURIComponent(note)
    +'&t='+Date.now();
  fetch(url,{method:'GET',redirect:'follow',credentials:'omit',cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
    .then(function(txt){
      var parsed;try{parsed=JSON.parse(txt);}catch(e){throw new Error('Server returned invalid response');}
      if(parsed&&parsed.error)throw new Error(parsed.error);
      saveLocalUoiProposal(campus,yl,theme,ci,lo,note);
      closeUoiEdit();
      R();
      setTimeout(function(){
        if(confirm('Submitted to the DLA team for review!\n\nWould you like to generate fresh tech ideas using your edited Central Idea and Lines of Inquiry right now?\n\n(Pick any approved tool - the AI will tailor a suggestion around your wording. Your unit\'s saved suggestions do not change unless the DLA team approves.)')){
          openTechPicker(encodeURIComponent(campus),encodeURIComponent(yl),encodeURIComponent(theme),encodeURIComponent(ci),encodeURIComponent(lo));
        }
      },80);
    })
    .catch(function(err){
      alert('Submission failed: '+(err&&err.message?err.message:err)+'\n\nPlease try again.');
      if(saveBtn){saveBtn.disabled=false;saveBtn.textContent='💾 Save and submit for approval';}
    });
}

function clearLocalProposalForUnit(campusEnc,ylEnc,themeEnc){
  var campus=decodeURIComponent(campusEnc),yl=decodeURIComponent(ylEnc),theme=decodeURIComponent(themeEnc);
  if(!confirm('Forget the "submitted" reminder for this unit? The DLA team will still see your submission in their review queue.'))return;
  clearLocalUoiProposal(campus,yl,theme);
  R();
}

function splitLinesOfInquiry(text){
  return String(text||'')
    .replace(/\u2022/g,'•')
    .split(/\s*(?:;|•|â€¢|\?{2,}|\r?\n+)\s*/g)
    .map(function(l){return l.trim().replace(/^[-–—•]+\s*/,'');})
    .filter(Boolean);
}

function getWesleyDigitalSkillsScope(yl){
  var band=getTechCurBand(yl);
  if(band==='F' || band==='1-2') band='F-2';
  return WESLEY_DIGITAL_SCOPE[band];
}

function renderWesleyDigitalSkillsOverview(yl){
  var scope=getWesleyDigitalSkillsScope(yl);
  if(!scope)return '';
  var h='<div class="tech-cur-subj"><div class="tech-cur-subj-title">🟣 Wesley Digital Skills ('+scope.label+')</div>';
  h+='<div class="tech-cur-note">Age-level Wesley Digital Skills drawn from the College scope and sequence.</div>';
  scope.domains.forEach(function(domain){
    h+='<div class="tech-cur-wds-domain"><div class="tech-cur-wds-title">'+domain.domain+'</div>';
    domain.skills.forEach(function(item){
      h+='<div class="tech-cur-wds-item"><b>'+item.sub+'</b> — '+item.desc+' <span class="tc-code">'+item.code+'</span></div>';
    });
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function getTechCurBand(yl) {
  if(/kinder/i.test(yl)) return 'F';
  if(yl==='Prep') return 'F';
  var n=parseInt(yl.replace('Year ',''));
  if(n<=2) return '1-2';
  if(n<=4) return '3-4';
  return '5-6';
}

function renderTechCurriculum(yl) {
  var band = getTechCurBand(yl);
  var bandLabel = band==='F'?'Foundation':'Years '+band;
  var h='';
  
  ['DigiT'].forEach(function(key){
    var subj = TECH_CUR[key];
    var items = subj[band];
    if(!items || !items.length) return;
    
    h+='<div class="tech-cur-subj">';
    h+='<div class="tech-cur-subj-title">'+(key==='DT'?'🔧':'💻')+' '+subj.label+' ('+bandLabel+')</div>';
    
    // Group by strand
    var kItems = items.filter(function(i){return i.s==='K';});
    var pItems = items.filter(function(i){return i.s==='P';});
    
    if(kItems.length) {
      h+='<div class="tech-cur-strand">Knowledge &amp; Understanding</div>';
      kItems.forEach(function(item,idx){
        var eid = key+'_'+band.replace('-','')+'_'+idx;
        h+='<div class="tech-cur-item">';
        h+=item.d.charAt(0).toUpperCase()+item.d.slice(1);
        h+=' <span class="tc-code">'+item.c+'</span>';
        if(item.e && item.e.length) {
          h+='<div><button class="tech-cur-elab-btn" onclick="tgTCE(\''+eid+'\',this)">▸ Reveal elaborations ('+item.e.length+')</button></div>';
          h+='<div class="tech-cur-elab" id="tce_'+eid+'"><ul style="margin:0;padding:0 0 0 16px;list-style:disc">';
          item.e.forEach(function(e){h+='<li>'+e+'</li>';});
          h+='</ul></div>';
        }
        h+='</div>';
      });
    }
    
    if(pItems.length) {
      h+='<div class="tech-cur-strand">Processes &amp; Production Skills</div>';
      pItems.forEach(function(item,idx){
        var eid = key+'_'+band.replace('-','')+'_p'+idx;
        h+='<div class="tech-cur-item">';
        h+=item.d.charAt(0).toUpperCase()+item.d.slice(1);
        h+=' <span class="tc-code">'+item.c+'</span>';
        if(item.e && item.e.length) {
          h+='<div><button class="tech-cur-elab-btn" onclick="tgTCE(\''+eid+'\',this)">▸ Reveal elaborations ('+item.e.length+')</button></div>';
          h+='<div class="tech-cur-elab" id="tce_'+eid+'"><ul style="margin:0;padding:0 0 0 16px;list-style:disc">';
          item.e.forEach(function(e){h+='<li>'+e+'</li>';});
          h+='</ul></div>';
        }
        h+='</div>';
      });
    }
    
    h+='</div>';
  });
  
  return h;
}

function tgTCE(id,btn){
  var el=document.getElementById('tce_'+id);
  if(!el) return;
  if(el.classList.contains('open')){
    el.classList.remove('open');
    btn.textContent='▸ Reveal elaborations ('+el.querySelectorAll('li').length+')';
  } else {
    el.classList.add('open');
    btn.textContent='▾ Hide elaborations';
  }
}

function tgTechCur(){
  var toggle=document.getElementById('techCurToggle');
  var body=document.getElementById('techCurBody');
  if(!toggle||!body) return;
  if(body.classList.contains('open')){
    body.classList.remove('open');
    toggle.classList.remove('open');
  } else {
    body.classList.add('open');
    toggle.classList.add('open');
  }
}

function tgWesleyCur(){
  var toggle=document.getElementById('wesleyCurToggle');
  var body=document.getElementById('wesleyCurBody');
  if(!toggle||!body) return;
  if(body.classList.contains('open')){
    body.classList.remove('open');
    toggle.classList.remove('open');
  } else {
    body.classList.add('open');
    toggle.classList.add('open');
  }
}

function gA(t,d){const s=(t+" "+d).toLowerCase();if(/video|film|imovie|record|360|insta/.test(s))return"Students practise speaking, presenting and telling stories using video tools.";if(/book creator|story|narrat/.test(s))return"Students combine writing, images and voice recording to create rich digital books.";if(/data|graph|survey|chart|excel/.test(s))return"Students learn to collect, organise and make sense of real data.";if(/scratch|code|robot|beebot|sphero|spike|codrone|cubetto|indi/.test(s))return"Students learn to think logically, solve problems and create through coding.";if(/collaborat|padlet|shared/.test(s))return"Students work together, share ideas and build on each other's thinking online.";if(/podcast|garageband|audio/.test(s))return"Students develop confidence in speaking and learn to produce audio content.";if(/website/.test(s))return"Students learn to design and share information online.";if(/canva.*present|poster|infograph|design/.test(s))return"Students learn to communicate ideas visually through posters, infographics and presentations.";if(/reflect|journal|seesaw|wellbeing/.test(s))return"Students reflect on their own learning and track how their thinking grows over time.";if(/google earth/.test(s))return"Students explore real places around the world and connect geography to their learning.";if(/green screen|stop motion/.test(s))return"Students combine creative storytelling with video production techniques.";if(/tinkercad|3d print/.test(s))return"Students design, test and improve 3D models — learning through trial and error.";if(/micro.bit|makey/.test(s))return"Students connect coding to the physical world using sensors and electronics.";if(/vr|merge|cospaces|delightex|pico/.test(s))return"Students step inside their learning through virtual and augmented reality experiences.";if(/freeform/.test(s))return"Students make their thinking visible by mapping ideas, connections and questions on a shared canvas.";if(/character animat|animat/.test(s))return"Students bring stories to life through digital animation.";if(/drone|dji/.test(s))return"Students see their environment from above, connecting aerial views to their inquiry.";if(/mentimeter|kahoot/.test(s))return"Students share their thinking in real time and see how the class responds instantly.";if(/microsoft forms/.test(s))return"Students design surveys, collect responses and analyse what the class thinks.";return"Students use technology with purpose to deepen and demonstrate their learning."}

function gHow(t,d){var s=(t+" "+d).toLowerCase(),steps=[],tip="";
if(t==="Seesaw"){steps=["Open Seesaw and navigate to your class.","Tap the green '+' button to create a new post.","Choose your tool — camera, drawing, voice recording, or upload.","Students complete the activity, adding labels, drawings or narration.","Tap the green tick to submit to their journal.","Review responses in the class feed or student journals."];tip="Tip: Use Seesaw Activities to set up a template with instructions so students know exactly what to do.";}
else if(t==="Book Creator"){steps=["Open Book Creator (bookcreator.com) and create a new book or open an existing one.","Choose a blank page or template layout.","Students add content — text, images, drawings, audio recordings, or video.","Use the '+' button to add new pages as the work develops.","Students can read back their book using the play button.","Share the finished book via link, or export as ePub/PDF."];tip="Tip: Create a class library so students can read each other's books.";}
else if(t==="Canva"){steps=["Open Canva (canva.com) and select a template — poster, presentation, infographic or video.","Students customise using drag-and-drop — add images, text, icons and shapes.","Use the Elements tab to search for relevant graphics and photos.","Encourage students to keep text minimal and let visuals tell the story.","Download as PNG/PDF or share via link.","For presentations, use Present mode to display full screen."];tip="Tip: Canva for Education gives students access to premium content for free — sign up with your school email.";}
else if(t==="Scratch"){steps=["Open Scratch (scratch.mit.edu) and click 'Create' to start a new project.","Plan the project first — storyboard the screens, characters and interactions on paper.","Add sprites (characters) and backdrops from the library or draw custom ones.","Build the code using drag-and-drop blocks — start with 'Events' (when green flag clicked).","Test frequently by clicking the green flag — debug when things go wrong.","Save the project and share via the project link."];tip="Tip: Start with a working example students can remix rather than building from scratch.";}
else if(t==="Scratch Jr"){steps=["Open the Scratch Jr app on the iPad.","Tap '+' to start a new project.","Add characters from the library or draw your own.","Drag code blocks together to make characters move, speak and change.","Add new pages by tapping the '+' on the right side.","Tap the green flag to play the story from the beginning."];tip="Tip: Keep projects to 4-5 pages maximum for younger students.";}
else if(t==="Padlet"){steps=["Open Padlet (padlet.com) and create a new board — choose Wall, Map, Timeline or Canvas layout.","Set the board title and customise the background.","Share the join link with students or display the QR code.","Students tap '+' to add a post — they can include text, images, links, audio or video.","Encourage students to read and comment on classmates' posts.","Export or screenshot the finished board for documentation."];tip="Tip: For Map layout, students drop pins on real locations — great for geography and cultural units.";}
else if(t==="Google Earth"){steps=["Open Google Earth (earth.google.com) in Chrome.","Click Projects → New Project to start a guided tour.","Search for a location and click 'Add to project' to pin it.","For each pin, add a title, description, images and voice narration.","Drag pins to reorder the tour sequence.","Click 'Present' to fly between locations with narration at each stop."];tip="Tip: Use Street View (drag the person icon) to explore locations at ground level in 360 degrees.";}
else if(t==="iMovie"){steps=["Open iMovie on iPad or Mac and create a new Movie project.","Import video clips, photos and audio from the camera roll.","Drag clips onto the timeline in the order you want.","Add titles, transitions and background music from the built-in library.","Record a voiceover by tapping the microphone icon while the video plays.","Export the finished movie and share via AirDrop, Google Drive or Seesaw."];tip="Tip: Film in landscape mode and keep clips under 15 seconds each for easier editing.";}
else if(t==="GarageBand"){steps=["Open GarageBand on iPad or Mac.","Choose Live Loops for experimenting with beats, or Tracks for recording.","Students can tap instruments on screen or record real audio using the microphone.","Layer multiple tracks to build a full composition.","Use the mixing controls to adjust volume and balance between tracks.","Export as an audio file to share via Seesaw, Google Drive or embed in Book Creator."];tip="Tip: Start with the Smart Instruments — they sound great even for beginners.";}
else if(t==="Mentimeter"){steps=["Open Mentimeter (mentimeter.com) and create a new presentation.","Add slides — choose Word Cloud, Multiple Choice, Scales, Open Ended or Q&A.","Share the join code (menti.com) with students or display on screen.","Students respond on their devices — results appear live on the teacher's screen.","Discuss the results as a class, highlighting patterns and surprises.","Download results as a PDF or screenshot for documentation."];tip="Tip: Word Clouds are great for tuning in — Open Ended questions work well for deeper provocations.";}
else if(t==="Microsoft Forms"){steps=["Open Microsoft Forms (forms.office.com) and create a new form or quiz.","Add questions — choose from Choice, Text, Rating, Likert or Ranking.","Share the form link with students via Teams, email or QR code.","Students complete the form on any device.","View responses in the Responses tab — Forms auto-generates charts and summaries.","Export to Excel for deeper analysis or class discussion."];tip="Tip: Use the Branching feature to create different question paths based on student answers.";}
else if(t==="Kahoot"){steps=["Open Kahoot (kahoot.com) and create a new kahoot.","Add questions with multiple choice answers — set a time limit for each.","Launch the kahoot and share the game PIN with students.","Students join on their devices at kahoot.it and answer in real time.","Review results after each question — discuss why answers are right or wrong.","Download the results spreadsheet to identify knowledge gaps."];tip="Tip: Use it as a diagnostic at the start of a unit to reveal what students already know and where misconceptions lie.";}
else if(t==="Adobe Express"||t==="Adobe Express Video"){steps=["Open Adobe Express (adobe.com/express) and choose a template — video, poster, flyer or social post.","Students remix the template using drag-and-drop — add images, text, icons and brand colours.","For video, add clips, record voiceover and choose background music from the free library.","Use the AI tools to resize content for different formats.","Download or share via link.","For presentations, use the slideshow feature with transitions."];tip="Tip: Adobe Express is free with a school Google or Microsoft account.";}
else if(t==="Micro:bit"){steps=["Open MakeCode (makecode.microbit.org) in a browser.","Create a new project and build code using drag-and-drop blocks.","Use the simulator on screen to test before downloading to the physical device.","Connect the micro:bit via USB and click 'Download' to flash the code.","Students test, observe and iterate — changing variables and sensors.","Share the project via the MakeCode link."];tip="Tip: Start with the LED display and buttons before moving to sensors — it builds confidence.";}
else if(t.indexOf("Sphero")!==-1){steps=["Open the Sphero Edu app on iPad and connect to a Sphero robot via Bluetooth.","Choose Block programming mode (or Draw/Text for different levels).","Students build their program using drag-and-drop blocks — movement, lights, sounds and sensors.","Tap Start to run the program and watch the Sphero execute on the floor.","Iterate — adjust speeds, angles and timing based on what happened.","Use a floor map or tape course to give the coding a real-world context."];tip="Tip: Masking tape on the floor creates instant courses. Have students calculate distances and angles first.";}
else if(t==="Beebots"){steps=["Place the Beebot on the floor mat or custom map.","Students plan their route first — counting squares and turns on paper.","Press the Clear button to reset any previous commands.","Enter the sequence — Forward, Back, Left Turn, Right Turn buttons.","Press Go and watch the Beebot follow the programmed path.","Debug if it goes wrong — which step needs changing?"];tip="Tip: Create custom floor mats with laminated A3 paper to match your unit topic.";}
else if(t==="Cubetto"){steps=["Place Cubetto on the floor mat.","Students select coding blocks — green (forward), red (right), yellow (left), blue (function).","Place the blocks on the coding board in sequence.","Press the blue button to run the sequence.","Watch Cubetto follow the path — discuss what happened.","Iterate by changing blocks and re-running."];tip="Tip: The function block teaches subroutines — great for introducing the idea of reusable code.";}
else if(t==="Indi Robot"){steps=["Set up colour tiles on the table or floor to create a path.","Each colour tells Indi what to do — green means go, red means stop, purple means turn.","Students arrange tiles to guide Indi from start to finish.","Place Indi at the start and press the button to begin.","Observe and adjust — swap tiles to change behaviour.","Challenge students to find the shortest or most creative path."];tip="Tip: Have students predict what will happen before pressing start — builds computational thinking.";}
else if(t==="Lego Spike"){steps=["Open the LEGO Education SPIKE app and choose a unit or free build.","Build the model following instructions or create a custom design.","Connect to the hub via Bluetooth and open the coding canvas.","Build the program using drag-and-drop word blocks.","Run the program and observe the model's behaviour.","Iterate on both the build and the code to improve performance."];tip="Tip: Start with the guided tutorials to learn the motor and sensor blocks before free building.";}
else if(t==="CoDrone EDU"){steps=["Open the CoDrone EDU app or Robolink Basecamp on a laptop.","Connect the CoDrone controller via USB.","Write the flight program using block coding or Python.","Always test in the simulator first before real flight.","Find a clear indoor space — use a drone landing pad.","The teacher operates the safety override at all times."];tip="Tip: CoDrone is teacher-operated for safety. Students write the code, teacher handles the controller.";}
else if(t==="Green Screen"){steps=["Set up the green screen backdrop and ensure even lighting with no shadows.","Position the iPad on a tripod facing the green screen.","Open Do Ink (or a green screen app) and import a background image or video.","Students stand in front of the green screen and perform/present.","Record the video — the app replaces the green with the background in real time.","Export and share via Seesaw, Google Drive or embed in other projects."];tip="Tip: Students should avoid wearing green clothing. Consistent lighting is the key to a clean effect.";}
else if(t==="Tinkercad"){steps=["Open Tinkercad (tinkercad.com) and log in with a class code.","Start a new 3D design on the workplane.","Drag basic shapes from the panel and combine them to build a model.","Use the ruler, align and group tools to refine the design.","Export as STL for 3D printing or take a screenshot for documentation.","Share designs with classmates using the Tinkercad Gallery."];tip="Tip: Start with the Tinkercad tutorials — they teach the tools through guided challenges.";}
else if(t==="Pico VR"||t.indexOf("Delightex")!==-1||t.indexOf("CoSpaces")!==-1){steps=["Open CoSpaces (cospaces.io) and create a new space.","Choose a 3D environment and add objects, characters and text from the library.","Use the CoBlocks coding tool to animate objects and add interactions.","Preview in the browser by clicking Play.","For VR, export to the Pico headset via the CoSpaces app.","Students explore each other's creations in VR."];tip="Tip: Start with a simple scene before adding coding — students can always add complexity later.";}
else if(t==="Insta360"||t.indexOf("360")!==-1){steps=["Mount the Insta360 camera on the selfie stick — keep fingers clear of both lenses.","Open the Insta360 app on iPad and connect via WiFi.","Tap record — the camera captures everything in 360 degrees.","After recording, use the app to edit — choose angles, add effects and trim.","Export as a regular video (reframed) or as a full 360 file.","Share via Google Drive, Seesaw or embed in a Book Creator page."];tip="Tip: Place the camera in the centre of the action and step back — it sees everything.";}
else if(t.indexOf("DJI")!==-1||t.indexOf("Drone")!==-1){steps=["DJI drones are teacher-operated only — students do not handle the drone.","Students plan the flight path and what footage they need beforehand.","Teacher flies the drone in an approved outdoor area following school policy.","Students review the aerial footage and select the best clips.","Import footage into iMovie or Canva for editing.","Students add narration, titles and context to the aerial footage."];tip="Tip: Pre-flight planning is the learning — have students storyboard exactly what shots they need and why.";}
else if(t==="Microsoft Excel"){steps=["Open Microsoft Excel and create a new workbook.","Set up column headers for the data categories.","Students enter data into rows — one record per row.","Select the data range and insert a chart (Insert → Chart).","Choose the right chart type — bar for comparison, line for change over time, pie for proportions.","Format the chart with titles, labels and colours to make it clear."];tip="Tip: Teach students to choose the chart type that tells the story of their data, not just the prettiest one.";}
else if(t==="Freeform"){steps=["Open the Freeform app on the iPad.","Tap '+' to create a new board.","Students add sticky notes, text boxes, shapes, drawings and images by tapping the toolbar.","To collaborate, tap the share icon and invite classmates via AirDrop or iCloud.","Students can draw connections between ideas using lines and arrows.","Export the board as a PDF or screenshot to share in Seesaw or Book Creator."];tip="Tip: Set up a board template with pre-placed headings or zones so students know where to put their thinking.";}
else{steps=["Open the app or website and log in with your school account.","Set up the activity — create a template or assignment for students.","Share the link, code or QR with students.","Students complete the activity on their device.","Review and discuss the results as a class.","Save or export the work for documentation."];tip="Tip: Contact the DLP team if you need help setting up this tool.";}
return{steps:steps,tip:tip};}

// Session-scoped pending sets. They sit above localStorage and the server
// snapshot so that an optimistic click survives even when (a) localStorage
// is unavailable (private window, quota), and (b) a leaderboard poll arrives
// before the server has committed our write — that poll replaces
// _serverUsedKeys with a snapshot that doesn't know about the click yet.
// Pending-used outlasts the poll window; pending-unused does the same for undo.
window._pendingUsedKeys=window._pendingUsedKeys||{};
window._pendingUnusedKeys=window._pendingUnusedKeys||{};
window._pendingIntentKeys=window._pendingIntentKeys||{};
window._pendingUnintentKeys=window._pendingUnintentKeys||{};
function _markPendingUsed(k){if(!k)return;window._pendingUsedKeys[k]=Date.now()+60000;}
function _markPendingUnused(k){if(!k)return;window._pendingUnusedKeys[k]=Date.now()+30000;}
function _markPendingIntent(k){if(!k)return;window._pendingIntentKeys[k]=Date.now()+60000;}
function _markPendingUnintent(k){if(!k)return;window._pendingUnintentKeys[k]=Date.now()+30000;}
function _isPendingUsed(k){
  if(!k||!window._pendingUsedKeys[k])return false;
  if(Date.now()>window._pendingUsedKeys[k]){delete window._pendingUsedKeys[k];return false;}
  return true;
}
function _isPendingUnused(k){
  if(!k||!window._pendingUnusedKeys[k])return false;
  if(Date.now()>window._pendingUnusedKeys[k]){delete window._pendingUnusedKeys[k];return false;}
  return true;
}
function _isPendingIntent(k){
  if(!k||!window._pendingIntentKeys[k])return false;
  if(Date.now()>window._pendingIntentKeys[k]){delete window._pendingIntentKeys[k];return false;}
  return true;
}
function _isPendingUnintent(k){
  if(!k||!window._pendingUnintentKeys[k])return false;
  if(Date.now()>window._pendingUnintentKeys[k]){delete window._pendingUnintentKeys[k];return false;}
  return true;
}
function _isUsedLocally(k){
  if(!k)return false;
  if(_isPendingUnused(k))return false;
  if(_isPendingUsed(k))return true;
  if(window._serverUsedKeys && window._serverUsedKeys.has(k))return true;
  return !!_usedMap()[k];
}
function _isIntentLocally(k){
  if(!k)return false;
  if(_isPendingUnintent(k))return false;
  if(_isPendingIntent(k))return true;
  if(window._serverIntentKeys && window._serverIntentKeys.has(k))return true;
  return !!_intentMap()[k];
}
function _setUsedLocally(k,v){
  if(!k)return;
  try{var m=_usedMap();if(v)m[k]=1;else delete m[k];localStorage.setItem('dla_used_v1',JSON.stringify(m));}catch(e){}

}

function normaliseCampusName(campus){
  var c=String(campus||'').trim();
  var k=c.toLowerCase().replace(/\./g,'').replace(/\s+/g,' ');
  if(k==='el'||k==='elsternwick'||k.indexOf('elsternwick')>-1)return 'Elsternwick';
  if(k==='gw'||k==='glen waverley'||k.indexOf('glen waverley')>-1)return 'Glen Waverley';
  if(k==='skr'||k==='stk'||k==='st kilda'||k==='st kilda road'||k==='st kilda rd'||k.indexOf('st kilda')>-1)return 'St Kilda Road';
  return c;
}
function normaliseYearName(year){
  var y=String(year||'').trim();
  y=y.replace(/^(Elsternwick|Glen Waverley|St Kilda(?: Road| Rd)?|EL|GW|SKR|STK)\s*/i,'').replace(/\s*Team$/i,'').trim();
  if(/3\s*year\s*old\s*kinder|3yo\s*kinder/i.test(y))return '3 Year Old Kinder';
  if(/4\s*year\s*old\s*kinder|4yo\s*kinder/i.test(y))return '4 Year Old Kinder';
  if(/prep|foundation/i.test(y))return 'Prep';
  var m=y.match(/year\s*([1-6])/i)||y.match(/\b([1-6])\b/);
  if(m)return 'Year '+m[1];
  return y||'Unknown';
}
function normaliseLeaderboard(data){

      campus:normaliseCampusName(t.campus||t.Campus||t.school||t.Location||t.location||team),
      year:normaliseYearName(t.year||t.Year||t['Year Level']||t.yearLevel||team),

function mergeLeaderboard(existing,incoming){
